body:
  text: 春秋權衡卷五宋劉敞撰文公元年公即位杜氏曰先君未葬而公即位不可曠年無君然則稱公者固以年為限不以葬為限審矣何獨至於他國則云以葬為限乎天王使毛伯來錫公命杜氏云諸侯即位天子賜以命圭合瑞為信然則杜氏為禮然也非也諸侯喪畢以士服見于王王乃於廟命之古者五十而命至周喪畢則命矣喪未畢而命非禮也晉侯伐衛按傳實伐衛者先且居也衛人伐晉按傳實伐晉者孔達也杜氏曰先且居而稱晉侯者從告辭也孔達而稱衛人貶之也安知衛人非當時之告乎一則云告一則云貶茍便其説而已何經之有公孫敖如齊左氏曰始聘焉禮也杜云眀諸侯諒暗則國事皆用吉禮皆非也左氏見時諸侯廢喪而聘故推以為禮杜氏見左氏有得禮之言遂推以為當喪而吉皆反經越禮不可以教後世者也此又眀丘眀不聞道於仲尼矣仲尼不云乎三年之喪自天子達傳曰晉師獲衛孫昭子衛人使告于陳陳共公曰更伐之我辭之衛孔達帥師伐晉君子以為古古者越國而謀非也古者雖越國而謀所謀者必義事也今陳與衛何謀哉謀畔命侵小者也謀畔命侵小是非古矣何以謂之古二年及晉處父盟杜云處父不能匡君以禮而親與公盟故貶其族非也既沒公如晉又沒公於盟諱義備矣復去處父氏反不眀豈其然乎晉人宋人陳人鄭人伐秦左氏曰卿不書為穆公故尊秦也非也於經何以知其非微者稱人乎公子遂如齊納幣左氏曰禮也則是以喪娶為禮不亦悖乎杜預遷僖公薨月以就傳説然文公此年大事于太廟則已自除喪矣彼尚能逆祀何故不能於此娶乎眀此傳誤無為歸過于經而疑之也四年逆婦薑于齊左氏曰卿不行非禮也非也假令卿行獨可謂之禮乎五年王使榮叔歸含且賵王使召伯來會葬左氏曰禮也非也庶子為君為其母無服不敢二尊者也妾母稱夫人王不能正而又使公卿會之葬何禮之有六年晉殺其大夫陽處父左氏曰侵官也按左氏此事始未罪處父獨有稱趙宣子為能耳改搜易將凡出晉侯何以謂處父侵官邪人君任賢不稱必將致敗茍食祿者舉當諌君況處父晉國太傅邪事有不便言之闕矣以此為侵官是教大臣拱默也左氏又曰陽子成季之屬也故黨於趙氏此欲致其法必以侵官塗汚處父耳凡言黨者謂其隂私比周不以正舉者也若舉不失人亦何謂黨乎如處父之舉趙盾趙盾卒為良大夫其退賈季賈季卒為亂而奔皆可謂當矣非故有所厚薄也春秋豈忽于此貶之邪如使大臣見賢而舉謂之侵官見賢而不舉乃其職矣不亦謬乎七年公伐邾取須句左氏曰置文公子焉非也僖公取須句反其君義事也經不褒今文公取須句以封叛臣惡事也經不貶不唯不褒貶而己又略無所見豈春秋之實邪晉人及秦人戰于令狐杜氏曰趙盾廢嫡而外求君故貶稱人晉諱背先蔑而夜薄秦師以戰告按如此説安知稱晉人者非趙盾諱無信而以微者告乎在春秋中杜氏所注若此者多矣何獨至此晉人而謂之春秋貶乎此乃見事在可以説之域則説之事在不可説之域則不説也智足以紿學者矣亦何解經之有公會諸侯晉大夫盟于扈左氏曰公後至故不書所會非也按經公與盟矣何謂後會乎杜云公後其會而及其盟此飾非之言爾會盟同地會所以為盟也今及其盟不得云後會且盟重會輕不當獨責其輕又已稱公會諸侯矣豈不及其會者乎若實不及其會而及其盟者書公及諸侯晉大夫盟乃可耳左氏又曰凡會諸侯不書所會後也按十五年會于扈亦不序諸侯寧復魯侯後會邪未可以類推也徐伐莒杜云不書將帥徐夷告辭略非也傳云徐伐莒莒來請盟然則莒來告也且徐不來告則已茍其來告若不稱君必當稱將帥豈亦自云徐而已乎杜氏之意固以謂從赴告而已向者晉人戰于令狐又何以云貶趙盾稱人哉八年公子遂會雒戎盟于暴左氏曰珍之也言遂權與戎盟得事之宜故褒稱公子非也若兩稱公子為褒者僖三十年公子遂如京師遂如晉則貶矣彼不謂貶何邪公孫敖如京師不至而復丙戌奔莒杜云不言出者受命而出自外行按敖以乙酉出以丙戌奔此豈自外行者邪又歸父還自晉至笙遂奔齊杜云笙在境外故不言出然則境內者當言出矣敖之奔未能出境曷為不言出乎昭十二年公子憗及郊而奔亦言出也宋人殺其大夫司馬宋司城來奔左氏云司馬握節以死司城效節以出公以其官逆之故皆書官非也計司馬握節未如仇牧之手劒司城奉身以退不及荀息之死之而左氏推彼二人為貶申此兩人為賢輕重貿易賞罰昏錯莫甚于此且身居亂兵之中茍棄節偷生則為大罪握節而死人臣之常耳既無智力以禦亂又欲負節而私逃亦大罪也效節而出自求免罪而已未見可貴之美也魯公庸人不識大義則妄以其官逆之春秋亦何為珍之邪九年毛伯來求金傳云王未葬也杜云雖逾年而未葬故不稱王使非也諸侯逾年尚稱公王者逾年不冝反不稱王毛伯來求金非王命可知也書顧命曰伯相命士須材此則冢宰當國之文矣二月辛丑葬襄王杜云卿共葬事禮也非也諸侯為天子三年禮無使卿共葬之文使卿共葬周末之陵替也非典之正也秦人來歸僖公成風之襚杜云追贈僖公并及成風非也僖公成風即妾母繫子而言耳諸侯無二嫡故妾母繫子為重所謂母以子貴者也必謂僖公成風二人也者則是母序子下亂上下之次豈春秋之情邪十一年叔孫得臣敗狄于鹹傳以為長狄也按經無長字安知其是長狄哉赤狄也白狄也山戎也薑戎也陸渾戎也春秋書之未嘗略何至於長狄而獨不書哉傳又曰鄋瞞由是遂亡杜云長狄之種絶按外傳仲尼對吳使者云周為長狄今為大人今即孔子時也孔子之時長狄更為大人大人長狄一意也不得云亡不得云絶杜氏云絶據何見哉左氏云亡則自相反也十二年郕伯來奔左氏曰郕太子以夫鍾與郕邽來奔公以諸侯逆之故書曰郕伯來奔不書地尊諸侯也皆非也即實郕伯來奔又何以辨哉且魯但以諸侯逆之便謂之郕伯春秋又遂沒其專土叛君之罪反謂之諸侯而尊之則何以稱不登叛人哉意者先郕伯以去年卒太子即位而不能自安遂出奔此乃真郕伯矣以其即位日淺或謂之太子而左氏則誤以為太子出奔也子叔姬卒左氏云不言把絶也書叔姬言非女也此事當在成九年而誤置于此陸淳己言之矣秦伯使術來聘杜氏云術不稱氏史略文非也內大夫不氏或以為貶或以為未賜族未賜族者在內猶不氏安知此術非未賜族者而以為史文略也若有以眀術非未賜族者吾聽其説若無以眀之直妄説耳非實論也十四年晉人納捷災于邾弗克納左氏云晉趙盾以諸侯之師八百乘納捷災按如傳説經不應但言晉人也杜云趙盾雖有服義之善然所興者廣所害者衆故貶稱人又安知非趙盾恥不能納而以微者告乎甲申公孫敖卒于齊按傳例曰公不與小斂則不書日今敖卒于齊公之不與小斂審矣何為反日邪敖本有罪出奔幸而死得復録公又實不與其小斂何足謹詳其日月而書乎單伯如齊左氏云王使單伯如齊非也若單伯為周大夫何以眀年書單伯至自齊乎十五年宋司馬華孫來盟左氏云宋華耦來盟其官皆從書曰宋司馬華孫貴之也杜云華孫奉使鄰國臨事制宜至魯而復定盟故不稱使皆非也周之禮經諸侯相聘其使介有常數矣不聞其官皆從以為典也又宋魯無怨華孫無故不待君命而自來以為臨事制宜則當先有可制之事今此安平無變多從官屬而自尊大者也何云制乎以此為貴豈春秋意哉曹伯來朝左氏曰禮也諸侯五年再相朝以修王命古之制也非也按尚書周官六年五服一朝又六年王乃時巡則諸侯於天子五年一朝矣於天子五年一朝不得於諸侯亦五年一朝也且以春秋時事考之曹小國也魯既當朝晉亦當朝宋衛亦當朝楚鄭秦把陳齊蔡滕又皆當朝朝無已乎其禮安在其制安在周禮大行人之職曰凡諸侯之邦交嵗相問也殷相聘也世相朝也此為得中焉齊人歸公孫敖之喪左氏曰齊人送之非也若實齊人送之應曰齊人來歸矣杜云大夫喪還不書書者善魯感子以赦父亦非也若如杜言但書公孫敖之喪至自齊以善魯可耳今書齊人歸公孫敖之喪豈善魯者乎諸侯盟于扈傳曰無能為也又曰凡諸侯會公不與不書諱君惡也子謂若諱而不書與貶而不書同則二者相亂不復可辨矣十六年公四不視朔杜云十二公以疾不視朔非一也義無所取故特舉此以表行事以眀公之實有疾非詐齊非也若史欲為公解紛于齊而書此乃可云爾己矣今史雖書公不視朔齊侯未之曽見則其書之無以異於不書又齊侯唯不信公故不肯盟今魯史雖書公不視朔齊侯亦未肯信也縱史書之欲以取信齊侯為可仲尼亦何為書之乎宋人弒其君杵臼左氏曰宋昭公無道國人奉公子鮑因襄夫人殺之如傳所説則公子鮑為不臣襄夫人為不母而宋公未有無道之實也且公子鮑欲盜其國而先施於民襄夫人欲通于鮑而遂殺其君春秋宜推公子鮑使首惡不得輕此兩人之罪反専惡宋公也傳曰君雖不君臣不可不臣於此何獨異哉晉靈公楚靈王皆極惡而貪殘然其弒也春秋眀書趙盾公子比之名何者盾比皆賢賢宜責之備以謂賢而弒君則開篡亂之門也今鮑私為惠以結民情偽為禮以事公卿如此而弒其君春秋忽其罪則亂臣賊子無所懼而勸矣十七年晉人衛人陳人鄭人伐宋左氏曰卿不書失其所也按襄二十五年齊崔杼弒其君光公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀以伐齊齊人賂晉晉師遂解杜云不譏晉受賂者齊有喪師自宜退也與此相反矣夫宋齊俱弒君而一以不伐喪雖受賂猶免於譏一以不伐喪雖不受賂不免于貶是受賂者賢乎何其頗哉葬我小君聲薑傳云有齊難是以緩今按聲薑薨後乃無齊難聲薑既葬而有齊師耳且何用為若解十八年子卒杜云先君既葬不稱君者魯人諱弒以未成君書之非也假令不諱遂書公薨乎一年不二君之義何所施此乃眀稱君者之不以葬為限者果矣莒弒其君庶其左氏云莒太子僕因國人弒之如傳所言則子弒其父也父雖無道子可弒乎子之弒父可匿其罪乎宣公賴僕之賂則欲授之邑而寵之春秋亦豈賴僕之賂哉曷為蔽其惡名曽謂仲尼不如季孫行父乎其以君無道書庶幾也宣公元年公子遂如齊逆女三月遂以夫人婦薑至自齊左氏曰遂不稱族尊夫人也非也此所謂一事而再見卒名耳君之使臣固有稱族不稱族史之書之所謂實録也非尊君命夫人之謂也且必若云公子結媵陳人之婦遂及齊侯宋公盟此權事而非受命者也非受命何以亦稱族邪豈尊以為君命哉豹婼意如其往也氏其至也皆不氏無有夫人居間也何以亦舍族邪豈尊以敵夫人哉杜云不稱薑氏史闕文亦非也寧知莊元年不稱薑氏非闕文者乎以莊元年推之寧知闕文非仲尼意乎二年趙盾弒其君夷臯左氏敘孔子之言曰惜也越竟乃免非也君臣之際當以義為斷使盾遂去晉國雖未越竟不能討賊非其責也今盾還為大夫雖以越竟茍不能討賊此則罪矣然則盾之免與不免在乎討與不討而不在越與不越也杜云越竟則君臣義絶可以不討賊如杜此言於左氏之説未能自合何也哀八年公山不狃曰君子違不適讐國未臣而有伐之奔命焉死之可也安在越竟則君臣之義絶乎吾以為此非仲尼之言七年公會齊侯伐萊左氏曰凡師出與謀曰及不與謀曰會非也古者行師非無竒術祕策以紿人者也諸侯相率而討罪伐畔則是與謀已焉有連兵合衆人君親將而曰不與謀者哉且用左氏考之凡先謀而後伐者稱會多矣不必云及也此其自相反者吾既言之矣八年仲遂卒于垂杜云稱字時君所嘉非也春秋之作褒貶出于仲尼故曰其義則丘竊取之未有窺時君之意以為上下也如春秋之作褒貶無所在苟唯時君所恱而已矣又何以為仲尼九年取根牟左氏曰言易也非也根牟雖小不以兵革不能取也能取其國何謂易乎不分别國邑取滅之名而茍記其難易而已豈春秋意哉十年崔氏出奔衛左氏云書曰崔氏非其罪也且告以族不以名非也齊雖告以族春秋固當正之若曰崔杼無罪又舉族出奔故春秋因舊史而書之則欒盈亦無罪亦舉族出奔何以不曰欒氏出奔邪且春秋所記大事而已故使舉上介戰舉元帥雖有衆大夫不與焉者略所微也今何為區區崔氏之族邪天王使王季子來聘杜云季子字也非也審季子為王之母弟字季子者宜若叔服稱季子而已即欲分别其為王母弟者宜冠弟于字不當冠王也王者尊稱非所以冠大夫之字也冠大夫者稱王子王孫以屬為重不以王為貴去屬而著王是季子王也妨於文而害于實不可為教矣十一年晉侯會狄於櫕函杜云晉侯往會之故以狄為主非也文不可得言晉侯狄會于櫕函故云會狄耳譬如曰公會戎于潛尚何可疑哉而以謂使狄為主也即以此為使狄為主者公會戎于潛亦使戎為主乎十二年晉荀林父帥師及楚子戰于邲晉師敗績按經文晉楚為成列而戰者也今左氏以謂晉人自使軘車逆趙旃而楚人疑以為晉師且至遂車馳卒奔而乘晉軍晉中軍桓子不知所為士爭渡河而遂大敗耳若此則晉軍未嘗成列何以得書戰邪杜氏雖云晉上軍成陳故得書戰按傳文所敘無上軍成陳之事惟云使帥七覆于敖前又云晉師右移上軍未動是則上軍深溝髙壘備不虞耳蓋未嘗出陳也且經云荀林父及楚子戰若緣上軍不動故得稱戰則經又不應指言荀林父也荀林父實不戰隨會自戰戰之事當舉隨會不當舉荀林父也今經稱荀林父及楚子戰若林父之師初不成陳何得書戰乎又長勺之役齊魯成列唯以魯侯鼓之差後左氏謂春秋惡其譎譏不以偏戰為文今此楚師乃出不意以乘晉師其譎甚矣反謂之戰何邪晉人宋人衛人曹人同盟于清丘左氏曰卿不書不實其言也豫謂春秋之世不實其言者衆矣奚獨此邪設本微者又何以辨之且華椒無惡不宜被貶杜氏云華椒承羣偽之言以誤其國故亦不免于譏豫以謂凡盟誓者所以結信也寧能早知彼將背之乎背盟者自當貶爾守盟者亦何貶乎十三年楚子伐宋左氏曰清丘之盟唯宋可以免焉然則十二年不當貶華椒稱人也以謂不實其言又曰唯宋可以免自相伐矣十五年宋人及楚人平杜氏曰平者總言二國和故不書其人非也凡平者舉國而已公及齊侯平莒及郯又曰暨齊平又曰及鄭平無稱人者今此獨稱人是書其人矣固當解書其人之意不得反謂之不書其人也若平莒及郯暨齊平及鄭平此三者乃可云不書其人耳蝝生左氏云幸之也杜云幸其冬生不為物害若然則有蜚不為災亦何不幸而書之乎且經之書之固為其害也而傳以為不害所以為害者固為其生也而注以為死矣是何其戾也十七年公弟叔肸卒傳曰凡太子之母弟公在曰公子不在曰弟如傳此言者是謂母弟稱弟也母弟稱弟公子友如陳不稱弟何邪成公元年作丘甲杜云長轂一乘戎馬四匹牛十二頭甲士三人步卒七十二人此甸所賦而魯今使丘出之豫謂丘者十六井爾甸乃六十四井使丘供甸賦是加四倍之斂魯亦必不為也且經當云丘乘不當云丘甲二年季孫行父臧孫許叔孫僑如公孫嬰齊會晉郤克衛孫良夫曹公子首及齊侯戰于鞍杜云魯乞師於晉而不以與謀之例者從盟主之令上行於下非匹敵和成之類非也魯雖從伯主之命其實與謀矣且本殊會及者非為褒貶正謂與謀不與謀耳今真與謀者又以不與謀書之誰能辨哉宋公使邾人用鄫子左氏以謂南面之君善惡自專故不貶宋公也晉雖盟主然魯亦其等儕耳以與謀書之尚何不宜而必推而逺之乎臧孫辰如楚乞師此內接外之辭也晉郤錡來乞師此外接內之辭也聖人作春秋無不輕外而重內至於乞師則內外同之者以兵為重也伯主之尊猶以乞師為文則其記師行與謀曰及何足多嫌哉六年立武宫左氏曰聽於人以救其難不可以立武立武由已非由人也然則丘眀以武宫為武軍矣杜氏知其謬妄因護曰既立武軍又作先君武公之宫然傳無先君武公之語要之二説者皆非是左氏欲解經誤以武宫為武軍杜氏欲解傳遂取武軍為武宫此難以通者也傳曰晉遷于新田又曰季孫如晉賀遷然則晉之遷也必告于魯魯則往賀矣使晉不告魯魯安得而賀之今晉告遷而經不書何邪衛遷于帝丘蔡遷于州來魯無賀者猶書于策晉為盟主魯所服事遷國而賀何以不書也意者晉實無遷事乎八年宋公使公孫夀來納幣左氏曰禮也豫謂若誠禮者常事耳春秋何書乎晉殺其大夫趙同趙括左氏曰趙莊姬譛之杜云原屏咎之徒眀本不以德義自居宜其見討豫謂春秋聖人所作也褒貶進退不宜不眀浸潤之譛膚受之訴不行焉乃所謂眀矣今二子者既已罹於讒佞之口而春秋又不察焉苟縱莊姬之賊橫被原屏之咎詩云取彼譛人投畀豺虎曷其然哉天王使召伯來賜公命杜云諸侯即位天子賜之命圭八年乃來緩也非也諸侯喪畢以士服見王乃受命於廟耳不親受命諸侯之汰也賜以命圭天子之弱也即欲責其緩者當責諸侯之不往不當責王賜之晚來也且此又非賜命按桓公文公皆稱天王錫命唯此言天子又言賜命聖人以一字為褒貶者也其必異物矣不原其異而以謂通耳若是其汰哉我則不敢衛人來媵左氏曰凡諸侯嫁女同姓媵之異姓則否非也諸侯三歸歸各一族自同姓耳若嬴曹邾姓媯弋之君嫁女者必同姓媵之則諸侯之媵或不能備矣天子之妃百二十又可一姓乎九年二月伯姬歸于宋杜云宋不使卿逆非禮也非也凡春秋諸侯逆女而不書者君自逆也君自逆則常常則不書矣王姬歸于齊齊侯實來而不見于經是其眀驗也豈以卿逆為禮乎十年公會晉侯齊侯宋公衛侯曹伯伐鄭左氏曰晉侯有疾立太子州蒲以為君而會諸侯豫謂今按經但言晉侯也無以眀其是州蒲若欲貶晉其名乃眀耳此大事也仲尼豈忘之哉傳曰鄭伯討立君者殺叔申叔禽君子曰忠為令德非其人猶不可况不令乎豫謂君子之言陋矣叔申豈能忠者哉君執而立其子反使晉人得緣其隙以殘其國為叔申謀者不若謹修守偹而和其民人以義讓晉使曲在彼諸侯之好我者莫不動心則君必歸矣若是奚有殺身之禍歟十一年晉侯使郤犫來聘己丑及郤犫盟左氏曰郤犫來聘且涖盟季孫行父如晉左氏曰報聘且涖盟然則經何以不云涖盟邪杜云郤犫文子交盟晉魯之君其意一也故但書來盟舉重略輕不識聘禮重邪盟禮重邪若聘禮重盟禮輕略盟可也向者郤犫之盟又何故不略乎若盟禮重聘禮輕是不得略盟矣若盟與聘均重書如晉涖豈不眀白哉十二年公會晉侯衛侯于瑣澤左氏曰宋華元克合晉楚之成鄭伯如晉聽成會于瑣澤成故也然則瑣澤之會本以合楚鄭也今楚鄭不至魯衛自盟何邪且合晉楚者宋也宋亦不與又何邪凡晉楚為平則應大合諸侯以申成好今三國會而已又何邪然則傳之言未足信也十三年公自京師遂會晉侯伐秦左氏亦有劉康公成肅公而經不書又云戰于麻隧秦師敗績而經不説皆虛也春秋權衡卷五
