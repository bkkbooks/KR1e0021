body:
  text: 春秋權衡卷十一宋劉敞撰閔公元年公羊曰誅鄧扈樂而歸獄焉季子至而不變也又曰既而不可及不探其情而誅焉親親之道也非也慶父弒般欲取其國是時季子力不能誅故遁逃他國爾設令季子力能誅之則慶父誅死矣何謂不探其情乎齊仲孫來公羊曰公子慶父也非也孫以王父字為氏此乃慶父之身也未可以稱仲孫且經實繫之齊若之何謂魯仲孫哉此不近人情之尤者二年公薨公羊云云說同元年公子慶父出奔莒何休云慶父弒君不當復見所以復見者起季子緩追逸賊也若然何不但書公子慶父如莒以與莊三十二年之文同哉彼時起季子不探其情故言如此時亦不探其情何故不言如知彼所說妄矣實說慶父使人殺般般本季子所欲立者故季子出奔慶父因立閔公不知慶父利其幼少易取之邪將亦其勢未可得國邪閔公既立則誅弒般者而歸罪焉又召季子而用之焉不知慶父之意欲厭民心邪欲自解釋於國人邪季子知力不足以討慶父故與之並立於朝已而慶父又弒閔公而國人皆從季子莫從慶父故於是出奔於莒此其正也髙子來盟公羊曰不稱使我無君也非也齊髙子楚屈完文義一也不可復附異說矣且慶父出奔則僖公已立也髙子稱來盟則僖公之盟也何謂我無君乎公及齊大夫盟於暨當是時齊無君文不沒公即魯無君何故沒齊侯哉此自相反也僖公齊師宋師曹師次于聶北救邢公羊曰救不言次言次不及事也邢已亡矣非也有救而次者有救而不次者有次而救者有次而不救者事自如此春秋明書之耳何足以起邢亡乎又曰曷為不言狄滅之為桓公諱亦非也文先次後救即譏其怠惰矣何諱之有公羊以百二十國寶書為據故如此說耳又曰曷為先言次而後言救君也亦非也向謂救言次者不及事也今謂先次後救者君也若令救時及事春秋自不書其次不書其次遂無以見其是君此語自相伐也又春秋所書救正欲其急病拯危耳若頓師安次則失救國之義理不得不書所次以見之理既當書不得云救不言次也救不言次似道仲尼作經見救國及事者則不言次見救國不及事者則加言次如此是率已作經非復傳信也又公羊說伐楚救江云為諼也夫伐楚之與次于聶北其文不同而勢同也為諼之與舒緩其意不同而指同也為諼者不直赴所急而更伐他國舒緩者亦不直赴所急而淹止他邑文為事生非為辨君臣也又次于聶北救邢者惡其不直赴所急乃遙為邢援而已叔孫豹帥師救晉次于雍榆者言其本當救晉中有難故止於雍榆也論二者之文則有相似論二者之情則終始不同情變而文異亦其宜也且謂大夫將必先通君命乎則晉陽處父帥師伐楚救江亦何不先救後伐哉又曰不與諸侯專封亦非也經有救邢又有邢遷救邢則邢未滅之辭也邢遷則邢自遷之辭也邢能自遷諸侯城之而已非邢亡又非專封也何得與衛一例哉齊師宋師曹師城邢公羊曰此一事也非也三國以春救邢以夏城之同事異時何謂一事乎獲莒拏公羊謂莒無大夫吾既言之矣二年虞師晉師滅下陽公羊曰使虞首惡非也春秋之例主兵者序上蓋惡兵也虞實主兵矣又何使之首惡乎何休云晉至此乃見者晉楚俱大國後治同姓也不知春秋之作小國先治邪大國先治邪若小國先治齊秦晉宋俱當後見也若大國先治把莒陳蔡俱當後見也今一後一先知其妄亂都非統理其要欲就百二十國寶書語耳又哀公元年隨侯見經不知隨者大國邪小國邪若大國宜與齊晉相緣見經若小國宜與莒杞相緣見經又不知隨者同姓邪異姓邪若同姓邢衛亦同姓也若異姓莒把亦異姓也如彼都無所說此獨紛紛何哉齊侯宋公江人黃人盟于貫澤公羊以謂大國言齊宋小國言江黃以為其餘皆莫敢不至也非也即實四國㑹豈可辨哉且四國㑹盟多矣難以推類為褒又江黃者何必極逺之國乎周末時諸侯分爭水絶壤斷不相往來齊魯之儒未嘗涉江黃之境及聞其名如在海外矣故號以為最逺三年徐人取舒公羊云易也非也若實滅國豈得言取何休云易者猶無守禦之備亦非也若諸侯有守禦之備豈有能滅之者哉諸見滅者皆無守禦備也豈獨此乎又獨以無備之故變滅言取是輕滅國之科同於取邑春秋豈為爾乎㑹于陽榖公羊曰此大㑹曷為末言爾此非問也春秋㑹而不盟可勝言乎其能必令此盟乎且謂末言爾者仲尼之意乎桓公之意乎若仲尼之意者是其本盟而今隱之欲以成就桓公仲尼豈樹私附黨者乎若桓公之意者是本自不盟春秋直據事而書無所獨異也公子友如齊蒞盟何休云託王於魯云云者非也蒞者就耳勢不可書蒞盟曰來盟來盟曰蒞盟無庸飾虛說也四年蔡潰公羊曰國曰潰邑曰叛非也潰者民潰叛者臣叛非繫國邑為别也遂伐楚次于陘公羊云其言次于陘有俟也非也若實俟無為不言屈完來盟于師公羊曰何以不言使尊屈完也曷為尊屈完以當桓公也按春秋之義大夫不得敵君故得臣不氏今乃尊屈完使當桓公自相反也又曰其言盟于師盟于召陵何師在召陵師在召陵則曷為再言盟喜服楚也非也盟于師者屈完之意也盟于召陵者齊侯之意也文為事出非虛加之也何有喜服楚哉何休乃引國佐為據夫國佐本不來盟於師諸侯追與之盟耳非此比也公至自伐楚公羊曰何以致伐楚叛盟也按諸致例有可通者有不可通者其歸多妄不足守其一遂信其二五年把伯姬來朝其子公羊曰內辭也非也此實自朝其子耳譬如曹伯使世子射姑來朝之類文理不疑何謂內辭鄭伯逃歸不盟公羊曰其言逃歸不盟何不可使盟也非也公羊嫌上㑹實有鄭伯中云諸侯盟于首戴若鄭伯實逃歸者當在首戴之前故云爾不知鄭伯本自當盟及盟之日更自逃去所以文先序諸侯盟後言鄭伯逃也又但書逃歸則嫌已盟而逃故出不盟者在盟前逃也亦猶公㑹晉侯齊侯衛侯宋華元邾人于沙隨不見公公㑹劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于平丘公不與盟尋其先文如皆已盟復得後語乃知不與耳與此相類無多疑也而以謂不使寡犯衆可謂義甚髙而理不要晉人執虞公何休曰稱公者奪正爵起從滅也非也春秋奪者降爵云乎豈曰增爵云乎蓋絶知者之聼六年圍新城公羊云邑不言圍非也吾既言之矣八年禘于太廟用致夫人公羊曰脅於齊媵女之先至者非也僖公賢君桓公亦賢君僖公豈受脅於齊者桓公亦豈必欲脅魯者且於文無以見齊脅魯之意異於取子糾歸公孫敖不可為若說九年盟于葵丘公羊曰桓之盟不日此何以日危之也非也葵丘桓之盛也孟子嘗言之矣唯以日月為例遂亂於安危嗚呼慎言哉十年晉殺其大夫里克公羊曰里克弒二君則曷為不以討賊之辭言惠公之大夫也非也按惠公曰爾既殺夫二孺子矣又將圗寡人然則惠公之殺里克本以討賊殺之無為不稱人以殺也且夫為國家者不賞私勞就令惠公本因里克得國其可遂不以正義討之乎公羊謂定公受國於季氏而譏其不能致誅即定公能誅無乃又如里克之不以為賊乎此進退相駮者也又曰晉之不言出入踊為文公諱亦非也鄭詩序曰公子五爭春秋唯有突忽見經不知復誰為諱乎凡諱施於功德已著猶有可諉今重耳之美未見而為之探情諱過不亦誣人哉十四年諸侯城緣陵公羊曰不言徐莒脅之為桓公諱非也吾既言之矣沙鹿崩公羊曰外異不書此何以書為天下記異也非也聖人庸能獨知沙鹿崩為天下異乎傳曰子不語怪若知沙鹿崩之為天下異者可不為怪乎又曰沙鹿河上之邑亦非也此自山名之不頌繫山者以可知故也書禹貢導淮自桐柏導河自積石桐柏皆山也而不繫山至言荆山岷山則皆繫山者亦可以曉故也十五年己卯晦震夷伯之廟公羊云晦者冥也非也晦者晦朔耳又曰夷伯者季氏之孚也亦非也當是時季友未卒公亦未失政欲推天假命以就災異非聖人之意矣至使漢世儒者爭言隂陽詆毁善人其患豈小哉十六年是月六鷁退飛過宋都公羊云是月者僅逮是月也不日者晦也非也夫晦朔者天之所有春秋取朔棄晦何當於義乎此乖僞之深者又成十六年實書晦朔晦朔之相發猶首尾也尚何云哉季友卒公羊云其稱季友何賢也非也季友之賢在莊閔之間於彼稱季子足矣獲莒拏不加褒焉死何乃復言之乎且若稱季友為賢稱仲遂亦可謂賢矣十七年齊人徐人伐英氏何休曰稱氏者春秋前黜之非也英氏者國也國之號或一字或二字或三字非若甲氏潞氏也今縣有尉氏者亦可封國又何謂乎夏滅項公羊以謂桓公滅之非也桓公雖信賢豈宜滅人哉且桓公既已功髙天下而威震主矣又戕人滅人此春秋所惡也而反為之諱是開有功者得橫行天下而無忌憚也且桓公與山戎戰春秋貶之降侯為人夫戰山戎孰與滅中國滅中國反可諱以功除而戰山戎反不得此皆迷惑不然者也十八年宋師及齊師戰于甗公羊曰曷為不使齊主之與襄公之征齊也非也晉荀林父及楚子戰于邲寧可亦曰與晉荀林父之征楚乎所異於晉者何哉邢人狄人伐衛公羊何休曰狄稱人者善能救齊非也春秋之法內諸夏而外夷狄夫外夷狄者夷狄亦外之是以仲尼稱夷狄之有君不如諸夏之亡惡其乘釁蹈隙必能為患也夫中國至大不能無禍而開夷狄使憂之吾見禍以益多憂以益長甚非仲尼意也十九年宋人執滕子嬰齊何休云名者葵丘之盟叛命者也非也若其誠然應曰宋公執矣休又云不為伯討者執之不以其罪亦非也若其誠然則何故名休又云所以著有罪者為襄公殺恥豫謂為襄公殺恥者書宋公執之足矣且襄公執人之君不得其罪所以使霸業不就者此也直書其失以示後世不亦明乎又何殺恥之急鄫子㑹盟于邾何休於此說為襄公諱之意委曲附㑹非聖人本指也且襄公以不能盡用道故致大敗功未足以及人德未足以懷逺尚何可貴而春秋事事諱之此蓋徇已之私說非通方之大經二十年郜子來朝公羊云失地之君也非也若失地之君何得言來朝朝者施於有國有家之辭爾又公羊以郜滅在春秋前按春秋以來且九十年矣郜子失地殆三世矣猶能自歸同姓躬行朝禮無乃少不近人情乎二十二年宋公及楚人戰于泓宋師敗績公羊以謂雖文王之戰不過是也非也如公羊之意惑於泓及河曲而已泓雖水名其陸地猶可以水名之若謂必令如河曲者遇於魯濟豈真遇於水中乎敗於濆泉豈真戰於泉中乎今天下以水名地者尤多不必居水中乃得以水名也且文王何容易哉德不加焉則不以力爭義不過焉則不以威制漸之以道摩之以仁而四方自服爾故詩曰肆不殄厥愠亦不隕厥問如是而伐崇猶再駕而降愛民之至也今襄公退不務修其業而進徒守咫尺之信夫其守信誠是也則不若緩修吾德無亟大功以殘百姓也今論其守信之節而忘其殘民之本而以比之文王其不知聖人亦深矣且夫守信而不詐戰於楚人則有惠矣無德而求大功於已國則不為賴矣未知文王獨為爾乎二十四年天王出居于鄭公羊以謂不能事母者非也王者不孝宜去天以見今不去天知其非不孝也何休又云下無廢上之義得絶之者明母得廢之臣下得從母命嗚呼後世所以多廢置之禍也不亦謬乎二十五年宋殺其大夫公羊曰不名者宋三世無大夫三世內娶也非也文稱大夫是有大夫非無大夫明矣且君娶一卿而一國之內何得悉無大夫哉凡妻之父母所不臣也至其等列禮不及也何謂無大夫乎詭僻不經乃至於此可憫笑者此也楚人圍陳納頓子于頓公羊曰何以不言遂兩之也非也頓子之奔由陳攻之故楚必圍陳乃得納頓子其文與其事詳矣盡矣不可加矣豈得言遂哉遂者生事也非此之比也公㑹衛子莒慶何休曰莒無大夫書慶者尊敬壻之義劉子曰推此言也觀之其妄可勝計乎二十六年公追齊師至酅弗及公羊曰其言至酅弗及何侈也非也以公追人就令勝之尚何可侈哉且是後齊復伐我此明齊不畏魯甚矣數見卑侮猶自以為大如此乎君子之無恥也楚人滅隗以隗子歸何休曰不言獲者舉滅為重非也獲之與以歸非一物也何得并言之楚人伐宋圍緡公羊以謂邑不言圍言圍刺道用師也非也圍緡者乃楚人將卑師少爾伐齊者則楚師將卑師衆爾何以强配合之乎公以楚師伐齊取榖何休曰稱師者順上文非也踰國而乞師是必求多非求少也若少魯亦自能辦之何苦外求乎故此自楚師無疑也何休欲顧上圍緡時意故析之爾又所為圍者非旬日所能為者也說楚人道用其師於伐宋則庶幾信矣何者伐非久事也說楚人道用其師於取緡亦庶幾信矣何者取邑未必久也今正圍邑久者或纍年短者或纍月公又安能得其衆伐齊取榖乎且由楚至魯非近地也伐宋圍緡非易事也由魯至齊又非一日也勝齊取榖又非一日也自齊還魯又非一日也用一冬之間往返如此此可信乎公至自伐齊公羊曰此已取榖矣何以致伐原公羊之意者謂得意致㑹不得意致伐則今得意不當致伐故如此問也曰何以致伐者是問不致㑹而致伐也然伐齊取榖者獨公以楚師自往耳無諸侯之㑹也非諸侯之㑹則不得致㑹此理之適然耳公羊子迷妄其本末遂强云患之興必自此始何休覺其難通又必欲掩覆其過故注莊五年曰公與一國行師得意不致不得意致伐以雕飾此文也然公羊本問何以致伐不問何以致問何以致伐者是問何以致㑹今不然耳問何以致者乃可說云得意不致不得意致伐耳今遺其問致伐之本意更出不致之别說欲以濛澒其語營亂耳目豈通也哉且用公羊之說公伐齊取榖有何不得意哉乃云患之起必自此始按是後乃無齊患雖何休曲為之說寧足蔽其妄乎二十七年楚人陳侯蔡侯鄭伯許男圍宋公羊曰其稱人為執宋公貶也非也宋襄公死久矣春秋前貶之明矣又終僖之篇貶何為乎二十八年晉侯侵曹晉侯伐衛公羊云未侵曹也非也若未侵曹者春秋豈探其情而先書之公子買戍衛不卒戍刺之公羊曰不可使往也非也若不可使往而刺之是得其罪矣又何更其文為不卒戍乎且殺大夫何必著其罪哉其著之罪則是加之加之則濫矣春秋直記之者見濫也傳不曉此意而妄云云何休乃復引曰不日以明有罪無罪不亦迂乎及楚人戰于城濮公羊曰此大戰也曷為使微者此自戕賊者也按公羊本云楚無大夫前年伐宋圍緡雖以師行猶自從本稱稱人而已今忽如此問則是楚有大夫也即今言之是前所言非也即前言之是今所言非也何休乃引屈完按彼屈完乃自為尊之以當桓公特說此文耳非常之辭何得引比乎又諸侯自用師楚自使微者豈得不謂之大戰曷為使微者亦問之無理者也陳侯如㑹公羊云後㑹非也陳本不預盟約聞㑹自至其意其文與陳侯使袁僑如㑹一耳不可橫出兩說公朝于王所公羊曰天子在是也不言天子在是不與致天子也非也若不與致天子則不書天子在是彼云天王狩于河陽豈與致天子乎陳侯款卒何休曰不書葬者為晉文諱推此言也而觀之其妄可勝記乎天王狩于河陽公羊曰不與再致天子也何休曰一失禮尚愈豫謂傳語有理而不合經注語無理而不可訓豈有以臣召君云一失尚愈乎一失尚愈者謂小德出入耳若顛倒君臣淆亂尊卑此罪之大者尚云愈哉二十九年介葛盧來公羊曰夷狄之君非也白狄無名介何以得名三十年衛侯鄭歸于衛公羊曰其言歸何歸惡乎元咺也非也公羊常例以歸者出入無惡復歸者出有惡歸無惡縱春秋歸惡於元咺書衛侯亦足矣又謂之出入無惡可乎公子遂如京師遂如晉公羊曰公不得為政爾非也僖公之時大夫初未强豈敢專行哉此殆誣之矣三十一年取濟西田公羊曰諱取同姓之田言魯此地本為晉侯所還當時不取久而取之故坐取邑也非也諸侯受封自有分矣後雖侵奪喪失有王者作皆當還之魯取已物假令本無伯主之命猶應以功覆過故魯頌美僖公能復周公之宇何有反坐取同姓之田哉又公羊桓二年傳曰至乎地之與人則不然俄而可以為其有矣然則為取可以為有乎曰不可若楚王之妻媦無時焉可也以是推之明曹不得終有魯地魯緣伯主之命而取之又何足諱哉三十二年衛人及狄盟何休云言及者知不得狄君非也書衛人狄盟則不成文書衛人㑹狄則實盟非㑹曰及狄者使文理相成耳亦猶晉侯㑹狄㑹吳之比也尚何疑乎文公元年天王使叔服來㑹葬何休曰常事書者文公不肖諸侯莫肯㑹之故書天子之厚以起諸侯之薄非也文公始即位亦何不肖而諸侯遂聞之乎向若天子亦不遣叔服㑹葬則春秋便都無文以見文公之不肖矣又曰叔服不稱王子者時天子諸侯不務求賢而專貴親親故尤其在位子弟刺其早任以權也亦非也天子之子得稱王子猶諸侯之子得稱公子也王子有封國為諸侯者不得復稱王子當以爵為重其未命為諸侯者自當從大夫之制或字或名理適宜之非為刺親親也又云魯得言公子者方録異辭故獨不言弟也然則魯不言弟乃春秋之常而公子慶父伐於餘丘乃云不言弟豈其幼少將兵凡此云云公羊本無其說俱出何休爾而乖錯如此可為怪歎天王使毛伯來錫公命公羊曰加我服也非也命為諸侯二年作僖公主公羊曰刺欲久喪而後不能非也公自惰緩不作主耳何以知其欲久喪及晉處父盟公羊曰何以不氏諱與大夫盟也非也諱與大夫盟沒公足矣何為去其氏即內微者及晉處父盟何以辨乎何休曰使若得其君如經言邾婁儀父矣若然又不當沒公也三年晉陽處父伐楚救江何休曰若兩之當先言救非也若實伐楚又往救江豈非兩之乎明此但脫以字爾四年逆婦姜于齊公羊曰娶乎大夫略之也此雖孤經無他證據然魯初納幣乃用上卿審娶大夫者禮豈如此崇乎五年王使榮叔歸含且賵公羊曰其言歸含且賵何兼之非禮也非也禮國君薨鄰國弔之其敵體也猶含賵禭共一大夫况王者於其臣妾乎何休曰不從含晚言來者本不當含按公羊例不及事言來其常也今含不及事自可言來何害於不當含而又去來乎又傳譏兼之不譏含也則傳意以含為禮注意以含為非禮其自相反戾至如此王使召伯來㑹葬何休曰去天者不及事刺比失喪禮也非也天子㑹葬諸侯而有早晚小失耳未可集以為過也何至遂貶去天乎六年葬晉襄公何休曰刺公不自行非禮也諸侯薨大夫弔自㑹葬吾不知此在何禮周有千八百諸侯統計五十年死亡略盡是一嵗凡有三十六君死也如一一㑹葬雖疲死道路猶未能適况又外有朝㑹內有祭祀如何得暫假而行之乎言不近理無甚此者晉殺其大夫陽處父晉狐射姑出奔狄公羊曰晉殺其大夫陽處父則狐射姑何為出奔射姑殺也此問之非也處父見殺射姑出奔何有可疑而明射姑殺處父乎成十五年宋殺其大夫山宋華元出奔晉然則殺山者亦華元乎閏月不告朔猶朝于廟公羊謂不告朔禮也猶朝于廟非禮也非也閏雖無常而政有常安得不告假令閏十二月者必有立春立春之政所當告也若就前月告之則先時若就後月告之則不及時夏書曰先時者殺無赦不及時者殺無赦由是觀之則自當告也七年公伐邾婁甲戌取須朐公羊曰取邑不日此何以日內辭也使若他人然非也僖公時亦嘗伐邾取須胊矣何不為內辭哉何休曰所以深諱者扈之盟不見序并為取邑故按僖公取須朐之年與邾戰於升陘敗內之師理亦可諱而何故不日以為辭哉又僖二十六年伐齊取榖書公至自伐齊者公羊以謂雖得意且有後患故從不得意之例以致公也然僖公後卒無患今止緣取邑之故故扈之盟不見序可謂後有患矣何不書公至自伐邾婁以起不得意乎夫取榖無患也書公至取須朐有患不書公至何二三哉公㑹諸侯晉大夫盟于扈公羊曰諸侯不可使與公盟眣晉大夫使與公盟非也在㑹者皆諸侯也既與公盟矣又何云眣晉大夫乎且諸侯不欲與魯侯盟乃敢眣晉大夫使之盟乎皆事之不然者也徐伐莒何休曰謂之徐者前共滅王者後故狄之非也徐亦夷耳書云徐戎並興非至今乃狄之也八年公孫敖如京師不至復丙戌奔莒何休曰日者嫌敖罪明則起君弱故諱使若無罪按公羊所說經義明矣而何休橫以此例紛亂之是畫蛇足者也且敖之罪加日何以能諱不日何以能益宋人殺其大夫司馬宋司城來奔公羊曰曷為皆官舉宋三世無大夫非也僖二十五年宋殺其大夫不舉名氏以謂宋無大夫也今此舉官亦云無大夫若實內娶無大夫者都無所舉是矣或官舉或不舉何哉九年秦人來歸僖公成風之禭公羊曰兼之非禮也非也僖公成風猶惠公仲子耳若以謂兩人者豈可敘母於子下哉禮曰婦人三從是謂婦人無專行耳如遂令母在子下不可謂知禮春秋權衡卷十一
