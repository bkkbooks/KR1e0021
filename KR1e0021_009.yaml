body:
  text: 春秋權衡卷九宋劉敞撰六年春鄭人來輸平公羊以謂是時戰于狐壤隱公獲焉本當言獲為諱大惡則當言戰而君獲不言敗績故不得言戰而言輸平也非也先是翬與諸侯伐鄭未有平文何謂吾成敗乎何休乃以外平不道按魯之公子與鄭為平理無不道者且元年宰咺來歸賵何休云外小惡不書書歸賵者接內故也今此翬及鄭平可得不以接內書乎又且置此平虛論之戰而見獲而謂之輸平喪失實文與義乖非聖人本心也又曰稱人為共國辭且就公羊解之何以能必其非將卑師少乎文何以異于齊人來歸衛寶而橫出於共國之語乎大凡國君使卿大夫嫌其逼君故常加某君使某人以厭之若使微者位卑無嫌故泛稱人耳歸衛寶歸成風之襚歸汶陽田皆與此一類也汶陽田有不言來者魯公及魯人自從齊國內受之也何以異哉七年叔姬歸于紀公羊以謂叔姬者伯姬之娣也非也媵賤不書春秋之通法假令實後為嫡有賢行者書葬紀叔姬及紀叔姬歸于酅足以見矣雖然猶恐非也何乃又為書其初歸哉且公羊以謂許人臣者必使臣許人子者必使子今叔姬非實嫡也伯姬死而攝嫡耳於攝嫡之時既以撓法書其賢又欲上及初歸之日文與伯姬並矣無乃許人媵者乃不使媵乎嫡媵之法自春秋亂之何哉滕侯卒公羊以謂不名者微國也非也公羊説蔡侯考父卒隱八年曰卒從正葬從主人然則滕雖小國可獨不從正乎計許與滕大小猶等許爵為男在傳聞之世卒且書名僖四年新臣况滕侯乎何休又云春秋王魯託隱公以為始受命王滕子先朝隱公春秋褒之以禮嗣子得以其祿祭故稱侯是何迂僻也若嗣子得以其祿祭則先君得稱侯而嗣子豈不得以其祿傳世而後君何以獨不得稱侯迷妄至此可悲也哉且滕君猶以其子故故稱侯則豈不得以其子故故書名哉吾謂假令滕侯卒忽有名何休必且曰其子朝魯其父應見祿故從大國例以是説經又何往而不得齊侯使其弟年來聘公羊以謂母弟稱弟母兄稱兄非也天子諸侯絶期者族人不得以其戚戚君也致為親親則有矣何得以其屬通哉公子慶父伐于餘丘公子卒則以謂貶不稱弟也公子友如陳莊二十七年則無以説之不亦二三乎八年我入邴公羊曰言我者非獨我也齊亦欲之非也經但言我實不言齊誣齊亦欲失其真矣宿男卒何休曰宿男先與隱公交接故卒褒之也不名不書葬者與微者盟功薄當褒之為小國故從小國例按宿當是時真小國矣又何説從小國例乎若宿本無國今褒為小國可矣宿自有國無説褒乃為小國也有王者作必不比天下之諸侯而誅之况肯比天下之諸侯而廢之乎諸侯不廢國故其國也宿雖不與公盟猶是小國君也何強紛紛乎公及莒人盟于包來公羊以謂實莒子稱人則從不疑也非也無故貶莒子為人意以謂當使微者隨公不使公隨小國之君也夫公及小國君盟何不可而反欲隨微者卑稱乎欲為隱公張義其實乃損之耳無駭卒説已見二年九年俠卒公羊以謂未命大夫近之矣未合也俠者再命爾十年壬戌公敗宋師于菅公羊以謂偏戰也非也按公羊以日月為例故云爾若衛師燕師敗績豈非偏戰而內勝乎言戰言敗明偏戰乃得言戰也言敗而不言戰明彼乃獨敗非偏戰也覩文自了亦不假日月為例矣故魯與諸侯偏戰而勝則言戰言敗偏戰而不勝則言戰而不言敗詐戰而勝則言敗某師詐戰而不勝春秋無其文未知偶無之邪亦其諱詐而不勝者邪難衛師燕師敗績處自在本經又公羊以謂內不言戰亦非也內不言戰而敗耳戰而勝何故不言即不當言龍門之戰何以言也辛未取郜卒巳取防公羊以謂言其日者一月而再取甚之也非也公既詐勝宋師用二十日間得其兩邑若不著日則似同時取之此理當然非所甚也又曰內大惡諱小惡書按春秋可諱則諱可書則書大惡有不諱者躋僖公是也又曰外大惡書小惡不書按外小惡書者多矣豈謂不書乎詳傳此言又指百二十國寶書而説不知據魯史也宋人衛人蔡人伐戴鄭伯伐取之公羊曰易也何休云因其困而滅之易若取邑故言取欲起其易非也公羊以取邑為小惡滅國為大惡今變滅為取者是去大惡就小惡縱失鄭伯之罪而徒録其難易已爾可謂春秋乎且春秋何不言鄭伯伐滅之豈不兼見其因人之力而滅人之國乎而何為區區然記其難易而已滅國而難者於罪有省乎抑無省乎滅國而易者於罪有加乎抑無加乎均之滅國而已者無為分别其難易以顛倒滅取之名也且取之名何獨易乎宋人伐鄭圍長葛明年取之更年而得邑公羊以謂強又何謂易乎十一年滕侯薛侯來朝公羊以謂其兼言之者微國也非也雖天子不敢遺小國之臣聖人作經乃遂略微國之君乎此乃同時旅見者春秋據事而書欲見義耳且滕薛榖鄧爵位差同而榖鄧失地滕薛先附何故略此而厚彼乎何休又曰滕序上者春秋變周之文從殷之質質家親親先封同姓亦非也如休之意以謂滕是後常稱子薛是後常稱伯知本小國春秋王魯故褒為侯耳然則薛本爵加滕一等以同姓之故故滕得與並稱侯又撓使居下不乃太阿乎猶有可諉曰位均夫先朝者可褒則先叛者可貶矣鄭人親獲隱公而爵列不降以謂稱人則足見矣公子翬終隱之篇貶鄭伯何獨不終隱之篇貶乎是皆委曲不通于道者也滕薛王者之元功也鄭人王者之亂臣也公子翬隱公之賊也以賊况亂臣理當終隱之篇貶矣又楚子執宋公伐宋公羊猶以終僖之篇貶之知此鄭人不得但一貶而已公薨公羊曰隱無正月者讓乎桓也非也適無正月耳若以輸平為據輸平何足恃乎桓公元年璧假許田公羊以謂許田者魯朝宿之邑也謂之許者繫之許也非也詩云居常與許復周公之宇然則周公受封本有此許邑非孔子作春秋故繫之許也且地邑各自有名或曰許田或曰龜陰田據實而書豈擅改易哉二年紀侯來朝何休云稱侯者天子將娶于紀故封之百里不知休此意者謂紀侯實自受封于周邪亦春秋見王將娶紀女故進其爵為侯法邪若以紀侯實自受封者安知滕薛後不稱侯非天子黜之邪若以春秋為王見義者又可謂新周王魯邪凡封建諸侯當自天子出而春秋私自進退名爵雜亂不知所統此可謂禮邪又曰天子得娶庶人女以其得專封亦非也天子者養天下之民居天下之尊守天下之法者也能刑人能爵人則信其職矣雖然刑人當以罪爵人當以德豈以其得專之遂妄刑人妄爵人哉况撓以情欲玩以私愛而捐百里之命于匹庶之人此輕宗廟社稷甚矣使後世不肖君因緣此義欲以下里賤人之女而共天地之事豈不甚失哉蔡侯鄭伯會于鄧公羊曰離不言會而言會者蓋鄧與會也非也二國相會理不可言蔡侯鄭伯及于某且實行會禮非會而何承赴而書故不甚見爾乃據齊侯鄭伯如紀以為比例彼自亦妄説何可據乎所謂離不言會者左氏得之矣公至自唐何休云致者君子疾賢者失所不肖者反以相親故與隱相違也明前隱與戎盟雖不信猶可安也今桓與戎盟雖信猶可危也所以深抑小人也非也按元年會于垂休云不致者奪臣子辭此致休又云抑小人若誠奪臣子辭會戎有危而不致適可見矣何故反書其至與餘公一例邪且隱公與戎盟不書致亦奪臣子辭邪大凡矜巧辭以曲通者卵有毛白馬非馬猶可通也但恐繁而不要亂道真耳三年春正月何休曰不書王者見桓公無王而行也二年有王見始也十年有王數之終也十八年有王桓公之終也不就元年見始者未無王也非也弒君之罪不輕于成人亂易地之惡不差于納鼎太廟而以為元年未無王輕重失序刑罰不當民始無所措其手足且夫休所指桓無王止此數事矣弒君見于即位成亂效于納賂易地著于璧假其迹已明雖使春秋嵗輒書王其可謂桓有王乎然則不書王其不為此數事亦明矣非公羊何休所能見齊侯衛侯胥命于蒲公羊以謂結言而不盟春秋善之也非也先王為民之不信言之難恃故殺牲約誓以告於神明而為盟所以齊信也然則盟固先王之所有矣春秋之惡盟者惡其瀆也非惡盟之不及結言也春秋亂世齊衛凡君會而相命蓋何足算陽榖之會公羊以謂逺國皆至桓公發禁於諸侯諸侯咸無用盟最盛矣豈非結言而退乎則何不謂之胥命哉四年公狩于郎公羊以謂春曰苗秋曰搜冬曰狩非也周禮春搜夏苗秋獮冬狩得其正矣周禮雖非仲尼所論著然制度粗存焉蓋周公之舊也仲尼嘗執之矣子所執禮其有駮雜封國之制似周衰諸侯所增益也不足以害其大體搜狩之名則吾從周何休云不言夏田者春秋制也以謂飛鳥未去於巢走獸未離於穴恐傷稚幼也亦非也公羊子承絶學之後口授經傳顛倒搜狩且有所遺爾何説春秋制乎計仲尼之聖不過三王故曰禹吾無間然文王既沒文不在兹乎夫三王四時皆田矣而春秋獨闕一者其意欲推仲尼之仁賢於三王也即有妄人四時俱勿畋又可謂賢於仲尼乎且以是而論聖人不亦淺哉禮記王制記四時之田亦復闕夏蓋王制出於漢時諸儒而諸儒承公羊之繆遂至於此不足以為據也鄭康成乃云是夏時制度避其號耳夫夏后非王莽也何謂若是多忌諱乎何休又云狩例時月者譏不時也其意謂仲尼作春秋欲令於孟冬狩也夫仲尼之制作在哀十四年而桓公自用周禮以田狩桓公非得素受道於仲尼也在此為此在彼為彼仲尼安得而譏之是今日適越而昔至也不亦妄乎宰渠伯糾來聘公羊以謂下大夫也繫官氏名且字非也理不可書名而又書字仲尼之筆一何繁且迂至此哉又何休曰下去二時者為貶天子下聘也亦非也史有遺闕日月者仲尼皆不私益之日月無足見義而益之似不信故不為也茍焉曲為生義者又何不得五年甲戌己丑陳侯鮑卒公羊以謂甲戌之日亡己丑之日死而得君子疑焉故以二日卒之非矣陸淳既言之矣齊侯鄭伯如紀公羊以謂離不言會故言如也非也春秋之記盟會者所以刺譏諸侯義亦出隱二年注非善羣聚而惡離會也離會何為不可書哉何休又云嫌外離會常書故變文見意以别嫌明微亦非也所謂嫌微者為其害道是以必别之明之不知記離會何害於春秋而仲尼必欲改會為如以亂事實哉夫盟會同物而春秋獨不記離會又何為哉春秋雖內其國而公與諸侯固等列也記內離會可不謂之離會乎而以為離不言會失其類矣其惑在於百二十國寶書也仍叔之子來聘公羊以謂父老子代從政若是則世卿也何不曰仍氏之子乎何休以謂不稱氏者起其父在夫春秋所以貶貶其世卿也今縱失世卿之罪而録其父在而已無乃失輕重乎且武氏不言之子今此言之子亦可以見父在矣而不曰仍氏知非父老子代者也且文稱仍叔之子不足以效其父老子代義故難信也蔡人衛人陳人從王伐鄭公羊何休以謂實三國之君稱人從不疑非也若實國君則天子非微弱今以不能從諸侯而獨得其人所以見微弱也且若實國君從天子者春秋方書之以見褒何謂乃損其名哉大雩公羊以謂言雩則旱見言旱則雩不見非也凡雩者為請雨也若書雩以見旱是謂雩者必不得雨也若雩必不得雨則雩可以見旱矣若雩可得雨而以雩見旱豈雩之情乎又且旱而雩雩而得雨春秋將何以書之若書旱則實得雨若書雩又不足以效其得雨而方解以見旱若都勿書則廢其應變之精誠未知公羊何以解邪州公如曹何休曰稱公者申其尊非也時王褒之則進爵邾子是春秋王魯褒之則進爵滕侯是有所責惡而見其尊亦進爵州公是春秋所嘉而賢者亦進爵髙子是凡二百四十二年而操賞罰四人焉是何營營乎且謂州公實來亦足矣又何申之六年實來公羊以謂慢之也非也君子躬自厚而薄責於人人雖無禮我可不為禮乎何故慢之何休云州公過魯都而不朝是慢之亦非也諸侯相過安得必行朝禮假令過十國亦當處處朝乎蓋假塗則有之矣主為客禮則有之矣何必盡行朝禮乎先王之制諸侯相朝考禮正刑一德必就有道之國今桓公無道而人不朝乃其冝也不敢棄先王也春秋方宜為魯內訟何暇責人乎且若休所云者入都必朝則是不擇有道而苟以行過為禮也春秋何以刺邾人牟人哉大閲公羊以謂以罕書也何休曰三年簡車謂之大閲刺桓公忘武備也不知所謂罕者謂自入春秋今始一閲邪謂桓公過其三年之期今始一閲也若自入春秋今始一閲則非獨桓公忘武備隱亦忘也如此審為桓公過其三年之期而始一閲故得以罕書也然必閲而後書之假令桓公終身不閲春秋遂不得書則是與隱公無以辨也又非必桓公終身不閲春秋不得書為可疑也假今桓公初嵗一閲終嵗又一閲春秋書之公羊必以謂書罕也則未知中間罕乎亦不罕乎若謂罕則中間無文以見若謂不罕則中間實未嘗閲此文之不通難以強合者也又何休所説簡車徒有比年三年五年之目在桓公之書獨閲以罕書是明比年五年俱不罕也桓公又非終不閲者也今已閲之矣直失其時耳如比之於武備何謂忽忘乎蔡人殺陳他公羊以謂外淫乎蔡蔡人殺之非也蔡人者討賊之辭也他本篡故以討賊之辭言之猶衛人殺州吁齊人殺無知楚人殺陳夏徵舒等也他雖自君內不為國人所附外不為天子所命是以異於商人而不得以逾年例言也公羊子失其事實聊為設罪端耳子同生公羊云喜有正也非也國之嫡嗣莫重焉史無得不書以為感隱桓之禍故以喜書不亦淺近乎何休又曰不稱世子者明欲以正見無正亦非也諸侯之嫡雖當世爵然必誓於天子而後稱世子今此未誓故不稱世子耳以正見不正不亦鄙乎七年焚咸丘公羊以謂咸丘者邾婁之邑其君在焉故不繫國焚之者樵之也非也按公羊凡春秋所書內取邑苟不繫國悉歸之邾婁今此亦其比也又按邾人執鄫子用之蔡人衛人伐戴鄭伯伐取之諸若此類不仁之甚者春秋明書之不使文亂實若誠火攻人君應書曰伐咸丘焚之與伐戴之文相符矣今但曰焚咸丘而無兵戈之意安知不以火田乎又公羊解取根牟曰諱亟也然則彼為亟故不繫國此為君存亦不繫亟於取邑小惡之小也焚人之君大惡之大也文不足以相起而實相亂未可謂善為春秋榖伯綏來朝鄧侯吾離來朝公羊以謂名者失地之君也非也若實失地何故稱朝且朝者施於有國有家者春秋不以禮假人如之何以奔為朝也又諸侯失地者不必名溫子弦子談子是也何休之説以謂名者見不世也若如此彼三子者亦嘗世乎八年己卯蒸公羊以謂譏亟也非也春秋欲見五月再蒸故於此不得不書也蒸猶將書壬午猶繹者不得不先書有事於太廟也此其實矣又何亟乎何休云屬十二月已蒸者其意謂常事不書則此以非常書不知常事有不得已而書者亦不害於非常書也祭公來遂逆王后于紀公羊云不稱使婚禮不稱主人非也祭公來魯魯非婚家也稱使何傷又不稱主人者豈確論乎吾既言之於紀履緰矣九年曹伯使其世子射姑來朝何休曰雖非禮有尊厚魯之心故曹伯卒葬詳録非也春秋豈為説之不以道而説乎古之制禮者非取其過厚也為之中節而已故過之不得不貶不及之不得不譏十年公會衛侯于桃丘弗遇公羊以謂公不見要也何休云時實公欲要衛侯衛侯不肯見公非也公會衛侯于桃丘者即公本約衛侯為會于桃丘也弗遇者公後其期衛侯已去不相遇逢也公羊本解遇為一君出一君要之故謂此為公要衛侯推其文而不可為説何者公羊既云會者期辭矣又云一君要之若實期辭非要之也若實要之非期辭也二者不可並而離析乖逆非經意也要曰遇者相遇云爾何用紛紛乎齊侯衛侯鄭伯來戰于郎公羊以謂稱來戰者近乎圍也非也近乎圍豈實圍哉聖人豈採其近乎圍之意而書之哉且春秋惡戰耳不分别逺近逺近何當於義乎又曰內不言戰言戰乃敗矣亦非也內不言敗爾言戰何傷十一年宋人執鄭祭仲公羊以謂知權非也若祭仲知權者宜效死勿聽使宋人知雖殺祭仲猶不得鄭國乃可矣且祭仲謂宋誠能以力殺鄭忽而滅鄭國乎則必不待執祭仲而劫之矣如力不能而夸為大言何故聽之且祭仲死焉足矣又不能是則若強許焉還至其國而背之執突而殺之可矣何故黜正而立不正以為行權亂臣賊子孰不能為此者乎古之人既有知之者矣突歸于鄭公羊曰突何以名問之非也突之名猶小白許叔矣何故問乎當曰突何以不繫國則曰挈乎祭仲可矣又曰其言歸何順祭仲也非也若仲之為者春秋之亂臣也如何順之乎鄭忽出奔衛公羊曰忽何以名春秋伯子男一也辭無所貶非也改周之文從殷之質非聖人之意吾既言之矣且在喪稱子者嗣也公侯伯子男者爵也文同而義異聖人豈以為嫌而避之且避成君而稱名無義之甚以謂辭無所貶則孰與直稱子哉柔會宋公陳侯蔡侯盟于折公羊曰柔者何吾大夫未命者非也再命耳十二年陳侯躍卒何休云不書葬者他子也他不稱侯嫌貶在名例不當絶故復去躍葬不亦甚乎其説之巧也凡公羊以謂葬者據百二十國寶書也其法應書則得書不應書則不得書然則宜書曰某國葬某公猶曰宋葬繆公然今春秋所書皆曰葬某國公者是由內録也由內録者善惡何别焉而以謂有得書有不得書甚無謂也唯弒君滅國不書葬耳蓋以謂無臣子也凡何休所説諸葬不葬義類不可信皆若此丙戌衛侯晉卒何休云云者非也直使有謬誤者仲尼因史作經知日月不可為例故悉置不革可以示必信耳非他也丁未戰于宋公羊云內不言戰言戰乃敗矣非也若偏戰而內勝何得不言戰若曰內不言敗言戰則敗矣可也十三年公會紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績公羊云何以不地近也然則近故不地則郎之來戰非為近也明矣而方解之曰郎猶可以不地不亦誣乎又曰其言戰從外也非也戰者聖王所有假令春秋實王魯猶不為諱戰戰而勝何故諱乎其意以為敗則言戰言戰則敗也今實不敗不可言戰故云從外矣不知凡書戰而不言敗績者乃諱敗耳書戰而言敗績者敗者他國也必言戰而後見其敗何得不言譬如傳曰全曰牲傷曰牛而經曰鼷鼠食郊牛牛死改卜牛然則改卜之牛未有傷也何不曰改卜牲乎蓋以謂稱牛不疑于傷也今書戰亦不疑于敗故牛實不傷而謂之牛有不疑也戰實不敗而謂之戰亦有不疑也又何以為從外乎十四年御廩災何休云火自出燒之曰災按公羊例大曰災小曰火大者朝廷也小者宫寢也即有火自出而燒宫寢與非自出之火燒朝廷欲如何書之乙亥嘗公羊以謂御廩災不如勿嘗而已矣非也天災可畏而不可知為國家者見災而懼則足矣何廢宗廟之祭乎以謂當順天意是推難測之神道而曠明白之人事也若天道可畏則莫若恭敬禮事以謝之矣昔堯之時大水九年湯之時大旱七年若必廢祭以自責者吾見荆棘生於宗廟矣春秋權衡卷九
