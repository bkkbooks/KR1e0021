body:
  text: 春秋權衡卷八宋劉敞撰公羊之所以異二傳者大指有三一曰據百二十國寶書而作二曰張三世三曰新周故宋以春秋當新王吾以此三者皆非也以謂夫子作春秋祖述堯舜下包文武又為大漢用之訓世故不專據魯史而已然則齊髙偃帥師納北燕伯于陽公羊以為公子陽生也文當曰齊髙偃帥師納北燕公子陽生于北燕有所誤有所闕故云爾不知百二十國寶書悉爾書謬乎若悉爾書謬信公羊之說可也若百二十國寶書有一二不同仲尼何不去彼取此乎且百二十國之書衆矣不容悉謬又不宜悉同今奈何不革其不革也然後知所據魯史而已且公羊見晉晚入春秋則曰後治同姓同姓之先治者又不可遽數皆泥于百二十國寶書而不知本據魯史而作魯史所書有詳有略仲尼止考核是非加褒貶而已非必百二十國書也又所謂張三世者本無益于經也何以言之傳曰所見異辭所聞異辭所傳聞異辭則是言仲尼作經託記傳聞而已說者乃分裂年歲參差不同欲以蒙澒其說務便私學假令推日月之例書之詳而中其義則曰當若此矣適不中義則猥曰此傳聞若所聞若所見故略故詳也以是通之以是扶之無往而不入要之無益于經而便于私學而已捨三世而言春秋豈不明乎又傳曰隱亦逺矣曷為為隱諱隱賢而桓賤也然則本說三世欲辨逺近近者諱而逺者不諱也今更不然賢者諱之不肖者不諱之通春秋之內無不如此亦何用分三世乎公羊以謂國君以國為體故先君之恥猶今君之恥雖百世猶可復讎而言春秋之義逺則不諱豈不橫出三世反戾其言乎又所謂新周故宋以春秋當新王者亦非也聖人作春秋本欲見褒貶是非達王義而已王義茍達雖不新周雖不故宋雖不當新王猶是春秋也聖人曰不怨天不尤人知我者其天乎今天不命以王天下之任而聖人因懟而自立王天下之文不可訓也且周命未改何新之說傳既以百二十國寶書為據又見記成周宣榭火則謂外災不書今忽書者新周也既無足以輔經而厚誣聖人不亦甚乎說者又謂作春秋為漢制迷惑䜟書以僞為真其端出于欲干合時君排抵二傳也今而觀之而不掩口笑也幾希矣又曰變周之文從殷之質夫春秋褒貶本也文質末也車服器械封建制度皆春秋所後言也居周之世食周之粟擅合其爵伯子男擅易其時田獵用夏時孟豈仲尼所謂非天子不制度不議禮不考文者乎此不可通之尤者而儒者世世守之意乃欲尊顯仲尼而不知陷于非義也雖然為章句者則守之矣為道者則未之守也隱公元年者公羊以謂諸侯不得改元春秋王魯故託稱元非也元者始爾君之始年謂之元年猶嵗之初月謂之正月非有天子諸侯之辨也說者以謂變一為元元者氣也言天地由之始生夫人君即位何乃逺及天地未生之前乎又曰上無所繫故使春繫之夫制元年者人君也非實太極也以一為元氣何當于義哉其過在必欲成五始之說而不究元年之本情也上無所繫者文勢當然聖人雖欲損之不可損雖欲益之不可益又何云云乎王者孰謂謂文王也亦非也公羊言王者正受命是矣其言文王則非矣春秋者王政之本故假王以正萬事置之春正之間者明天子受命于天諸侯受命于君不但指文王也又公羊以謂黜周王魯即指文王非黜周也又公羊以謂王道三統即指文王非三統也此其自相背也曷為先言王而後言正月此問之非也文不可先正月而後王也則問曰曷為先言春而後言王據春隨時王之正則可謂云爾已矣又公羊以為春者天之所為正者人之所為所以先春而後王也亦非也元年獨非人之所為乎何以獨在春上大凡元年春正月公即位此八字者文理相須茍載事者必皆庸焉非聖人新意也唯王一字在春正之間為聖人新意耳則所謂五始者殆虛言乎何休又言諸侯不奉春王之正則不得即位按桓公書即位非能奉王正也此皆蔓衍其辭飾春秋焉可矣非傳道必信之語也公何以不言即位公羊以謂桓貴隱卑然則國非隱公之國也隱公亦僭而有之耳始僭而有之終辭而反之可謂知過矣未可謂能讓也今公羊美隱公善讓非其義矣苟為非己有而有之者又可謂之讓豈春秋之意乎故讀春秋則多隱之讓推公羊則所謂讓乃非讓也然則公羊必欲謂隱公讓則宜先正隱公始有國必欲謂桓公賤則宜先正桓公始無國則隱得讓名桓得賤號矣今隱本無國則讓非其名也桓本有國則賤非其號矣隱無讓名則何賢之有桓無賤號則何惡之紀又桓既本正當與商人同例不當春秋深絶之又曰子以母貴母以子貴何休因曰妾母得稱夫人所以使漢室多母后之亂者由此言也嗚呼可不慎乎公及邾婁儀父盟于眛公羊以謂及言汲汲也我欲之也非也按公㑹齊侯盟于柯當是時曹子手劔劫齊侯以復汶陽之田可謂我欲之矣而反書㑹則及者非我欲之也且公羊說春秋進儀父者為其慕義首與公盟也今按文欲盟汲汲者魯也而受褒者邾也不亦反施之乎且公羊謂及者我欲之之辭即外欲之當如何書外欲之我不欲之書暨容可若外欲之我亦欲之當如何書曰㑹者無淺深之辭書㑹容可然而柯之盟則不通也按春秋有相與及者此是也有相次及者及其大夫孔父是也有逮及者公追齊師弗及是也文為事出不專汲汲而已汲汲已無義矣儀父者公羊以謂褒之也言以魯為新王故褒儀父于先至也非也假令春秋誠以魯為新王者儀父猶不應褒何以言之本汲汲者魯也非儀父也魯汲汲儀父不汲汲如有新王亦勿誅儀父則幸矣又何褒之敢望豈有王者作而汲汲從人盟乎有汲汲從人盟而得為王者乎鄭伯克假于鄢克者公羊以謂殺也曰謂之克大鄭伯之惡何休因云以弗克大郤缺之善知加克大鄭伯之惡非也彼弗克納者猶曰弗果納云爾非克假之比也即以弗克為善弗克葬有何善乎即以克之為惡弗克葬有何惡乎大凡春秋之文與事推移非拘一而廢百也是何異求鄭人之璞于周人者哉鄭人謂玉之未剖曰璞周人謂鼠之未臘曰璞知其同名而不知其異物也故吾謂克之者戡之也戡之者殺之也不直言殺而言克者假有徒衆非直殺一夫者也于鄢者公羊謂當國而在外也曰在內雖當國不地也不當國雖在外亦不地也何休曰明當國者在外乃地爾為其將交連鄰國復為內難故録其地明當急誅之然則諸傳所稱者討賊例也地與不地皆已殺而後見又何說將交連鄰國復為內難乎死乃復有為難者乎休又曰其當國者殺于國內禍已絶故亦不地若然殺于國外者禍獨未絶乎均之禍絶而已則國內猶國外也天王使宰咺來歸惠公仲子之賵何休云稱天王者王不能自正而上繫于天非也周雖微豈自嫌于楚越哉周雖自嫌于楚越春秋亦豈嫌周于楚越哉楚越稱王春秋正之為子周自繫天春秋可勿正乎且理必無自稱天王之義此乃諸侯尊天子之號耳不如何休言也宰咺者公羊以謂中士當以官録非也宰者尊稱非中士所當冒又設非宰士可云司徒司焉司寇司空咺乎來歸者公羊以謂來者不及事也而分别之曰㑹葬奔喪稱來者常文也歸賵含襚稱來者不及事也其及事者宜去來而王使榮叔歸含且賵者又實不及事則公羊所說都不信也吾以謂喪有早晚著之于經其及事不及事可見也假令去來而不及事不可强通以及事假令不去來而及事不可强排以不及事其情易明何假委曲為例乎然則有來而歸者有歸而不來者此其所以文異也㑹葬也奔喪也歸賵也襚也含也衛寶也公孫敖之喪也濟西田也有何異乎惠公仲子者公羊以謂仲子惠公之妾非也此與僖公成風同耳成風豈僖公之妾乎又曰兼之非禮也是又以惠公仲子分兩人也亦非也妾母因子而得賵故舉母冠子明其以子得賵非兩人也公羊以妾母得稱夫人故為此說茍知道者皆足以知其非矣又足辨乎及宋人盟于宿公羊以謂兩微者非也盟者國之大事豈兩微者所定乎茍有兩微者盟春秋固不書之然則此自公也諱之沒公矣蔡伯來公羊以謂奔也不及奔者王者無外也非也周人未滅降以為國魯人不王進以為君修虛文而害實義仲尼豈為之乎且王者無外言奔不言出足矣亦猶言入不言歸也又欲不言奔則與祭公來何以異乎公子益師卒公羊以謂何以不日逺也何休曰所見之世恩已與父之臣尤深大夫卒有罪無罪皆日録之吾謂已與父之臣雖誠有可恩者若有罪如季孫隱如者又可恩之何以訓後世乎彼實逐其君得以小恩妨大義乎又曰於所聞之世王父之臣恩少殺大夫卒無罪者日録有罪者不日吾謂公孫敖非無罪者實著甲申叔孫得臣傳無罪惡卒而不日何休乃引公孫敖以為諱恥而排叔孫得臣以見知不亦誣乎又曰所傳聞之世髙祖曽祖之臣恩淺大夫有罪無罪皆不日吾謂春秋治十二世之事善善惡惡今如所言是使善惡混淆善不見旌惡不見貶也且公羊謂春秋以隱公當新王也有王者作方治內之時而忘恩於其卿佐乎故事在可以然之域則歸之三世在不可以然之域則致之新王使其言如循環而不可訓以迷世罔民也此學者之禍也故辨者能惑人以言而不能服人之心此之謂歟二年無駭帥師入極公羊以謂入者滅也無駭不氏者疾始滅也非也春秋雖為國諱然皆使其文不害實今更滅為入則是文害實也且無駭不氏亦非疾始滅也滅人之國重矣始滅終滅其坐應同且公羊以春秋王魯所傳聞之世治起於衰亂之中用心尚粗豈非謂刑新國用輕典乎今貶無駭反特重貶鄭遊速反故輕殊不可曉也按春秋之初接近西周先王餘法猶存諸侯僭佚猶鮮故魯卿執政多再命翬俠無駭皆是也公羊不知見無駭不氏因謂貶也又惡貶之過例因謂入者滅也此求其義不得而强為之詞也紀履緰來逆女公羊以謂不稱使昏禮不稱主人非也按禮國君求昏之辭曰請君之玉女與寡人共有宗廟之事豈非主人乎又公羊外使文稱使內使文稱如若昏禮不稱主人履緰不稱使可也為養廉逺恥也公子遂如齊逆女故稱使乎豈聖人於他國之君則欲使養廉逺恥於己國之君則欲使勿養廉逺恥乎此其不通也夫人子氏薨公羊以謂隱之母也此公羊以妾母得稱夫人故謂隱母為夫人也然妾母實不得稱夫人當此之時禮法尚少存惠公仲子是也而隱公又賢豈其違禮私貴其母哉三年二月己巳日有食之公羊以謂或日或不日或失之前或失之後非也公羊以日月為例故為此說然聖人據魯史以作經是以稱日其事則史其序則主㑹者為之其義則丘有罪焉若夫日月有詳略此皆史文也聖人所不得改之又非不欲改也無所據也事有善惡史文雖不實聖人則正之何則事故與日月不同也假令舊史無日月今例當日橫增之則不信不增之則反於例如此者聖人所無可奈何也是以春秋不取日月也若夫人事之善惡政令之得失聖人嘗上考三五之世矣與天下共之故加其意而損益焉不疑故也故吾論春秋不以日月為例豈不然乎天王崩公羊以謂記崩不記葬必其時也非也公羊據百二十國寶書故云不及時書過時書我有往者書不知凡書者皆為我有往者耳其名氏著者命卿也其名氏不著者微者也其不志葬則公自往也春秋常事不書故奔喪會葬朝京師皆不書也若以必其時則不書是無以見公自往與不自往葬宋繆公公羊以謂不及時而日渴葬也渴急也不及時而不日慢葬也過時而日隱之也過時而不日謂之不能葬也當時而不日正也當時而日危不得葬也豫謂渴之與慢同施於葬先時耳若謂慢與渴有别則何不出過時而慢之例又所謂過時而日者直指齊桓公而言爾當是時公子爭國隱之可也若夫衛穆公宋文公成三年無齊桓之賢無爭國之患過時而日有何可隱之乎若如傳所言者衛穆公宋文公無他患難而過時乃葬宜不日以見其慢無為乃隱之也又所謂過時而不日者謂平安無故而懈緩不能葬者也若國有憂亂嗣子放弒雖復過時豈臣子本情而當責以不能葬乎諸如此義不可勝紀故稍舉焉其蔽在於以日月為例也吾既言之矣四年莒人伐把取牟婁公羊以謂外取邑不書疾始取邑故書非也公羊以百二十國寶書言之故云爾不知他國取邑有赴有不赴也赴者書之不赴者不書之其書之則春秋所有也其不書之則春秋所無有也且伐人取邑要為不可則疾始與久等耳長葛為久等為取邑而書何必分别外取邑哉何休又云外小惡不書故此處見疾始也然則傳聞之世外小惡不書則所聞所見之世應治外小惡諸取邑者何不據百二十國寶書悉書之而獨泛謂外取邑不書乎衛州吁弒其君完公羊以謂不稱公子當國也非也諸弒君而稱公子公子而為大夫者也公子而不稱公子公子而未為大夫者也大夫弒君其三命稱氏其再命稱名其不命稱盜通乎春秋亦不說已當國與不當國何足辨乎公子公孫弒其君有不當國乎非公子公孫弒其君有當國乎宋督宋萬豈當國為君者哉公子商人豈不當國為君者哉乃曰宋督為馮取國故使氏國然則齊陳乞亦為陽生取國何不使乞氏齊哉又曰商人次正當立故氏公子然則陽生亦本正當立何不氏公子哉以為陽生為諼故去公子商人豈不先諼舍而後弒之哉其諼之同而氏不氏異何也以謂陽生諼成于乞商人已自諼之則是諼成他人者不得次正之名而已自諼之者猶冒次正之號當使其罪差輕不亦失輕重乎且春秋書陳乞弒君見諼成於乞足矣何不氏陽生以公子少明其次正乎此皆非聖人本意也公及宋公遇于清何休云言及者起公要之其意謂及汲汲也非也及者與耳義不可稱曰公㑹宋公遇于清若爾便似遇者别一朝㑹之名非卒然相遇也公羊既無以釋及遂强云一君要之必欲使有汲汲之意居間以符元年之言而何休因就成之其去道不亦逺乎翬帥師㑹宋公伐鄭公羊以謂翬不氏者與弒公貶也非也當此之時翬未弒君可得貶乎且公羊說仲遂卒不於弒時貶者曰於文則無罪於子則無年是明不貶人於無罪也今此雖在隱年而固在無罪之時如何乃貶之乎又何休以謂桓三年乃無王者三年之前未無王也然則必及其已無王而後貶也於此貶翬可謂當乎是皆公羊何休之說而忽自違之謂他人何五年考仲子之宫公羊以謂仲子桓母非也說已見元年歸賵初獻六羽公羊以謂僭諸公近之矣而未合也魯祭周公宜用八佾祭魯公宜用六佾祭羣公宜四佾今祭仲子用六佾是以仲子僭魯公以仲子僭魯公則且以羣公僭周公矣言六羽之僭而不言八佾之僭者在春秋之中而不可言也此所以季氏得僭八佾也宋人伐鄭圍長葛公羊以謂邑不言圍非也圍之為義施於塹守而已無擇於國與邑也茍有過告者則書之何為不言乎且春秋之所以不擇於國與邑而悉書之者有說為害民傷財也何謂邑不言圍春秋權衡卷八
