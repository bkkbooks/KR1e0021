body:
  text: 春秋權衡卷十六宋劉敞撰許男新臣卒榖梁曰死於師何為不地內桓師也非也書卒于師不足貶桓公不書卒于師不足褒桓公諸侯之死當地不當地自有常義不必詭文以伸桓公也齊人執陳袁濤塗榖梁曰齊人者齊侯也不正其踰國而執也若然齊人執鄭詹何以謂之與執乎且齊為伯主陳其屬國大夫有罪所當執也必無踰國執之者將安執之乎公至自伐楚榖梁曰有二事偶則以後事致後事小則以先事致其以伐楚致大伐楚也非也凡榖梁所說致君之義茍取臨時而無通理不足致詰者也豈知致者歸格告致之事乎五年晉人執虞公榖梁曰其曰公何也猶曰其下執之之辭也其猶下執之之辭何也晉命行乎虞民矣非也五等之爵有尊卑矣褒貶進退宜以其類豈有貶之而反崇其爵哉且仲尼欲以見虞公不仁猶其民執之者則冝若梁亡之例書虞執其公則可謂云爾已今春秋乃曰晉人執虞公非其下矣何謂其下執之邪八年用致夫人榖梁曰言夫人而不言氏姓立妾之辭也近之矣未盡也夫稱夫人而謂之用致此立妾之辭也不言氏姓不為見其妾也蓋有深義矣非榖梁所能見九年晉里克殺其君之子奚齊榖梁曰其君之子云者國人不子也非也欲云弒其君則一年不二君欲云弒其子則子不可特稱欲云子奚齊且亂於里克之子欲云晉里克殺晉子則子當繫先君而言且不當殊晉子於里克也故云君之子爾以謂國人不君故繫於君可謂言辨而理非十年晉殺其大夫里克榖梁曰其以纍上之辭言之何也殺之不以其罪也其殺之不以其罪奈何里克所為弒者為重耳也非也假令重耳賢便可弒彼以立此乎又曰夷吾曰是又將殺我乎故殺之不以其罪也亦非也夷吾既云是又將殺我矣此其責弒二君之言也可謂殺不以其罪者乎十二年楚人滅黃榖梁曰管仲死楚伐江滅黃桓公不能救故君子閔之也非也書楚人滅黃何以見其閔乎且榖梁謂滅國有三術中國日卑國月夷狄時夫黃非夷狄也今滅而書時是屈之使從夷狄矣曽以是為閔乎十四年沙鹿崩榖梁曰無崩道而崩故志之也非也春秋正名名者出於理者也無崩道則亦無崩名矣今謂之崩而曰無崩道可謂理乎然則沙非山名也鹿非山足也謂沙鹿山是也謂沙山之鹿非也冬蔡侯肸卒榖梁曰諸侯時卒惡之也非也君薨臣赴赴以日月此禮之常也臣子少慢則赴不具日月大慢則都不赴春秋不改者因文可以見也若必以惡此君則卒書時者鄭厲公衛惠公內則篡國外則叛王何為春秋不惡之哉十五年齊師曹師伐厲劉子曰以榖梁例言之曹無師曹師者曹伯也於此冝問曹無師其曰師何曹伯也曹伯則曷為不言曹伯以其不言齊侯不可言曹伯也其不言齊侯何也以其不足乎揚不言齊侯也乃可以充榖梁子之例矣而於此遂都不言何哉豈齊侯伐厲為有罪當貶稱師乎抑齊師無罪曹伯有罪貶稱師乎向者牡丘之會亦先次後救事與聶北同何不曰齊師宋師陳師衛師鄭師許師曹師盟于牡丘遂次于匡乎推此以較前後知所謂曹無師以其不言齊侯不可言曹伯皆妄說雖使榖梁復生雅亦不能持其論己卯晦震夷伯之廟榖梁曰晦冥也安知非晦朔之晦乎又曰夷伯魯大夫也說者因謂夷諡伯字也亦非也吾於左氏既言之矣晉侯及秦伯戰于韓獲晉侯榖梁曰晉侯失民矣以其民未敗而君獲也非也凡為君而見獲茍不失民將焉取之顧春秋所以不書師敗績者舉君獲為重耳且榖梁以宣二年宋師敗績獲宋華元為盡其衆以救其將明華元之得民然則華元以敗績得民為褒晉侯以不敗失民為貶即有上不及華元下不為晉侯而獲者春秋欲何書之今以一為褒以一為貶未有常辭也吾請求其常辭如何十六年六鷁退飛過宋都榖梁子曰石無知之物故日之鷁微有知之物故月之非也言是月者宋不告日嫌與五石為一日故分别之耳榖梁本以日月解經因此以誣聖人欲後世信之豈實然乎公子季友卒榖梁曰稱公弟叔仲賢也非也言季友之賢不過季子來歸足矣死之日非復賢也且書季友云賢則書仲遂亦可謂賢乎十七年滅項榖梁曰孰滅之桓公也何以不言桓公為賢者諱也非也吾既言之於公羊矣十八年宋師及齊師戰于甗榖梁曰戰不言伐客不言及言及惡宋也非也正月伐齊者宋公也五月戰于甗者宋師也戰不言伐於此何妨乎又客不言及言及以謂貶矣莊二十八年齊伐衛衛人及齊人戰彼時榖梁亦以春秋惡齊則何不使齊及衛乎鄭𤣥為榖梁起廢不能深見舉之病反舉衛人以為比是藥之使亟也邢人狄人伐衛榖梁曰狄稱人何也善纍而後進之伐衛所以救齊也功近而德逺矣非也吾於公羊既言之矣二十年西宫災榖梁曰謂之新宫則近為禰宫以諡言之則如疏之然以是為閔宫也非也榖梁不云親之非父尊之非君繼之如君父者受國焉爾者乎何為不可謂之新宫且新宫非禰宫也以新宫近禰宫而更謂之西宫是推而逺之矣比稱諡不亦愈疏乎二十一年執宋公以伐宋榖梁曰以重辭也非也直云執宋公以伐宋文理盡矣不可改易非於其間曲有輕重也二十二年宋公及楚人戰于泓宋師敗績榖梁曰春秋三十有四戰未有以尊敗乎卑以師敗乎人者也非也適宋公以師敗乎人爾春秋據事實録非以為褒貶也今年及邾人戰于升陘榖梁曰不言及之者為內諱也蓋指魯公公尊人卑何謂未有以尊敗乎卑者哉又曰以尊敗乎卑以師敗乎人則驕其敵襄公以師敗乎人而不驕其敵何也責之也吾不知於春秋何以為驕其敵何以為不驕其敵其驕其敵也如何褒之其不驕其敵也如何責之所以為褒之責之也如何書之今此宋公榖梁以謂不驕其敵者於經何以驗之哉又曰衆敗身傷七月而死如此何不書宋公敗績乎鄭𤣥雖强為解不足文之又曰道之貴者時其行勢也似責宋公不早擊楚於險而失機會也何其悖乎如宋公之用心不鼓不成列凛凛乎忠厚有德之人哉雖師敗國削猶非其恥也春秋豈惡其不能以詐取勝哉凡泓之戰公羊以為褒榖梁以為貶言貶者非也言褒者亦未是吾各論之矣二十三年齊侯伐宋圍閔榖梁曰伐國不言圍邑此其言圍何也不正其以惡報惡也非也假令但書伐宋不書圍閔豈不惡之哉惡之不待圍閔而見亦何必書圍閔哉若復一國以惡報惡伐而不圍則春秋遂可虛增圍邑以見之乎宋公茲父卒榖梁曰其不葬何也失民也其失民何也以其不教民戰則是棄其師也非也宋公不忍厄人於險而致敗爾豈不教民戰者乎審如榖梁言泓之敗何不書宋棄其師乎周末時諸侯交爭恥守信而好竒功故榖梁子亦以宋公為非二十五年宋殺其大夫榖梁曰其不稱名姓以其在祖之位尊之也非也春秋非孔氏家牒當為後世書法耳何得擅諱其祖名哉且傳曰子所雅言詩書執禮皆雅言也又曰臨文不諱若詩書執禮皆雅言而臨文不諱安得諱祖之名遂不書乎楚人圍陳納頓子于頓榖梁曰蓋納頓子者陳也非也觀其文可以見其繆矣又何辨乎公會衛子莒慶盟于洮榖梁曰莒無大夫其曰莒慶何也以公之會目之也非也直云衛子莒人豈不可乎在春秋之中此類多矣何獨至於慶也而目之乎向令但會莒慶而無衛子謂之目云猶有可諉今衛子之外又目慶也吾知榖梁必將窘於此而莒無大夫之說不可復恃矣二十六年公會莒子衛寧速盟于向榖梁曰公不會大夫其曰寧速何也以其隨莒子可以言會也此例亦多矣何為獨發於此齊人侵我西鄙公追齊師至酅弗及榖梁曰人微者也侵淺事也公之追之非正也按榖梁例苞人民驅牛馬曰侵今齊為無道至如此矣追之是也反蒙不正之貶乎又曰弗及者弗與也可以及而弗敢及也內辭也然則榖梁譏公之弗敢及又何云追之非正乎楚人伐宋圍緡公以楚師伐齊取榖榖梁曰伐國不言圍邑此其言圍何也以吾用其師目其事也非道用師也非也楚自以人伐宋公自以師伐齊人之與師異矣豈一哉吾於公羊既言之矣二十八年晉侯侵曹晉侯伐衛榖梁曰再稱晉侯忌也非也即實再出何以知之公子買戍衛不卒戍刺之榖梁曰先名後刺刺有罪也非也會不言所為言所為皆譏也然則刺不言所坐言所坐皆諱也少文矣晉侯入曹執曹伯畀宋人榖梁曰以晉侯而斥執曹伯惡晉侯也非也向若稱晉人執曹伯則榖梁毋乃又如齊人執陳袁濤塗而譏其踰國以執乎盟于踐土榖梁曰諱會天王也非也若實㑹天王者罪大矣可得諱乎衛侯鄭自楚復歸于衛榖梁曰復者復中國也歸者歸其所也此語無理蓋不足辨又曰鄭之名失國也亦非也諸亡國者春秋尚不忍悉名之況鄭之國未亡乎又衛侯前出奔今復歸出時可謂失國未嘗名復歸可謂得國反名之此乃吾所不解也天王守于河陽榖梁曰全天王之行也非也天子巡守者巡所守也云天王巡于河陽可矣言天王守于河陽何哉公朝于王所榖梁曰朝于外非禮也然則天王在是諸侯可勿朝乎又曰會于溫言小諸侯溫河北地以河陽言之大天子也非也溫與河陽大同小殊非一地也言諸侯天王大小反不明必待地乃明乎又曰日繫月月繫時以晉文之行事為已顛矣亦非也晉文行事之顛豈患不見乎必待日月乃見哉此皆不足以論春秋晉人執衛侯歸之于京師榖梁曰此入而執非也正自執之爾何必入乎曹伯襄復歸于曹榖梁曰天子免之因與之會其曰復通王命也非也即天子免之何故猶名乎且衛侯鄭復歸于衛榖梁謂其名者失國也今如曹伯襄但見執爾非失國也何故亦名二十九年介葛盧來榖梁曰其曰來卑也非也牟人葛人亦可謂卑矣何以得言朝哉三十年衛侯鄭歸于衛按榖梁前二十八年云鄭之名失國也然則此非失國者何以亦名之又前云復者復中國歸者歸其所然則此亦復中國此亦歸其所何不曰復歸乎公子遂如京師遂如晉榖梁曰此言不敢叛京師也然則此固魯公當時意爾春秋據事先後而書本無異者何強解乎三十一年乃免牲榖梁曰乃者亡乎人之辭非也此又自當云乃非若乃克葬而克葬可移易者也何謂人亡乎三十二年十有二月己卯晉侯重耳卒按十七年齊侯小白卒榖梁曰此不正其日之何也其不正前見矣然則小白不正卒不得書曰以其不正前見故得書曰也今重耳亦不正者其不正前未嘗見則卒不當日而日之何哉三十三年晉人及姜戎敗秦師于殽榖梁曰不言戰而言敗狄秦也非也此傳云晉人及姜戎要而擊之殽夫要而擊之則非戰矣春秋可得强書戰乎且平心論之晉則背殯厄人於險而秦反見狄不亦誤哉又曰徒亂人子女之教無男女之别此吾所不知也又云秦之為狄自殽之戰始也吾則知之矣此傳妄也榖梁公羊左氏三家說經多同異不相能久矣此之所是彼以為非彼之所是此以為非未易據此難彼也吾欲且置彼二家之言秦穆賢而以詩書決之儻可乎按詩秦自襄公始為諸侯及穆公而大矣言穆公之事不聞自殽之戰而狄也若求於書秦穆公敗於殽悔過自責作秦誓仲尼取以次三王之末因此論之秦之不為狄自殽之戰始則可矣未見其始為狄也文公元年楚世子商臣弒其君髠榖梁曰日髠之卒所以謹商臣之弒也非也即不日者乃不謹商臣之弒乎日之何當二年及晉處父盟榖梁曰何以知其與公盟以其日也非也公盟不日者多矣何以能必之四年逆婦姜于齊榖梁曰逆者誰也親迎而稱婦或者公與曰公也非也榖梁既云親迎而稱婦則稱婦乃宜也又何以見其非成禮於齊乎非責也且令非成禮於齊者云公如齊逆婦姜足矣文不當沒公沒公者唯所隱諱乃然耳至於刺譏常事未有沒公也此似不識春秋不但失解而已五年王使榮叔歸含且賵榖梁曰兼歸之非正也非也春秋惡歸之云乎豈曰惡兼之云乎又曰其不言來不周事之用也亦非也宰咺豈周事之用者乎何以言來六年閏月不告月猶朝于廟榖梁曰閏月者附月之餘日也天子不以告朔而喪事不數也非也閏月亦有政可得勿告乎吾於公羊既言之矣七年三月甲戌取須朐榖梁曰取邑不日此其日何也不正其再取故謹而日之非也設不日則聽其取乎諸取邑不日者皆聽之矣宋人殺其大夫榖梁曰稱人以殺誅有罪也非也若有罪何不名之乎公會諸侯晉大夫盟于扈榖梁曰其曰諸侯略之也不知略之者何故哉此似不了直強言之爾八年宋人殺其大夫司馬宋司城來奔榖梁曰以其官稱無君之辭也鄭𤣥解云謂無人君之德皆非也既有大夫矣何謂無君又晉殺其大夫郤錡郤犫郤至並尸三卿傳曰禍於是起矣亦可謂無君德者則曷為不以官稱之九年葬襄王榖梁曰志葬危不得葬也日之甚矣其不葬之辭也非也上云得臣如京師者即會葬之人矣何謂不葬乎故以日月為例其膠固至如此夫人姜氏至自齊榖梁曰卑以尊致病文公也非也夫人歸寧禮也反致於廟禮也夫人出不致者皆非禮也致者何病乎文姜哀姜縱恣出遊反皆不致也如榖梁言是不病哉秦人來歸僖公成風之襚榖梁曰秦人弗夫人也非也秦人唯以夫人之禮視成風故來禭之耳豈云弗夫人乎且榖梁謂魯人逼秦使來禭乎固秦人自來禭也若魯逼秦云秦人弗夫人可矣若秦自來豈端欲慢魯君之祖母弗夫人哉十一年叔孫得臣敗狄于鹹榖梁曰不言帥師而曰敗何也直敗一人之辭也非也不言帥師者將卑師少爾有何可疑哉又曰何為不言其獲古者不重創不禽二毛故不言獲為內諱也云魯既射長夷之目又斷其首是以諱之亦非也榖梁本意謂長狄一人力足敵衆故變獲言敗者起長狄之强也既變獲言敗敗即獲矣又安得不言獲為魯諱之說乎且如何為文哉季子敗莒師獲莒拏榖梁以謂春秋貶之今得臣獲長狄榖梁以謂春秋諱之事相同也而是非不一誰能知之邪要知此非長狄吾既言於公羊矣十三年公及晉侯盟還自晉榖梁曰還者事未畢也自晉事畢也非也畢則云畢未畢則云未畢且畢且未畢如何可為義乎十四年齊人執單伯齊人執子叔姬榖梁曰私罪也非也何不用陳袁濤塗鄭祭仲例以解齊人乎十五年宋司馬華孫來盟榖梁曰其以官稱無君之詞也非也有司馬矣何謂無君乎必無君者如齊大夫盟于蔇乃可通爾且華孫來不稱使以解無君可也指司馬而謂之無君不亦悖乎齊人來歸子叔姬榖梁曰父母於子雖有罪猶欲其免也非也郯伯姬來歸者此有罪見出者也齊人來歸子叔姬者此無罪齊人强出之者也曰齊人來歸子叔姬者猶曰齊人來歸子叔姬云爾凡諸侯出夫人禮皆有大夫將命則郯伯姬亦當云郯人來歸伯姬所以春秋直云郯伯姬來歸者伯姬有罪父母當受之而辭不教者也十六年毁泉臺榖梁曰喪不二事二事緩喪也以文為多失道矣非也但毁一臺何能令緩喪乎聲姜九月而葬所以緩者亦猶作僖公主矣豈為毁臺乎又曰自古為之已毁之不如勿居而已矣按榖梁本以緩喪為譏復出此者又似晚得公羊之說而附益之耳非一家學也十八年子卒季孫行父如齊吾既言之於莊公末年矣宣公元年會晉師于棐林榖梁曰大趙盾之事也非也即大趙盾名之是已無為沒其名也且卿大夫不得㑹公侯春秋之常也今晉侯不行趙盾專國亦無貶則善矣曷為大之邪二年獲宋華元榖梁曰言盡其衆以救其將也然則韓之戰不得獨云晉侯失民三年乃不郊榖梁曰乃者亡乎人之辭吾既言之矣五年齊髙固來逆子叔姬榖梁曰不正其接內故不與夫婦之稱非也吾於莒慶既言之矣六年晉趙盾衛孫免侵陳榖梁曰其不言帥師何也不正其敗前事非也將尊師少稱將此通例也為榖梁者皆用之矣何忽昏妄乎即以謂命卿之將舉當言帥師者十一年公孫歸父㑹齊人伐莒不言帥師以何事敗之哉八年公子遂如齊至黃乃復榖梁曰復者事畢也非也遂受命而行辭病而反此春秋所惡也乃加事畢之文為之文過何以訓事君仲遂卒于垂榖梁曰其曰仲何也踈之也是不卒者也非也即春秋欲踈之何不但書遂卒若無駭與俠乎且春秋欲疏弒君之臣不書其氏反書其字何為哉葬我小君頃熊雨不克葬榖梁曰葬既有日不為雨止禮也非也朝會常事耳雨霑服失容則廢朝會况葬者大事所謂慎終追逺人情之所不忍匆匆者也豈反冒雨不待成禮哉徐邈云士喪禮有潦車載簑笠者疑葬當不為雨止非也潦車載蓑笠者固未葬禦雨之用爾九年晉侯黑臀卒于扈榖梁曰其地於外也其日未逾境也非也未逾境猶在國爾何得書其地然則扈者他國之地名非晉地也十年齊崔氏出奔衛榖梁曰氏者舉族而出之之辭也非也凡春秋褒善貶惡而已矣舉族而奔何足記哉且榖梁曰使舉上客而不稱介客重而介輕故也今崔杼則重崔族則輕輕重相冒書於春秋何其不憚煩乎天王使王季子來聘榖梁曰其曰王季王子也其曰子尊之也非也若不尊之但云王季乎則與王猛何異哉但王季何以得指以為王子哉以義理推之季者少也曰王弟可耳如榖梁之言季既王子矣何以不直書王子乎意者王者之尊其子不得以其屬通哉王子虎何以書也今斷王季於上析子於下不可訓解皆謬說也十一年楚人殺陳夏徴舒榖梁曰此入而殺其不言入何也外徴舒於陳也非也言楚人殺者乃明徴舒有罪爾且先言入後言殺可謂內徴舒於陳乎夫春秋記事之書也先殺而後入皆其實録矣豈紛紛然更易古事以便私意哉十五年宋人及楚人平榖梁曰平稱衆上下欲之也非也暨齊平何以不曰暨齊人平乎又曰外平不道以吾人之存焉道之也非也楚人圍宋經厯三時幸而得平以告諸侯故魯史有其事耳且外盟會常書外平何以不可書晉師滅赤狄潞氏以潞子嬰兒歸榖梁曰滅國有三術中國謹日卑國月夷狄不日皆非也頃遂談溫梁繒蔡虢皆中國也不日潞子甲氏舒鳩陸渾皆夷狄也不時又榖梁傳不見說附庸滅者今學者則皆以卑國為附庸而榖梁乃指夔子弦子為微國按爵稱子非附庸明矣不知榖梁誤以夔子弦子為附庸邪抑學者誤以卑國為附庸邪有卑國無附庸有附庸無卑國了不可推也又曰其曰潞子賢也亦非也其意以謂夷狄稱子則是褒矣不知夷狄之爵正自當子非以賢故進之也豈有國滅身虜而得為賢者哉王札子殺召伯毛伯榖梁曰不言其何也兩下相殺也非也凡殺大夫稱其者皆君也豈可云王札子殺其大夫召伯毛伯乎又曰兩下相殺不志乎春秋亦非也春秋撥亂君臣皆譏茍有兩下相殺亂孰甚焉可得弗書乎十六年成周宣榭災榖梁曰周災不志非也宋災猶志況周災乎大凡災異之發主人告災不告異諸侯弔災不弔異理當然也後世道衰災異並告春秋因而書之以通人情無擇於周獨不志也十八年邾人戕鄫子于鄫榖梁曰戕殘也挩殺也按榖梁但言挩殺而已不言邾人何人也鄫子何為以見殺有罪乎無罪乎漫不可知春秋權衡卷十六
