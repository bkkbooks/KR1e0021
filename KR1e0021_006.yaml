body:
  text: 春秋權衡卷六宋劉敞撰十四年叔孫僑如如齊逆女九月僑如以夫人婦薑氏至自齊左氏曰稱族尊君命也舍族尊夫人也非也一事而再見者卒名之此春秋之常耳非為尊君命故舉氏尊夫人故舍族也杜氏成公逆夫人最為得禮亦非也諸侯親迎今成公使卿豈曰禮乎且使得禮則應不書書者以其非常者也十五年晉侯執曹伯歸于京師左氏云書晉侯執曹伯不及其民也凡君不道于民諸侯討而執之則曰某人執某侯不然則否非也負芻殺太子而篡之國人不義舉欲隨公子欣時而亡此非不道而何且大者天地其次君臣有人殺其君反輕於不道其民乎有忍其君而非不道其民乎夫負芻之惡未見於經也晉侯執之然後可見其罪今以左氏例推之則負芻非不道其民而晉侯妄執之爾豈其然邪宋華元自晉歸于宋杜云華元欲挾晉以自重故以外納告非也如左氏之説則魚石止華元耳大凡奔者在外而內無形援則有挾大國之勢以重其身求入而已今華元內有魚石之援則不待挾晉以為勢而自入也尚何求而挾晉哉杜氏嫌傳與牾故左右遷就以成其説此可謂信傳未可謂通經也宋殺其大夫山左氏曰不書氏言背其族也非也柔折鄭詹莒慶紀履緰皆直舉名若其見殺者則亦背其族乎左氏又曰華元自止魚石五大夫豫謂此傳未可信也華元賢臣討其一族何乃及彼五子且經又無之非必信之語也會吳于鍾離杜氏曰晉帥諸侯大夫而會之故殊會眀本非同好非也當是之時晉為伯主雖齊秦楚之強皆畏焉其肯帥諸侯大夫以就吳會乎蓋不知文不可直稱吳耳十六年楚殺其大夫公子側按左氏楚師既敗王使讓子反子反因自殺王使止之弗及此則非楚殺之經何以書楚殺乎曹伯歸自京師左氏以晉侯赦之豫謂經云歸自京師則非晉侯專之矣杜云或書名或不名或言歸自某或言自某歸傳無義例從告辭豫謂傳自無義例爾何必從告辭邪晉執季孫行父舍之于苕丘左氏以舍之者處之云爾按昭二十六年晉執叔孫婼囚之于箕共是晉地共是魯卿共是執之彼何以不云舍之于箕此何以獨云舍之于苕丘乎叔孫僑如出奔齊左氏云出叔孫僑如而盟之若然者乃當書放叔孫僑如不當書其自奔也十七年九月辛丑用郊杜云書用郊從史文非也史之記事雖甚質不應加用於郊雖史加用郊仲尼猶當削筆焉不然則是苟因史之謬也苟因史之謬又何以稱遊夏之徒不能措一辭十八年宋魚石復入于彭城左氏曰凡去其國國逆之曰入本無位者復其位曰復歸亦國逆諸侯納之曰歸以惡曰復入今按左氏國逆之未必言入言入者未必國逆復其位者未必言復歸諸侯納之者未必言歸以惡入者或言復入或不言復入事與例合者少而與例違者多不託之從赴則諉以從某例唯注者推言之而已不復可信也襄公元年圍宋彭城左氏曰非宋地追書也由是言之則孔子作春秋所筆削多矣豈専用舊史者乎四年冬十月傳曰邾人莒人伐鄫臧紇救之敗於狐駘然則經何以不書邪杜曰敗不書魯人諱之非也升陘之戰邾人獲公胄至恥矣諱公不諱戰乾時之戰公喪戎路左右皆止至危矣諱公不諱敗彼皆公親之猶著其文不喪其實此乃臧紇耳何足諱之而都不書乎意者春秋為君諱淺為臣諱深乎不然喪胄逃遁之恥不若直敗者甚乎何其詳略異也五年楚殺其大夫公子壬夫傳曰楚人討陳叛故曰由令尹子辛實侵欲焉乃殺之書曰楚殺其大夫公子壬夫貪也此傳解經所以書壬夫名之意言壬夫貪殺之當也又曰君子謂楚共王於是乎不刑夫共王殺壬夫春秋謂之貪而當是共王之刑無失也如令共王之刑有失則春秋不應名壬夫以見其罪傳指言貪以著其惡也春秋名壬夫以見罪傳指言貪以著其惡共王殺之何謂不刑乎然猶謂共王不刑則是春秋亦不刑也解經若此取舍安從哉六年季孫宿如晉左氏曰晉人以鄫故來討曰何故亡鄫季武子如晉見且聽命非也五年夏叔孫豹鄫世子巫如晉鄫始屬魯其年秋穆叔以屬鄫為不利使鄫人聽命于會故經書吳人鄫人是則魯已辭鄫矣晉已知之矣今鄫之滅非魯責也晉人何以來討邪又曰莒人滅鄫鄫恃賂也若鄫與魯有屬無絶或恃賂慢莒以取滅亡今魯以絶鄫鄫無賦於魯矣尚何所恃而取滅邪然則傳所言皆不實也七年會鄬鄭伯髡頑如會未見諸侯丙戌卒于鄵左氏曰子駟使賊殺之而以瘧病赴於諸侯言經所以從赴而書也非也凡議春秋者必曰亂臣賊子懼亂臣賊子懼者以其書法不隱而善惡眀也左氏亦云求名而亡欲蓋而彰善人勸焉淫人懼焉夫臣殺其君欲蓋者也春秋順其欲而不彰則何懼矣彼亂臣賊子知偽赴之可以免於貶絶則又母乃勸乎耳是由春秋啓之也奈何哉八年鄭人侵蔡獲蔡公子燮杜云鄭子國稱人惡其無故生患以他日合之安知非告辭略乎會于邢丘左氏云大夫不書尊晉侯也安知非貶大夫會公侯者乎為例若此誰能識哉九年公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光伐鄭十有二月已亥同盟于戲杜云伐鄭而書同盟則鄭受盟可知未必然也成公十七年公會單子尹子晉侯等伐鄭而同盟于柯陵如杜此注則柯陵之盟鄭亦受盟矣考之左氏鄭實未服不得云同盟也且春秋記同盟甚多而左氏以謂書同者由服異也服異雖似可信挍之前後則不能盡通宣十二年同盟于清丘是時無新服者十七年同盟于斷道亦無新服者成九年同盟于蒲亦無新服者十五年同盟于戚亦無新服者十八年同盟于虛朾亦無新服者僖七年盟于寧母鄭始服于齊而不言同二十八年盟于踐土諸侯始服于晉而不言同襄二十五年盟于澶淵齊請成而亦不言同如此者衆甚則同不為服異發眀矣他日稱同盟其新服之國猶列於會至伐鄭則但以同盟見鄭亦與盟而已設令鄭不與盟如柯陵者又不可知襄公二十五年會于夷儀無伐齊之文也盟于重丘而稱同若以同為齊受盟出乎則未有伐齊之文若以為服異出乎則諸侯無新服者書同盟何哉傳曰晉侯以公宴于河上問公年季武子對曰會于沙隨之嵗寡君以生晉侯曰十二年矣大夫盍為冠具武子對曰君冠必以祼享之禮行之以金石之樂節之以先君之祧處之今寡君在行未可具也請及兄弟之國而假備焉晉侯曰諾公還及衛冠于成公之廟假鐘磬焉禮也夫武子言君冠必具禮樂可矣言及兄弟之國假具而冠無乃亟乎衛與魯壤地相接能冠于衛不能冠于魯乎衛君之廟非先君之祧也成公之神非祼享所宜也則武子所得者金石而已矣魯豈無金石乎何亟于冠而以他國之廟為已君之祧他廟之神為已君之先而傳又謂之禮不亦過乎十年會吳于柤杜云吳子在柤晉以諸侯往會之故曰會吳非也晉為伯主悼公其賢君也軍師方強豈肯帥諸侯以會吳乎黃池之會晉弱于吳猶爭盟焉況其方強哉又曰吳不稱子從所稱也亦非也吳子豈自稱吳而己乎凡吳子鄭伯之類亦皆人稱之爾非其君自稱也且若從其所稱而稱之乎則吳當稱王楚亦當稱王必不但曰吳也遂滅逼陽左氏曰以逼陽子歸獻于武宫謂之夷俘逼陽妘姓也使周內史選其族姓納諸霍人禮也夫逼陽子竟何罪乎欲取其國以封向戌耳既已擅滅諸侯又擅以其地豫人罪孰大焉謂之禮何哉即以選其族姓納諸霍人為禮者諸侯誰不樂滅國乎茍滅國矣取其子孫償以一邑誰不樂為此乎且經書滅逼陽君死其位也傳云以逼陽子歸安得此子乎逼陽一國有二君可爾十一年公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭秋七月同盟于亳城北杜氏曰伐鄭而書同盟鄭與盟可知非也吾於九年既言之矣十二年吳子乘卒左氏曰臨於周廟禮也凡諸侯之喪異姓臨於外同姓於宗廟同宗於祖廟同族於禰廟杜氏曰周廟者文王之廟皆非也禮諸侯不祖天子大夫不祖諸侯則文王之廟魯何得以有之孔子曰公廟之設於私家非禮也自三桓始也然則魯君僣上而立周廟三桓僣魯而設公廟矣丘眀不知又習見之遂真謂禮然豈不誤哉以實言之凡諸侯之喪異姓臨於外同姓於祖廟同族於禰廟於義足矣十三年取邿左氏曰凡書取言易也用大師曰滅弗地曰入非也春秋之興褒善貶惡所以示後世法非記難易而已也難易何足紀乎且滅國言滅者言既殺其君又泯其杜稷故君死其位亦曰滅如滅國而謂之取則未知君死其位歟如取邑而謂之滅則未知邑安取君死其位乎如是是春秋記滅國也略記用師難易也詳豈然也哉十四年會于向傳曰將執戎子駒支范宣子親數于朝曰今諸侯之事我寡君不如昔者則言語漏泄職汝之由此皆不實也諸侯解體非此戎之過審矣范宣子豈不知邪何以誣之哉去年搜于綿上傳曰晉國由是大和諸侯遂睦到此一年爾何故遽有言語漏泄不如昔者之事邪言與事不相應矣又曰宣子辭焉使即事於會以成愷悌然則是薑戎列于會矣經何以不序乎杜氏曰戎為晉屬不得特達非也近上魯人請屬鄫已而以為不利使鄫大夫聽命于會則經亦書鄫人誠以鄫既與會則列國故也今范宣子亦使戎子即事於會去私屬比諸侯矣與鄫人相似何故不書乎即以薑戎微法不當書者殽之戰何以書也即以殽戰時薑戎未為晉屬故得書者按戎子自云為先君不侵不叛之臣乃在文公之前不得云殽戰未屬晉也推此數者知傳所敘都非信實伐秦左氏曰齊宋大夫不書惰也北宫括書於伐秦攝也非也於春秋何以辨之且又無大體非春秋本意也衛侯出奔齊按左氏云名藏在諸侯之策曰孫林父寧殖出其君今經書乃如此此眀仲尼作春秋皆刪掇大義不與衆史同也然則謂春秋即用舊史從史文從赴告者皆謬妄矣十六年公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于湨梁左氏曰宴于溫使諸大夫舞曰歌詩必類齊髙厚之詩不類荀偃怒使諸大夫盟高厚然則髙厚在會矣經何以不序邪杜氏云髙厚逃歸故不書也按僖五年夏公及齊侯宋公陳侯衛侯鄭伯許男會王世子于首止八月諸侯盟于首止鄭伯逃歸不盟夫鄭伯之逃與髙厚之逃無以異也鄭伯逃盟猶記其會髙厚逃盟何以不記其會邪或者鄭伯逃盟不逃會故得記其會髙厚乃逃會者故不得記其會近上七年公會晉侯宋公陳侯衛侯于鄬陳侯逃歸亦逃會者何以得會記邪且驗傳文髙厚非逃會也已與於會矣忿荀偃之盟已故逃盟耳然則方其會時厚不得不書也然而不書獨奈何哉晉人執莒子邾子以歸左氏曰以我故執之且曰通齊楚之使然則非為不道於其民矣以左氏例考之當云晉侯執耳何以得稱晉人邪杜氏患苦其不合因以不道誣二國之君文過乎哉罔人乎哉叔老會鄭伯晉荀偃衛寧殖宋人伐許左氏云書曰會鄭伯為夷故也言諸侯之卿可以會伯子男故示之義云爾非也主兵者居上自其班列同者也諸侯與諸侯相從卿大夫與卿大夫相從若名位不敵卿雖主兵猶序諸侯之下貴王爵也去諸侯而言主兵者自可見爾何疑哉十八年白狄來杜云不言朝不能朝也非也聖人固不責夷狄禮耳來朝者則謂之朝何待其與中國均然後謂之朝哉且若必待其與中國均然後謂之朝是無賔享也十九年晉人執邾子杜云稱人以執惡及民也豫謂傳敘其事自為伐我故執之耳未嘗有惡及民之實也杜氏惡其與例不合則以惡及民罔之非誠然也哉二十年仲孫速帥師伐邾左氏曰邾人驟至以諸侯之事弗能報也孟莊子伐邾以報之按邾人驟至謂十五年十七年也至十九年盟于祝柯晉人執邾子又取邾田自漷水歸之于我則亦報舊怨矣何謂未報乎然則仲孫速自以他故伐邾不為報其驟至也二十三年陳殺其大夫慶虎及慶寅左氏曰慶氏以陳叛役人相命各殺其長然則何以不曰陳人殺慶虎邪又稱及者杜氏云史異辭則是春秋非復仲尼之法也專用史而已豈其然哉叔孫豹帥師救晉次于雍榆杜云待命于雍榆故書次非也救者赴急之師也受命以出又何待焉即待晉命者豈救人之急方待命而行哉言之逺理莫甚於此矣十月乙亥臧孫紇出奔邾杜氏云書名者阿順季氏為之廢長立少以取奔亡罪之非也如杜之意以為名則貶矣字則褒矣獨不計名不必皆貶字不必皆褒乎謂字者皆褒猶之可也顧不當引凡無罪者一以字見之耳且褒者當字貶者當名如善不足褒惡不足貶者奈何二十四年會于夷儀楚子蔡侯陳侯許男伐鄭左氏曰諸侯還救鄭然則何以不書於經邪諸侯相會而救患義事也春秋豈諱之哉且必若救許救徐何以得書也二十五年會于夷儀左氏有晉侯伐齊慶封如師之文而經無之何邪又言齊人賂晉侯及其六正五吏三十帥三軍之大夫百官之正長師旅及處守者皆有賂是成亂也亦不譏何邪杜氏曰不譏受賂者齊有喪師自宜退非也若齊侯以夀沒師退可也今臣弒其君為惡大矣何故退乎假使晉遂討齊破其城殺其賊汙其宫未可謂之伐喪也且夫弒君而謂之喪諸侯其無討賊者矣鄭公孫舍之帥師入陳左氏曰陳侯免擁社使男女别而纍以待於朝子展執縶而見子美入數俘而出祝祓社司徒致民司馬致節司空致地乃還若是則陳已服罪矣何為其冬公孫夏復帥師而伐陳乎且數俘而出是無獲虜也則子産何用獻捷乎捷者俘獲也何以知之哉成二年傳曰蠻夷戎狄則有獻捷兄弟甥舅告事而已不獻其功今傳謂子産獻捷則非告事矣如曰數俘而出是安得捷而獻歟二十六年公會晉人鄭良霄宋人曹人于澶淵左氏曰趙武不書尊公也向戌不書後也鄭先宋不失所也豫謂此皆不足信於經無以見之晉人執衛寧喜左氏云使女齊以先歸若實爾者經何故不云以歸乎二十七年豹及諸侯之大夫盟于宋左氏曰不書其族言違命也非也蔡沈失位左氏貶之今魯欲自同人之私失位甚矣貢賦雖重所不得已也大夫出境有可以重社稷猶曰專之今命出季氏而以為不可違何哉誠使豹徇季氏之命輕貢賦之數雖偷得一時之益而其貶魯國之秩已多矣反不當疾之邪又是會也楚先晉歃而經先書晉左氏以謂仲尼追正之也今此視邾滕之事仲尼亦必知其非公命審矣苟舊史不知而貶豹焉仲尼猶宜正之况知之乎夫知其非公命且辱國而猶責豹以不從命者是開強臣挾君以令於國而莫之亢也不亦悖乎十二月乙亥朔日有食之左氏曰於是辰在申司厯過也再失閏矣眀年春無冰杜氏曰頓置兩閏以應天正故正月建子得以無冰為災皆不然也厯家之術求閏餘易求交朔難今司厯能正交朔反不能置閏乎此非人情也閏有常準率三十二月必一逢之如傳所言再失閏者則司厯廢閏殆七十月彌五年矣亦非人情也頓置兩閏詭聽駭俗亦非人情也且必若云其亂天時多矣春秋何能不譏乎故曰未然二十九年公在楚左氏曰釋不朝正於廟也非也茍為不朝正而書乎他日公在外不朝正多矣何為不悉書邪去年公如楚未有至之文也公之不朝正亦審矣雖不釋於此猶足知也曽何春秋之憚煩三十年宋伯姬卒左氏曰君子謂宋共姬女而不婦女待人婦義事也非也如共姬之守禮死義不求生以害生亦可免矣反謂之不婦乎易曰恆其德貞婦人吉共姬恆之矣所謂婦也鄭良霄出奔許自許入于鄭左氏曰伯有聞鄭人之盟已也怒聞子皮之甲不與攻已也喜曰子皮與我矣晨自墓門之瀆入因馬師頡介于襄庫以伐舊北門然則是惡入也惡入之例當書復入曷為但書入乎杜氏云不言復入獨還無兵非也所謂以惡入曰復入者以其意害也意害矣以兵入與雖不以兵入而盜兵作亂等耳豈特以兵入者惡而盜兵鬭者無惡乎即以為獨還無兵得不稱復入者是良霄之入為直入國中無有惡也夫伯有入鄭與欒盈入晉有以異乎欒盈空身因曲沃之兵以與君鬬伯有徒還資馬師之衆以伐國門竟無異也欒盈書復入以眀其惡伯有獨不言何哉會于澶淵宋災故左氏曰謀歸宋財既而無歸故不書其人非也他日會而匱盟雖惡之未有舉其事者直貶其人而己矣今獨舉其事又貶其人何邪由是論之此非特惡失信而已也失信者如清丘及蜀之盟是也三十一年莒人弒其君密州左氏曰莒犂比公生去疾及展輿既立展輿又廢之犂比公虐國人患之展輿因國人以攻莒子弒之乃立如是則子弒其父也子弒其父春秋不書乎又曰書曰莒人弒其君買朱鉏言罪之在也如是則父有罪子得而弒之也蔡世子般弒其君固固之惡最甚矣何以亦貶乎且經曰密州傳曰買朱鉏吾誰適從哉亂天地之性莫甚於斯言矣此固左氏不受經之蔽也傳曰鄭禆諶能謀謀於野則獲於邑則否此不然也語曰為命禆謀草創之世叔討論之行人子羽修飾之東里子産潤色之亦朝廷之常耳傳者不知以為草野之草記者不辨遂增適野之事昭公元年三月取鄆傳曰季武子伐莒取鄆杜氏注經云不稱將帥將卑師少書取言易也此則注與傳異矣經但言取傳又言伐此則傳與經異矣紛錯如此誰能聽之哉秦伯之弟針出奔晉左氏曰其車千乘又曰后子享晉侯歸取酬幣終事八反豫謂出奔者勢不以千乘行又一日之享取幣八反非朝夕所可望皆不近事實者也蓋舊説秦伯以千乘之富而不能容其母弟傳者不知則以謂針以千乘出奔矣記者不辨又增取幣八反之事莒展輿出奔吳左氏曰展輿立而奪羣公子秩公子召去疾於齊齊納去疾展輿奔吳君子曰莒展之不立棄人也若是末哉君子之言也夫展輿親弒其君而不譏棄人而譏之是謂棄人重於弒父也藉使展輿但勿棄人以濟其不義之身則固以為賢矣不亦害天下之教乎楚子麇卒左氏曰公子圍入問王疾縊而殺之杜云楚以瘧疾赴故不書弒也楚公子比出奔晉左氏曰遂殺其二子幕及平夏右尹子干出奔晉杜云書名罪之皆非也若臣弒其君託於瘧疾而可以免則亂臣賊子何懼矣而公子比又何罪哉彼君弒國亂不忍其惡而出奔者也方存乎見褒又何貶焉且如傳言則是公子圍罪大而經為之諱公子比無罪而經致其貶輕重失序非仲尼意矣三年北燕伯欵出奔齊杜氏曰不書大夫逐之而言奔罪之也非也如傳言者款多嬖寵欲去諸大夫而立其寵人故大夫比而殺其外嬖公懼而奔齊耳此則公之自奔焉有逐之者乎又曰書名從告亦非也榖伯綏鄧侯吾離以名為賤衛侯燬楚子虔以名為貶此傳又云書曰北燕伯款出奔齊罪之也是為款之名者乃罪矣杜氏獨以為從赴何哉即以名為從赴而已衛侯燬何用知其非從赴乎四年大雨雹左氏曰季武子問於申豐雹可禦乎對曰聖人在上無雹雖有不為災古者日在北陸而藏冰西陸朝覿而出之其藏之也周其用之也遍則冬無愆陽夏無伏隂春無淒風秋無苦雨雷出不震無災霜雹癘疾不降今藏川池之冰棄而不用雹之為災誰能禦之夫豐言聖王在上無雹可也言雹之為災由藏冰故非也魯雖藏川池之冰未為不藏冰如今之天下莫有藏冰何故雹不輒降乎且豐之為人姦佞人也黨於季氏不敢端言其罪故推雹災歸之藏冰欲以諂媚強臣抹摋災異此與張禹谷永何異哉所以使昭公死于外者未必非此人也楚人執徐子杜云稱人以執以不道於民告非也春秋為褒貶是非作也如苟從赴而已矣是誣善者無所理也賊亂之人何所懲而畏乎遂滅賴左氏曰賴子面縛銜璧非也經所謂滅者固謂君死其位者矣既曰死其位尚能面縛乎又曰成王克許許僖公如是是亦不然吾既言之矣取鄫左氏曰莒亂著丘公立而不撫鄫鄫叛而來故曰取凡克邑不用師徒曰取非也若鄫自來則非魯取不可書取鄫矣且鄫之叛者誰乎上大夫也固當見經下大夫微者也亦當如邾庶其書之何故匿其名也杜氏曰不書奔者潰散而來將帥微也亦非也杜惡傳所説不與例合又恥左氏有不傳春秋之名遂為文飾爾且傳言叛不言潰潰者在下叛者在上可知也縱其微甚猶當書之所謂雖賤必書重地也何遽違例而掩叛人乎所謂不登叛人之義安在哉五年舍中軍左氏曰卑公室也毁中軍於施氏成諸臧氏然則非公意也以左氏凡例推之非公意者則當不書就令書之猶應有貶今左氏言作三軍舍中軍之事可謂甚害矣而經無所貶何也杜氏又云季氏稱左師孟氏稱右師叔孫氏則自以叔孫為軍名如是竟未嘗舍中軍也徒以軍為師名號之少異耳何謂舍中軍乎六年宋華合比出奔衛杜云合比事君不以道自取奔亡書名罪之非也杜氏信以謂茍無罪而出者舉字之乎則彼有殊絶之美者宜以何書夫春秋非其所褒不加字焉非謂茍奔而無罪者皆字之也叔弓如楚左氏曰楚令尹子蕩帥師伐吳師于豫章吳人敗其師于房鍾獲公廏尹棄疾子蕩歸罪于薳泄而殺之叔弓如楚聘且弔敗也非也若如傳言吳真敗楚經何以不書乎杜氏曰歸罪於薳泄不以敗告故不書非也若楚不赴於魯則魯亦不敢弔矣今魯弔之是楚嘗赴敗於魯也經何得無其事乎七年暨齊平左氏云齊求之也杜云齊伐燕伐燕在六年末燕人賂之反從求平也豫謂杜氏之説與傳意錯傳所云齊求之者似指齊求與魯為平也其下乃云癸巳齊侯次于虢燕人行成若謂齊已暨燕平則齊侯無緣更進次虢而燕乃行成也且齊侯伐燕燕人賂之則傳當云燕求之經當書暨燕平不當反云齊求之暨齊平也杜又注經曰前年冬齊伐燕間無異事故不重言燕從可知此杜欲引州公實來為比彼州公實來之文卓詭非常乃可爾非此之類也試覆以事推之自昭公即位以來未嘗與齊通好此年三月叔孫婼如齊蒞盟此則魯與齊平之驗矣亦猶定十一年冬及鄭平叔還如鄭蒞盟云其文也其理也其事也三襲焉章灼不疑八年搜于紅傳云大搜與經不合矣葬陳哀公左氏曰輿嬖袁克殺馬毁玉以葬楚人將殺之請置之既又請私私於幄加絰於顙而逃此則葬陳哀公者袁克也非諸侯也何以得書於經乎若曰魯往會之是又不然楚尚不聽袁克葬其君豈聽諸侯赴其葬乎且魯何能不畏楚也十年季孫意如叔弓仲孫貜帥師伐莒杜氏曰三大夫皆卿故書之非也使舉上客師言元帥此乃春秋之常所謂尊無二上亦此之謂也豈卿則悉書之哉晉嘗為六軍六軍之將蓋命卿十有二人未常有得並書者何邪十一年楚子虔誘蔡侯般殺之于申杜云蔡大夫深怨楚故以楚子名告非也即如所言春秋為無褒貶茍從赴告而已衛侯燬滅邢寧非邢大夫怨之邪十二年公子憗出奔齊杜云書名謀亂故豫謂憗本患季氏強公室弱是以與公謀去季氏也此則季氏之仇而魯忠臣矣謀泄事變卒為強臣所逐豈謀亂者哉茍使憗無罪而奔遂書其字乎黨於季氏失君臣之義晉伐鮮虞杜云不書將帥史闕文豫謂以殽之戰推之安知非晉恥以詐襲人而不以將帥告乎在殽之戰則以為晉恥背喪用兵在鮮虞則以為史自闕文春秋之義何其駮且至於此也傳曰公如晉晉人辭公公子憗遂如晉按經無憗如晉之文也杜云憗還不復命而奔故史不書於䇿非也公孫歸父如晉還自晉至笙遂奔齊此亦不復命者何以書其如晉乎笙地在境外憗奔在郊不得獨不書也公孫敖如周丙戌奔莒此亦自外奔者也亦先記其如周不以不復命而略其出時也且史之記事始遣使則書矣何待其復乃書於䇿邪欲為傳文過而不知例有相反不可通者不亦誣乎楚殺其大夫成虎傳曰或譛成虎於楚子成虎知之而不能行書曰楚殺其大夫成虎懷寵也杜云解經所以書名皆非也人譛成虎成虎不行者自恃無罪或冀君不信讒也但當譏楚子信讒專殺大夫不當貶成虎不能行也成虎不能行小過耳楚專殺大夫大罪也大罪不見詰小過先受貶此豈春秋旨哉傳徒以名為貶字為褒不知輕重有權未可一槩也十三年楚公子比自晉歸于楚弒其君虔于乾溪左氏曰觀從以蔡公之命召子干以傳例推之則比冝以國逆例書入耳今書歸何邪杜云依陳蔡以入言陳蔡猶列國非也陳蔡是時滅而為邑矣楚公子守之矣豈可復為國哉正令可號以為國其召公子比者實楚人也書國逆而立當矣書諸侯納之不亦放哉以杜氏華元歸例推之又安知非比欲假晉為援以赴於諸侯者乎八月甲戌同盟于平丘傳曰齊服也非也在此以前齊未嘗不服以同盟之文強云齊服欲以成其説妄矣蔡侯廬歸于蔡陳侯吳歸于陳杜氏不解二君稱名之意直云受封于楚故稱爵諸侯納之故曰歸豫謂二國前滅二君復封義有卓詭春秋所辨也又諸侯納之曰歸謂本有國者爾若社稷已除一旦復立此則非歸不得以歸為例也吳滅州來左氏云州來楚邑用大師曰滅非也國滅曰滅君死其位曰滅滅之名施於國審也國有宗廟社稷此滅之義所為施也言若滅火絶其後也非縣邑所得亢也邑雖大必謂之邑國雖小必謂之國夫滅取之不可貿易乃國邑之不可相亂也州來小國世服於楚為楚執事未嘗特與諸侯盟會世皆謂州來固楚邑也以此而謂州來真楚邑則背於經矣且春秋記滅取者為褒貶也正其所為名者所以正其罪也取人之邑滅人之國是以為罪大師小師何分别焉春秋權衡卷六
