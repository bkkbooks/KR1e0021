body:
  text: 春秋權衡卷十七宋劉敞撰成公元年無冰榖梁曰此未終時無冰何也非也今所書正謂建丑之月是乃終時矣何云未終時乎若待建寅之月而書無冰建寅月令東風解凍不得更以無冰為異也作丘甲榖梁曰丘為甲也非也審為使民作甲者春秋何不云井作甲邑作甲農作甲而必云丘作甲乎吾於公羊既言之矣二年公會楚公子嬰齊于蜀榖梁曰其曰公子何也亢也非也向者及晉處父盟去處父之氏以明亢今此更益嬰齊之氏亦以明亢二者孰能别之乎且榖梁以楚無大夫其有大夫者進也狄雖見經尚未得氏以明許夷狄者不一而足今反以驕亢之人而進之有氏是襃貶亂矣何以為春秋盟于蜀榖梁曰會與盟同月則地會不地盟不同月則地會地盟此其地會地盟何也以公之得其所申其事也非也會時一國盟時十一國十一月公會楚公子嬰齊于蜀丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人繒人盟于蜀此乃兩會也各自書地乃其理矣何申之有五年梁山崩榖梁曰不日何也髙者有崩道也有崩道則何以書也曰梁山崩壅河三日不流晉侯召伯宗而問焉云云尋榖梁此文似云山有崩道崩不當書今以晉侯問伯宗故獨書也是豈春秋意邪七年鼷䑕食郊牛角改卜牛鼷䑕又食其角榖梁曰又有繼之辭也此亦常耳何足以多解又曰其緩辭也非也前云鼷䑕食郊牛角者文不可言其角非不緩也今云其角者亦文當如此非故緩也又曰所以免有司之過也亦非也春秋記災異刺譏時君且明鬼神享徳所以鈎深致逺者微矣豈為免有司之過乎乃免牛榖梁曰免牛者為之緇衣纁裳有司奉送至於南郊未必然也雖禮典散滅不可考挍至於牛衣人服如何襲被乎凡郊牛稷牛必皆在滌三月滌者牢也今既有傷則不復在滌是為免之其不免者是留以湏後郊非禮不敬故春秋亦譏焉不如榖梁所説作𤣥衣纁裳何休所說盜天牲也大雩榖梁曰冬無為雩也非也周之十月今之八月若久不雨可得不雩乎又傳例謂得雨曰雩若此年雩不得雨書旱必矣且將書旱可得不雩哉八年晉侯使韓穿來言汶陽之田歸之于齊榖梁曰于齊緩辭也不使盡我也非也此直記事以刺晉爾不使盡我了無所用也天子使召伯來錫公命榖梁曰天子何也見一稱也言欲見天子與天王各為一稱不亦淺乎不亦淺乎衛人來媵榖梁曰媵淺事也不志此其志何也以伯姬之不得其所故盡其事也非也伯姬雖賢春秋一襃其身已足矣又何為及其媵哉凡春秋所急者禮也所制者欲也以禮制欲則治以欲敗禮則亂而諸侯娶十二女則是以欲敗禮矣故春秋備書之所以戒也非賢伯姬以亂禮也九年季孫行父如宋致女榖梁曰是以我盡之也非也榖梁言宋共公失徳不𦵏者以其與伯姬不相入也即我能盡之何故不相入乎又曰不正故不與内稱也說者云内稱謂稱使按内大夫受命而出無稱使者假令與内稱則曰公使季孫行父如宋致女乎又曰逆者微故致女詳其事賢伯姬也亦非也榖梁向云致者不致也譏以我盡之今又云詳其事賢伯姬若實賢伯姬則致女為伯姬發非譏魯也若實譏魯則致女為譏魯發非賢伯姬也二者孰能知之乎晉人執鄭伯晉欒書帥師伐鄭榖梁曰不言戰以鄭伯也非也春秋伐而不戰多矣豈伐則必戰乎且晉實不執鄭伯以伐鄭何以能必其以鄭伯乎此皆妄說也又曰為親者諱疾亦非也執其君以伐其國無道甚矣方事貶之何故諱乎莒潰榖梁曰其日莒雖夷狄猶中國也然則蔡亦中國蔡潰何故不日乎又曰大夫潰莒而之楚亦非也經但云莒潰不云之楚榖梁安所受此語乎且潰者非大夫所為何故專以大夫解之乎此似不曉潰之說凡潰者取其如水之決爾城中城榖梁曰非外民也非也若不外民則都不為城郭乎則與夷狄何異哉夷狄可謂不外民乎十三年曹伯廬卒于師榖梁曰閔之也非也諸侯死於行則記其地死於國則不記其地所以别内外也例則如此何謂閔之十五年仲嬰齊卒榖梁曰子由父䟽也非也必公孫之子以王父字為氏非公子之子也公羊說是矣若必云子由父䟽不得稱公孫則歸父何故稱公孫乎晉侯執曹伯歸于京師榖梁曰以晉侯而斥執曹伯惡晉侯也非也若云晉人執曹伯榖梁得母又如齊人執袁濤塗而非之乎𦵏宋共公榖梁曰月卒曰𦵏不𦵏者也以其𦵏共姬不可不𦵏共公也夫人之義不踰君非也若以𦵏夫人則必葬其君莊二十九年葬紀叔姬而不葬紀侯何哉會于鍾離榖梁曰會又會外之也非也吾於公羊既言之矣十六年曹伯歸自京師榖梁曰不言所歸歸之善者也出入不名以為不失其國也非也曹伯之惡學者知之榖梁子不知爾曹伯何善乎又曰歸為善自某歸次之亦非也衛元咺衛侯鄭何善之有乎且自某者明其有奉焉爾本不為善不善設也晉人執季孫行父舍之于苕丘榖梁以舎為次舎之舎及其所論皆枝辭也盖不足信刺公子偃榖梁以謂殺無罪非也且以理觀之先刺後名是得其罪者先名後刺是不得其罪不訊於羣吏不訊於萬民者可知矣十七年用郊榖梁以謂以秋之末承春之始不可郊也非也吾於公羊既言之矣壬申公孫嬰齊卒于貍脤榖梁曰致公而後録臣子非也昭公在外叔孫婼卒則何不待致公而録乎襄公二年晉師宋師衛寗殖侵鄭榖梁曰其曰衛寗殖如是而稱於前事也說者曰初衛侯速卒鄭人侵之故舉寗殖之報以明稱其前事皆非也將尊師少書將例然也何至於此獨為異乎孔子曰以直報怨以徳報徳若人伐已喪已亦伐人喪是以怨報怨也豈以直報怨者乎春秋豈為是書之哉城虎牢榖梁曰若言中國焉内鄭也非也鄭不服晉諸侯伐之可謂外之矣反謂内之乎三年叔孫豹及諸侯之大夫及陳袁僑盟榖梁曰及以及與之也非也此兩及者文當然耳何謂與之何謂不與之哉又曰諸侯盟又大夫相與私盟是大夫張也亦非也袁僑則陳大夫大夫不敢與君盟故使大夫與之盟耳觀榖梁之説似解湨梁之㑹大夫盟非解此雞澤之㑹諸侯之大夫及陳袁僑盟也六年莒人滅繒榖梁曰非滅也立異姓以莅祭祀滅亡之道也非也吾於公羊既言之矣八年㑹于邢丘榖梁曰見魯之失政也公在而大夫㑹也非也公以正月如晉反未至國令季孫宿復往㑹晉侯耳若公在而大夫㑹不應無文以起之九年宋災榖梁曰外災不志此其志何也故宋也非也齊大災又豈故齊乎十年㑹吳于柤榖梁曰㑹又㑹外之也非也㑹于戚吳人亦在何不外之乎㑹于申淮夷亦在何不外之乎盜殺鄭公子斐公子𤼵公孫輒榖梁曰稱盜以殺大夫弗以上下道惡上也非也若以盜者指其君乎殺其臣而謂之盜是不正名也若以盜者固盜賊乎稱盜乃宜矣又何云弗以上下道也如榖梁之意以上下道則曰盜殺其大夫乎則是大夫為盜之臣盜為大夫之君乃可耳戍鄭虎牢榖梁曰其曰鄭虎牢決鄭乎虎牢也非也城人之邑戍人之都勢必繫其國而言有不繫其國者乃變例也如其繫國矣此乃常文又何決哉十二年莒人伐我東鄙圍台遂入鄆榖梁曰取邑不書圍安足書也非也取邑不書有所避耳非小之不書也十四年衛侯出奔齊説者曰衎結怨乎民自棄於位君弑而歸與知逆謀故出入皆曰非也以剽為君以衎為賊吾不知春秋何為乃爾昬惑哉然則昭公出奔亦當絶邪有如季氏立一公子為君者春秋且亦奪昭公而成之邪十五年劉夏逆王后于齊榖梁曰過我故志之非也王后尊矣禮自當志豈與諸侯一例以過我而書哉然則他王后不見者太子立則妃為后自無縁見耳十八年同圍齊榖梁曰非圍而曰圍非也春秋之信史也其事則齊桓晉文其㑹則主㑹者為之矣若未圍而言圍是豈得為信史哉曹伯負芻卒于師榖梁曰閔之也非也是亦記事而已矣何閔之有十九年公至自伐齊榖梁曰春秋已盟而復伐者則以伐致盟不復伐者則以㑹致祝柯之盟盟復伐齊與曰非也然則何為以伐致也曰與人同事或執其君或取其地非也執君取地邾事也以伐齊致齊事也今欲以齊明邾以邾明齊乎無義以通之且書晉人執邾子貶晉已明矣取邾田自漷水刺魯已明矣又何不足而以齊明邾乎晉士匄侵齊至榖聞齊侯卒乃還榖梁曰還者事未畢也士匄外專君命故非之也非也謂之未畢則以為貶矣公子遂至黄乃復公孫敖如周不至而復復者榖梁所謂事畢也然則春秋反不貶遂與敖乎按士匄不伐喪可謂知禮不免於貶遂敖專命可謂非禮反無貶乎且士匄何貶哉大夫以君命出境進退在大夫者可也二十六年衛寗喜弑其君剽榖梁曰此不正其日何也殖也立之喜也君之正也非也文王事紂武王滅之亦為不正乎言春秋者要論其行事邪正而已矣衎也於殖其獨非君而逐之何哉二十七年豹及諸侯之大夫盟于宋榖梁曰豹云者恭也諸侯不在而曰諸侯之大夫大夫臣也非也稱諸侯者常文耳不稱諸侯者乃變文也又豹不氏亦前目後凡一事而再見卒名之例爾不以是為恭也二十九年公至自楚榖梁曰喜之也致君者殆其往而喜其反非也公如晉如齊而致者多矣又何喜乎且春秋公出不必盡致也是為臣子或喜或不喜者邪三十年正月楚子使薳罷來聘説者曰聘例時此月何也欲書王以正蔡般之罪劉子曰推此言也而觀之其妄可勝記乎蔡世子般弑其君固榖梁曰其不日子奪父政是謂夷之非也向若書日者何遂云非奪父政乎又可云非夷之乎奪父政也夷之也不待不書日而後見則不書日何足以託義哉葬蔡景公榖梁曰不日卒而月葬不葬者也卒而葬之不忍使父失民於子也非也君弑賊未討不書葬此乃春秋之常矣凡不書葬者豈失民之謂乎茍為此言以應問可矣非所以明春秋也㑹于澶淵宋災故榖梁曰善之也非也一國失火自焚其財小事耳諸侯何至羣聚而謀之乎以此為善是春秋貴小恵而不貴道也又曰其曰人何也救災以衆亦非也宋以五月失火諸侯以冬㑹于澶淵是可謂救災乎昭公二年公如晉榖梁曰恥如晉故著有疾也非也但云至河乃復安知有疾哉七年暨齊平榖梁曰以外及内曰暨如此何不取外為志之例書㑹乎春秋尊魯避所可恥審為齊强逼魯為平者何不如乞盟乞師來獻捷之例殺恥乎衛侯惡卒榖梁曰王父名子也盖言臣之子不敢與世子同名有生在世子前王父名之者則亦不改也以言衛齊惡盖王父名之爾説者不曉以謂唯王父名子王父卒則稱王父命名之是則不可八年陳侯之弟招榖梁曰向曰陳公子招今曰陳侯之弟招何也云云此問之非也向曰陳公子者乃其常稱爾秋蒐于紅榖梁曰正也非也盖不學周禮者葬陳哀公榖梁曰不與楚滅閔之也非也此與齊侯葬紀伯姬何異哉十二年齊髙偃帥師納北燕伯于陽榖梁曰納者内弗受也非也諸侯失國諸侯納之救患哀禍也顧以為弗受反當遂其亂臣賊子之心乎又曰燕伯之不名何也不以髙偃挈燕伯也亦非也楚人圍陳納頓子於頓榖梁以謂納頓子者陳也陳之挈頓子可矣即何不名頓子乎十三年公不與盟榖梁曰可以與而不與譏在公也非也公於晉唯令之從豈其獨能違衆不盟乎推榖梁之意以與為相與之與推春秋之意則與為與及之與葬蔡靈公榖梁曰不與楚滅且成諸侯之事非也是本不當滅蔡則蔡雖滅非滅也今蔡侯復國例得葬耳不為諸侯而成之也十五年叔弓卒去樂卒事榖梁曰君在祭樂之中大夫有變以聞可乎大夫國體也古之人重死君命無所不通非也按禮記衛侯曰栁莊死雖當祭必告然則當祭不告者禮也當祭而告者變也其亦可知矣十七年楚人及吳戰于長岸榖梁曰進楚子故曰戰非也戰則云戰敗則云敗豈擇於吳楚哉且楚其與中國並久矣豈至此而進之哉十八年宋衛陳鄭災榖梁曰或曰人有謂鄭子産曰某日有災子産曰天者神子惡知之是人也同日而為四國災此非智者之語何足為説也十九年許世子止弑其君買榖梁曰日弑正卒也冬葬許悼公榖梁曰日卒時葬不使止為弑父也皆非也州吁宋萬商臣商人歸生夏徴舒崔杼寗喜此皆弑其君而書日者可云皆正卒乎春葬陳靈公可云不使夏徴舒為弑君乎大凡春秋所書襃貶豈不明哉待日月而後見之此所以泥而不通也二十年公孫㑹自夢出奔宋榖梁曰自夢者専乎夢也曹無大夫其曰公孫言其以貴取之而不以叛也非也若臣不叛君常事爾何足襃哉襃其有功貶其叛國之兩者之中勿咎勿譽可也二十一年蔡侯東出奔楚榖梁曰東者東國也何為謂之東王父誘而殺焉父執而用焉奔而又奔之曰東惡之而貶之也非也即仲尼欲如此貶東國者書東國不亦足乎徒貶其半名何為即貶其半名為法者使蔡侯止名東當復貶去其上下而云蔡侯田乎二十二年劉子單子以王猛居于皇榖梁曰王猛嫌也非也若王猛嫌豈得云居乎劉子單子以王猛入于王城榖梁曰入者内不受也非也必以入為内弗受則天王入于成周亦弗受乎王子猛卒榖梁曰此不卒者也非也猛雖未成君然謂之小子王卒固當告於諸侯諸侯之未成君之卒乃不書爾又曰其曰卒失嫌也亦非也猛未逾年不可言崩又不可言薨是以通言卒爾何嫌之失尹氏立王子朝榖梁曰其不名何也别嫌乎尹氏之朝也非也春秋豈嫌於尹氏之朝哉衛人立晉衆所欲立也不曰公子君位定矣尹氏立王子朝獨尹氏所欲立也已僭位號猶稱王子言莫自君也此固逆順之差安可不詳哉二十六年公圍成榖梁曰言圍大公也非也公失國而圍成師在封内而書之此小之甚者不可謂大定公二年雉門及兩觀災榖梁曰其不言雉門災及兩觀何也災自兩觀始也非也吾於公羊既言之矣新作雉門及兩觀榖梁曰其以尊者親之何也雖不正也於美猶可也非也此自記事之體耳雉門先災兩觀後災不得不曰雉門及兩觀災若不言及則似雉門之兩觀災雉門乃無恙也既災之後魯人脩舊理當先門門者所出入者觀者門飾也亦各順其序而書之非聖人横出此意見也四年公及諸侯盟于臯鼬榖梁曰一事而再㑹是也其曰公志於後㑹則非也當此之時魯國微甚㑹之進退非其所敢專何與於責而謂之疑乎劉卷卒榖梁曰此不卒而卒者賢也天王崩為諸侯主也所謂天王崩則昭二十二年景王矣為諸侯主則劉子單子以王猛居于皇是矣以兩者論之卷既為諸侯主而春秋又稱其賢是王猛本正也王猛本正而榖梁謂其篡何哉蔡侯以吳子及楚人戰于柏舉榖梁叙其事曰何以不言救也救大也謂夷狄漸進未可同於中國此妄矣狄人救齊榖梁以謂功近而徳逺不唯得稱救而已矣又進之稱人曽謂吳不如狄乎何其賞罰之偏也吳入楚榖梁曰何以不言滅欲存楚也非也楚實未滅當言入而已矣豈春秋固存之哉且凡滅國春秋未嘗不存也豈於楚也獨存之邪五年丙申季孫意如卒按榖梁例大夫不日卒惡也意如逐君可謂惡矣其日卒何哉豈謂入人之國重於逐已之君哉七年齊人執衛行人北宫結以侵衛榖梁曰以重辭也衛人重北宫結非也執其使伐其國文加以則見之不加以則不見也乃其理然豈為重乎八年公至自侵齊榖梁曰公如往時致月危致也往月致時危往也往月致月惡之也非也公如往時致月此則文公十三年冬公如晉十四年正月公至自晉是也是時公未至晉而衛侯會公于沓至晉而得其君盟盟而反鄭伯又會公于棐一出而三國附最榮矣何以危致之也夫徃月致時此則宣十七年六月同盟于斷道秋公至自會是也是時諸侯協心而同外楚中國為一無有他變何以危徃也夫徃月致月此則僖四年正月侵蔡蔡潰遂伐楚八月公至自伐楚是也是時齊桓主諸侯榖梁以齊桓為知所侵又曰以伐楚致大伐楚最盛矣何以惡之也且榖梁欲言其危當得其危之狀欲言其惡當指其惡之形今謂之危無狀也謂之惡無形也設空文而無實驗不可致詰非所以解經也故略舉三事以彰其不然十年公至自頰谷榖梁曰離會不致致危之也非也近上八年公會晉師于瓦亦致又何危乎且如榖梁所說頰谷之會聖人相之齊侯震懼歸地謝過齊則危矣魯何危乎又曰其以地致何也危之也亦非也兩國會盟致皆以地此常例爾何說危哉十一年宋公之弟辰及仲佗石彄自陳入于蕭以叛榖梁曰辰未失其弟也非也公子不去國而辰棄親出奔挾黨為亂以謂未失其弟何妄甚也十三年晉趙鞅歸于晉榖梁曰其言歸貴其以地反也非也茍使趙鞅為之不義雖以地反能免於貶乎然則鞅之得言歸非貴其以地反也貴其忠信足恃也十四年天王使石尚來歸脤榖梁曰石尚欲書春秋諫曰久矣周之不行禮於魯也請行脤不知石尚欲書孔子之春秋乎魯國之春秋乎若孔子之春秋也孔子是時未作春秋石尚安得書如魯國之春秋也王人至則書之矣何足以為榮邪凡人之欲書春秋者以有殊功異徳欲使後世見也石尚何有而欲書乎是殆不然哀公二年納衛世子榖梁之說非也江熙是矣四年盜弑蔡侯申榖梁曰稱盜以弑君不以上下道道也非也盜即微者爾辟稱人故云盜也即不以上下道道曷為稱弑乎五年閏月葬齊景公榖梁曰不正其閏也非也喪以年斷者不以閏數以月斷者則以閏數葬之為事以月斷者也以閏數冝矣何謂不正乎六年陳乞弑其君荼榖梁曰陽生正荼不正然而荼受命陽生不受命如此陽生得罪於先君荼乃其君也弑先君所命是則弑其君矣又何云不以陽生君荼乎假令先君廢陽生為非義自可聽天子伯主治之耳今至躬弑其君春秋猶詭其罪以與陳乞何哉且令陳乞無預陽生之事春秋又將强委一卿以弑君之罪乎要之陳乞主陽生而弑荼可知也七年入邾以邾子益來榖梁曰其言來者外魯之辭非也春秋襃善貶惡直書入邾又言以邾子益來於君親之過而無所隱義已足矣豈以一失之故遂外其君乎且令春秋不外其君則當曰以邾子益歸乎夫歸可施於人不可施於我來可施於我不可施於人詳於此之意者可以知春秋之文矣十二年孟子卒榖梁曰其不言夫人諱取同姓也非也孟子者孟姬而曰孟子則是諱同姓矣不曰夫人豈諱同姓乎十四年獲麟榖梁曰不言其來不外麟也不言有不使麟不恒有也皆非也謂之獲麟矣則不得言其來不得言其有記事之理也何說乎即以言其來為外之季子來歸亦外之也即以言其有為使不恒有大有年亦使不恒有邪故守一而廢百謂之章句之儒去道逺矣春秋權衡卷十七
