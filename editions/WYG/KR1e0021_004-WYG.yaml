body:
  text: 春秋權衡卷四宋劉敞撰僖公元年正月傳曰不稱公即位公出故也非也去年八月閔公遭弑僖公自邾入為君至此乆矣國内已麤定不應猶以出奔之故不行即位禮也即位與朝廟相較何如朝廟則得即位則不得皆非春秋本意妄釋之者也傳曰公出復入不書諱之也諱國惡禮也杜氏曰掩惡揚善義存君親皆當時臣子率意而隐故無淺深之準非也傳所云者似言仲尼作春秋改舊史有所不書之意也非當時史官以諱為禮也何以知之邪按御孫謂莊公曰君舉必書書而不法後嗣何觀以御孫之說論之君之不法無所不書也既無所不書則是諱國惡者非史官之事春秋之意也為之臣子率意為君父諱非也臣之意莫不欲尊其君子之意莫不欲美其親如此國史為無有實事皆虚美也謂之史可乎故春秋一也魯人記之則為史仲尼脩之則為經經出于史而史非經也史可以為經而經非史也譬如攻石取玉玉之産於石必也而石不可謂之玉披沙取金金之産於沙必也而沙不可謂之金魯國之史賢人之記沙之與石也春秋之法仲尼之筆金之與玉也金玉必待揀擇追琢而後見春秋亦待筆削改易而後成也謂春秋之文皆舊史所記無用仲尼者是謂金玉不待揀擇追琢而得非其類矣獲莒挐左氏曰非卿也嘉獲之也非也莒挐與鄭詹二者何異哉何以必其非卿邪就令非卿但是主將亦當書也若非卿又非主將徒一賤者亦何可嘉而春秋詭正法書之乎夫人氏之喪至自齊杜氏曰不稱姜闕文非也春秋之義以一字為襃貶茍所不通者則謂之闕文春秋何文不闕也夫人孫于齊不稱姜氏亦闕文邪知不稱姜氏之為貶而不知稱姜氏之為貶此猶知二五而不知十者也二年城楚丘杜氏曰不言城衛未遷也非也傳云封衞于楚丘詩序云文公徙居楚丘始建城市而營宫室然則先徙而後築城明矣且詩云定之方中作于楚宫定星之中十月也夏之十月周十二月也今經書正月城楚丘傳曰不書所㑹後也然則衞人以十月築城而魯以十一月㑹之後其期也魯雖後其期然衛必先徙而後築城先城而後營宫室故詩人美其得時也營宫室得十月之時則其徙都在十月前明矣徙都在十月前則十一月城楚丘不得言未遷也虞師晉師滅下陽杜氏例云用大師曰滅非也滅國曰滅君死其位曰滅非此二者則不可以滅書之别國邑也若滅邑與滅國同稱則滅邑與滅國亦同其罪乎君子之所慎正名而已矣安可亂哉三年徐人取舒杜氏例曰勝國而不用大師亦曰取非也成國重於附庸附庸重於都邑春秋凡記禍亂冝分别此三等之異知其罪有大小輕重淺深者也今顧不然反為不道者記師行難易而已何益於襃貶哉吾又驗之於事按衛侯滅邢因禮至昆弟殺其守臣而取之可謂易矣何以不書取邪公以楚師伐齊取榖以魯之衆又加以楚而公親將可謂用大師矣何以不書滅邪然則滅取之名不為難易出可也可知矣四年許男新臣卒左氏云卒于師非也若實卒于師經何以不記邪召陵地屬潁川潁川今許昌郡也許昌許國矣明許男有疾歸其國而卒故不得書卒于師也其云葬之以侯者似當時臣子欲歸美君父故引許男方㑹諸侯而卒私以加等之禮葬之猶漢時羣臣議成帝諡引其欲作明堂辟雍以襃之矣其實非禮左氏謬以為禮何以言之許男卒于師是則可襃今卒于國不足襃也卒于師者言其圖義忘身知義不惑也已去師而歸其國此則貪生徇私不知命人矣與公子遂至黄乃復專恣廢命何異而妄以為襃之得禮邪及江人黄人伐陳杜氏曰受齊命討陳而以與謀為文者時齊不行使魯為主非也與謀曰及不與謀曰㑹或實與謀而不曰及或實不與謀而不曰㑹皆妄也又所謂謀者何謀乎竒衺之謀乎謀所侵伐之謀乎若竒衺之謀也春秋之中㑹及多矣不必盡謀竒衺也若謀所侵伐而已凡諸侯之㑹將有所討在㑹之國皆與之矣又安有不與者乎故曰妄也五年晉侯殺其太子申生左氏傳去年十二月太子縊于新城杜云書春從告非也告雖後時猶當舉其實月此則丘明所據史書是用夏正記時者夏十二月於周為春本當書於春誤之於冬也杞伯姬來朝其子杜云朝其子者因有諸侯子得行朝義而卒不成朝禮非也若不成朝何以得書朝邪又諸侯之子雖有攝其君之說殆非謂厭事而朝者矣乃若周公使伯禽就封而身留周者爾或者父老傳政其子猶宗子傳家也堯老使舜攝舜老使禹攝之類是乃可爾茍厭政事以國與子不可也晉人執虞公左氏曰晉襲虞滅之而脩虞祀且歸其職貢于王故書曰晉人執虞公罪虞且言易也非也虞晉同姓滅之大罪也雖其自欲文飾脩祀歸貢不足以掩其大惡春秋曷為聼之邪滅人之國廢王者所封絶先祖之體茍能脩祀歸貢者可無譏矣天下之强誰不暴弱天下之衆誰不暴寡哉此無他左氏本不受經不知其義怪其文理異常因彫琢遷就為此爾傳曰正月辛亥朔日南至公既視朔遂登觀臺以望而書禮也凡分至啓閉必書雲物為備故也然則舊史蓋記公之書雲物矣傳所言凡是觧舊史者也仲尼脩春秋而去之以謂常事不足書也以是觀焉常事不書於三傳為通六年圍新城左氏曰鄭所以不時城也非也齊桓公㑹諸侯于首止正王太子之位尊王太子而不敢與盟其禮甚恭其義甚髙諸侯莫不受盟獨鄭逃歸伐之不為無辭豈强取新城然後達其罪哉蓋疑伐不言圍者横出此說諸侯救許左氏云許男降楚楚子赦之實無此事皆妄也何以言之諸侯救許許圍已觧何苦自辱追降于楚哉此非人情也又是後許男常與諸侯㑹亦足以知其初不降楚也七年盟于寗母按傳鄭伯使太子華聼命於㑹言於齊侯曰洩氏孔氏子人氏三族實違君命君若去之我以鄭為内臣齊侯將許之管仲曰㑹而列姦何以示後嗣記姦之位君盟替矣君其勿許齊侯辭焉子華由是得罪於鄭尋此諸文則齊桓為用管仲之言不與子華盟也今寗母之盟實有子華與傳異矣是何故哉八年鄭伯乞盟杜云新服未與㑹故不序列别言乞盟非也若已與盟文自當序若盟畢乃至當言如㑹不當但云乞盟又不見諸侯與之盟也明此乃約之耳且左氏亦但言請服不言其來禘于太廟用致夫人左氏云致哀姜也哀姜之死以夫人之禮舉之諸侯莫不聞曷為更八年乃致于廟哉又曰凡夫人不薨于寢不殯于廟不赴于同姓不祔于姑則弗致也按哀姜於此四者唯不薨于寢爾其餘皆備矣則是凡國君夫人於四者一不備則不致于廟也設令夫人歸寧而死亦將不致乎天王崩前年傳曰惠王崩襄王惡太叔帶之難懼不立不𤼵喪而告難于齊今年盟于洮謀王室也然則盟于洮之時諸侯已知王崩矣不應練而告諸侯也假使當時有難亦不能匿喪彌年況實無難但欲假外援者乎然則洮之㑹本不謀王室也左氏既誤謂王以前年閏月崩則遂謂洮之㑹謀王室矣以洮之㑹謀王室見經書王崩在今年十二月則㑹襄王定位而後𤼵喪矣皆不可信九年㑹于葵丘按去年十二月王崩此會宰周公臨之然則七年傳所云告難于齊者實八年十二月事也八年㑹于洮謀王室者實今葵丘事也古記不同以故差互云十年正月晉里克弑其君卓左氏傳去年十一月里克弑卓子此據夏正十一月即周正月矣采獲兩書誤其前後爾杜云從赴非也及其大夫荀息杜氏曰荀息稱名者雖欲復言本無逺謀從君于昬亦非也南容三復白圭孔子以其兄之子妻之徒口誦之爾猶見襃擇況如荀息身踐之者乎夫復言者信也責其逺謀非也又曰從君于昬若謂息從君殺申生之昬邪殺申生時荀息但傅奚齊爾非執政大臣也息不當坐其責若謂息從君立奚齊之昬邪申生已死國無冢嗣君命立奚齊是則君矣何以為昬然則荀息之名非貶之也吾既言之矣晉殺其大夫里克杜云稱名罪之按里克弑君不冝與申侯國佐等同例何不若欒盈無知之類稱人以殺之乎大雨雪杜據傳例云平地尺也非也平地尺雪常事耳何足稱大而異之乎十一年晉殺其大夫㔻鄭父按傳去年冬晉殺㔻鄭今經不同者杜云從赴非也傳所據者簡牘所記以夏正記時故使春冬錯不自知誤矣乃復以為晉晚來告來告雖晚史所書自應正之不容顛倒時月也十四年季􅁎及鄫子遇于防使鄫子來朝左氏曰鄫季􅁎來寧非也按經季姬不繫鄫此未嫁之文也又是後有季姬歸于鄫始嫁之文也若實來寧何故再書其歸乎杞伯姬來亦來寧也何以不書歸乎十五年公孫敖帥師及諸侯之大夫救徐按傳例與謀曰及不與謀曰會而叔孫僑如會士燮齊人邾人伐郯本實與謀杜云受盟主之命非匹敵和成之類不得言及也然則此公孫敖亦受盟主之命應不言及者何故獨言及邪季􅁎歸于鄫杜云來寧不書此書者明中絶非也去年傳云公怒止之止之者豈絶之哉魯人為國諱醜彫斲止之之說以求掩其迹仲尼之作經推例以知義因文以盡情繁而不憂亂變而不憂惑者也主人習其讀而不知學者原其事而知之此類是也傳既不可信注因追其妄皆非矣震夷伯之廟左氏云展氏有隐慝如此則夷為展氏之諡非也春秋國史也君前臣名縱不可名之猶當繫字於氏寧有稱其諡遂舍其族哉經曰葬桓王不繫周者王至尊也又曰吉禘于莊公不繫魯者君至尊也唯此二者可以爵諡通其餘雖大國必繫諡於國别内外也雖貴臣必繫字於氏别尊卑也齊桓晉文皆繫國原仲髙子皆繫氏臣無舉諡於君側者也君之謚通於國臣之諡通於家魯非夷伯之國夷伯非魯國之君春秋非展氏之私譜仲尼非展氏之家臣如欲記夷伯之事應舉其氏而繫字焉不應直著諡去族以侵亂至尊之名稱也戰于韓獲晉侯杜云得大夫曰獲貶晉侯故下從衆臣之例而不言以歸非也獲者獲得之也以歸者非獲得之也觀文自了矣以歸何可以獲言之獲何可以以歸言之大凡君死其位曰滅生得曰獲大夫生死皆曰獲此所以異君臣之詞也不限獲於臣也杜氏又云不書敗績晉師不大崩亦非也君將不言帥師者君重於師也君傷不言師敗績者亦君重於師也君獲不言師敗績者亦君重於師也此三者異文同義杜氏信其一不信其二亦不知類矣且傳曰三敗及韓又曰宼深矣庸非大崩乎十六年公子季友卒杜云稱字者貴之非也前此公子友見經者多矣何不悉貴乎春秋襃貶各以其事故獲莒挐雖有功猶不稱字季子來歸以知權見襃其餘無稱字者死何獨貴乎若以友賢故當貴之則仲遂又何賢矣而貴之乎若以謂時君賢之故史字之按公子彄卒隐公曰叔父有憾於寡人寡人不敢忘葬之加一等是隐公賢彄也何以不字之乎季文子卒大夫入斂公在位宰庀家器為葬備無衣帛之妾無食粟之馬無藏金玉無重器備君子是以知季文子之忠於公室也最賢矣亦何以不字之乎十七年夏滅項左氏曰淮之會公有諸侯之事未歸而取項齊人以為討而止公按此自相伐也去年十二月會于淮傳曰城鄫役人病有夜登丘而呼曰齊有亂不果城而還則是諸侯之事已畢矣諸侯已歸矣滅項在今年夏何故云有諸侯之事未歸乎即此傳是彼言不果城而還非也即彼傳是此言有諸侯之事未歸非也然則公自會還過項因而擊取之事定乃還也春秋諱其惡故滅不言公非不言滅矣十八年邢人狄人伐衛杜云狄稱人者史異詞傳無義例非也自是傳無義爾何足為史異詞乎十九年宋人執滕子嬰齊杜云稱人執者宋以罪及民告非也宋為無道誣人之君以告諸侯而春秋不為辨則是春秋同其惡也若苟赴者而書之不擇眞偽焉又何以為孔子又曰傳例不以名為義書名及不書名皆從赴亦非也自是傳例不以名為義爾何足謂書名不書名皆從赴乎按榖伯綏來朝鄧侯吾離來朝傳曰名賤之也衛侯燬滅邢傳曰同姓故名尋此二者傳亦以名為義也記事駮雜是非混淆例不能推此傳之大病所以自伐賊其學其本在不受經於仲尼也學者因謂傳不以名為義矣不亦妄乎鄫子㑹盟于邾己酉邾人執鄫子用之左氏曰宋公使邾文公用鄫子于次雎之社此大妄也六月會于曹南此自一㑹是時雖有邾人即非邾子今此會盟于邾者詳驗經文是邾國自為盟㑹鄫子往參之因見執耳非復會向者曹南之盟也若即㑹向者曹南之盟應但云如會實未嘗盟何得言會盟邪又宋為伯主而使邾子用鄫之君罪乃在宋不在邾也杜氏以為不書宋使邾者南面之君善惡自專不得託之他命非也季姬使鄫子來朝鄫子亦南面之君春秋著季姬使之者兩見其惡也今春秋亦宋公使邾人執鄫子用之亦兩見其惡豈不可乎以此推之知宋公未嘗使邾人執鄫子也若實宋公使邾人執鄫子者理無不書宋公也若宋公使邾人執鄫子而春秋越宋理邾者是為首惡者不誅而脅從者見討也夫邾之於宋可謂脅從矣宋能執人之君而用之其暴強孰甚焉邾微國也不得不畏而從之即有不畏不從者宋能用鄫之君獨不能用邾之君乎以是觀焉邾乃所謂脅從也夫脅從者坐應輕不得反重而代宋受惡也春秋原心定罪豈其若是哉吾固曰宋不使邾用鄫子也杜氏又云稱人執者宋以罪及民告吾向者既言之矣二十一年楚人使冝申來獻㨗杜氏云不言宋㨗者從可知非也齊侯伐山戎後來獻㨗閒亦無戰事則曷為不從可知而復云戎捷乎又曰不稱楚子使來不稱君命行禮亦非也若不稱君命則賔主如何為詞楚人者即楚子爾稱使者即君使臣爾若本不稱君命當曰楚冝申來獻捷而己不當復加楚人使也加楚人使為楚子明豈不稱君命者乎傳曰邾人滅須句須句子來奔若然經何以不書邪杜氏曰須句雖别國而削弱不能自通為魯私屬若顓㬰之比謂之社稷之臣故滅奔及反其君皆不備書非也顓􅁷雖謂之社稷之臣然受王命為魯附庸自不得見經爾須句非附庸又傳曰實司太皥與有濟之祀以服事諸夏非魯私屬明矣假令為魯私屬亦不得稱來奔奔者皆列國也今傳稱須句子來奔是非私屬也且魯亡其私屬則自冝救之又何待成風為之言哉成風為之言是又見非魯私屬也須句非魯私屬其國滅其君來奔經不冝不書也以經不書知無有此事也然則是須句前滅於邾其國為邑矣其民不服故魯人往伐取之爾無他也二十二年公伐邾取須句左氏曰反其君焉非也若誠有之經何以不書哉得國而反其君義事也齊桓晉文所難也今而不書是不將順其美乎及邾人戰於升陘杜云邾人獲公胄懸之魚門故深恥之不言師敗績非也如杜所說苟不深恥則不諱敗矣所以深恥者以公喪胄危辱切近也然則乾時之戰公喪戎路左右皆止反獨不恥而書敗績何哉喪胄之辱孰與喪路之深升陘之恥孰與乾時見逼脅之急是大不然者也宋師敗績按傳宋公傷股門官殱焉然則當書宋公敗績不當云宋師也成十六年楚子敗績杜云楚師未大崩以楚子傷目而退故曰楚子敗績若是則楚子身敗楚師不敗猶曰楚子敗績今宋公身敗宋師又敗何以但記宋師敗績邪即以謂楚師不敗楚子身敗得言楚子敗績宋師既敗宋公亦敗不得言宋公敗績者按傳例大崩曰敗績楚子雖傷實非大崩大崩者師衆之稱不得施於楚子之身今施於楚子之身者明是乃楚衆敗也且楚師豈非大崩者乎其言曰敗者壹大又曰薄於險又曰覆師徒又曰臣之卒實奔㣲大崩也胡以當之然則宋楚大崩類也宋楚之傷亦類也一言師敗一言君敗其不類何也妄謂君敗師不敗是反於傳而謬於經經之言敗績乃大崩也若謂君敗師不敗者是未嘗大崩豈得云敗績哉二十三年把子卒左氏云把夷也杜云仲尼以文貶之非也仲尼作春秋雖以文襃貶乎猶不擅進退諸侯也諸侯之惡有甚於杞者仲尼無所貶蓋不以匹夫侵天子之事豈若是顓之亂名實哉二十五年衛侯燬滅邢左氏曰同姓也故名非也晉滅虢又滅虞齊滅紀楚滅夔皆同姓也何以皆不名邪公㑹衛子莒慶盟于洮杜云衛文公既葬成公不稱爵者述父之志降名從未成君故書子以善之非也諸侯逾年即位即位稱君不即位不稱君此乃常禮以年為限不以葬為限若即以葬為限葬畢可以稱君何待明年乃改元邪春秋之時禮法放絶見諸侯葬畢輒稱君因謂禮矣此衰世習俗之敝何足據邪諸杜所言天子諸侯喪制皆若此非古法也吾向者既言之矣二十四年楚人滅夔杜云夔有不祀之罪故不譏楚滅同姓非也夔雖有罪楚亦非得專滅也如此是征伐自諸侯出乃可矣且楚乃使人滅夔勢不得此衛侯衛侯燬滅邢此親之之文也且夔不祀祝融鬻熊禮也非所以為罪也衛祖康叔不敢祀后稷魯祖周公不敢祀公劉祝融猶后稷鬻熊猶公劉矣寧可復責此二國邪二十七年楚人陳侯蔡侯鄭伯許男圍宋杜云子玉也書人者恥不得志以微者告非也傳云楚子及諸侯圍宋此則非子玉矣杜又云楚人序上者主兵故亦非也趙盾主兵序諸侯下凡云主兵序上者皆謂列同者爾如侯伯與大夫其尊卑不嫌雖伯主之卿猶序君下也又按經公㑹諸侯盟于宋若楚人非楚子者應如扈之盟書云公㑹諸侯楚大夫乃可矣二十八年晉侯侵曹晉侯伐衛杜云再舉晉侯者曹衛兩來告非也使晉人又自來告者寧可復書晉侯侵曹伐衛乎公子買戍衛不卒戍刺之左氏曰公懼於晉殺子叢以說焉然則魯公妄以罪惡誣殺買耳非買之實不戍也則春秋曷為遂從其誣辭眞以不卒戍罪買哉疑買見機設權不卒戍事而公貪與楚歡遂以不卒戍罪買不復計其有權也按此經殺公子買畢楚人乃救衞而傳云楚人救衛不克公乃殺子叢與經相背也其言詎可盡信哉及楚人戰杜云楚子玉恥敗告文略故稱人非也赴告者豈有常哉或以白為黒曲為直寧可亦不正邪又此下有楚殺其大夫得臣此必楚人來告其敗軍違命也尚告子玉之罪豈諱子玉之敗乎足知子玉稱人非從赴而已盟于踐土左氏曰王子虎盟諸侯于王庭今按經無王子虎如左氏之說則為天子已在是也諸侯應先朝後盟今按盟訖公乃朝于王所用此推之必知盟時王未來也若盟時王已來者諸侯豈得先盟後朝哉其所言作王宫及王子虎要言之事皆虚也衛侯鄭自楚復歸于衛左氏曰晉人復衛侯然則於例為諸侯納之也當曰歸不當曰復歸書復歸是衛人復之非晉人也杜氏以謂晉人感叔武之賢故復衛侯衛侯之復由於叔武故以國逆為文然則蔡季自陳歸于蔡由蔡人召之傳有明文何故不曰入而從諸侯納之之例書歸也晉人感叔武之賢而復衞侯有以異於陳人順蔡人之召而納季乎書蔡季則遺其本意書衞侯則探其本情又未必與傳合也傳無晉人感叔武之語杜氏何由知之乎然則傳與注皆謬亂不足以觧經元咺出奔晉左氏曰叔武聞君至喜捉髪走出前驅射而殺之公知其無罪也枕之股而哭之歂犬走出公使殺之元咺出奔晉非也如傳此言殺叔武者衛侯為不知情又以為叔武報殺其讎又親枕之股而哭之兄弟之恩篤矣元咺何縁奔晉愬其殺弟乎假令咺欲誣其君至其訟也咺當不勝衛侯何故反不勝乎假令咺為人矯虔強辯足以飾非晉人豈不知其嘗為叔武殺歂犬乎用此推之衛侯眞殺叔武者也故元咺往愬于晉矣故衛使與之訟而不勝矣不然則咺無義以愬其君就令愬之必無說以勝其君不亦顯然乎天王狩于河陽左氏曰晉侯召王且使王狩仲尼曰以臣召君不可以訓故書曰天王狩于河陽吾謂左氏迷惑此說心未能了何者本但晉侯召王自嫌不順故使王狩以匿其罪耳狩不當書今故書者所以起狩為晉侯召也其義已足而左氏既云晉侯使王狩矣又云仲尼為其不可以訓故書狩即實使王狩非仲尼故書也即實仲尼書之非使王狩也其言首尾相反由迷惑故也又曰言非其地且明徳也亦非也晉文召王意在尊周其禮雖悖其情甚順仲尼原心定罪故寛其法耳亦何徳之明然則左氏固暗于王道而非仲尼之徒者邪吾聞仲尼之徒乃恥言五伯元咺復歸于衛杜云從國逆例者明衛侯無道於民國人與元咺非也假令國人與元咺實非國逆從諸侯納之例自足何強變易彼此哉且左氏本設此納入例者非為襃貶也乃以存事實也今更事實横就襃貶誰能知之哉二十九年春介葛盧來按隐元年傳改葬惠公衛侯來㑹葬不見公故不書然則葛盧來亦不見公何以反書邪杜云雖不見公國賔禮之故書也然則當隐元年衛侯來㑹葬都不賔禮之邪所謂賔禮之者即傳所云饋之芻米者也方衛侯之會葬也魯之臣子曽不誰何聼其所為乎如是何謂會葬矣吾以此推之隐元年之說妄也非實事也㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉左氏曰公㑹王子虎卿不書罪之也非也若公不應會王大夫為之諱者沒公可矣乃貶王大夫使從人稱何哉且是會也必王子虎受王命而盟矣是則非魯侯所能制魯侯能身從之方存乎見襃又曷為諱貶三十年衛殺其大夫元咺及公子瑕左氏云元咺立公子瑕然則瑕已為君當與衛剽同不當冠公子而名之也即以謂國人不與諸侯不助者當與陳佗同不當仍冠公子也瑕冠公子此其不君明矣假令元咺實立瑕者猶當書云衛殺其公子瑕及其大夫元咺元咺以瑕為君瑕以元咺為臣正其君臣則非罪惡明矣無為先咺以及瑕也衛剽稱侯陳佗不氏皆出左氏義何忽至此而迷亂其說哉衛侯鄭歸于衛杜氏云魯為之請故從諸侯納之例今按傳文魯但能請免衛侯於獄而周歂冶厪逆衛侯歸耳遂從諸侯納例與傳不合傳又與其例不合要之左氏歸入之例蓋不可通其幸而合則說曰例如此其有不合則說曰從其例假令本書衛侯鄭入于衛吾知杜氏必曰周冶納之故書入矣苟以是推之則何不可通哉衛侯衎復歸于衛事又與此相類彼言復歸此獨言歸了不可知也公子遂如京師遂如晉杜氏云公既命襄仲聘周又令自周聘晉非也凡言遂者皆大夫生事專命耳非素受命者也即以遂為受命之辭者公子結亦為受命行非權事也一以為權一以為非權何哉三十一年取濟西田左氏曰使臧文仲往非也若實臧文仲往不應不書注謂文仲但請田非聘饗會同故不書亦非也告糴乞師弔葬致女皆書不獨彼四事書請田非常自應書又叔孫豹鄫世子巫如晉亦書即請田之比也禮曰卿非君命不越境越境則書之何限請田獨不書哉明此請田者即去年公子遂非臧文仲也遂既聘周聞晉人頒諸侯之田因便冝聘晉以故得濟西田也魯人憎遂而好臧文仲推遂之美附著臧氏左丘明承虚記之爾不然經無縁不言臧孫辰如晉也又曰分曹地自洮以南東傅于濟若然當謂之取曹田自濟水不得云取濟西田而已四卜郊不從乃免牲左氏曰非禮也禮不卜常祀而卜其牲日按如此說是也所謂不從者即謂日不吉耳不吉則不敢郊故免牲也又曰牛卜日曰牲牲成而卜郊上怠慢也非也繫者即牲牲之名乆矣豈必卜日哉且魯人亦必不先卜牲日而後卜郊卜郊者卜其日吉否也非卜其郊可否也左氏疑魯之卜卜郊可否也是以誤之爾三十三年晉人及姜戎敗秦師于殽杜云晉諱背喪用兵以微者告非也若亂常廢禮而諱可以免則春秋襃貶安所施哉又曰晉人角之諸戎犄之不同陳故言及亦非也戎子駒支雖為此語正以捕鹿為譬耳非必異地而戰也且凡戰者豈嘗同陳乎成十六年戰于鄢傳曰鄭陣而不整是異也然而經書楚子鄭伯不加及以絶也晉人敗狄于箕左氏曰晉侯敗狄于箕又曰先軫入狄師死焉然則敗狄者晉侯先軫也其曰人何邪杜氏曰郤缺稱人者未為卿杜之此言據傳有郤缺獲白狄子耳按經不言白狄又不言獲狄子也傳既與經違注又與傳違經但云狄傳云白狄經但云敗傳云獲其君傳謂襄公先軫親之注乃引郤缺而已皆二三不可曉者也傳曰葬僖公緩作主非禮也杜氏讀緩字以上為一句作字下為一句非也僖公以十二月薨以明年四月葬凡五月也不得云緩杜氏本欲遷僖公之薨在十一月僖公之薨在十一月則除喪在文二年十一月因以文納幣為十二月文納幣為十二月則與傳合矣而不顧理乖也傳云葬僖公緩作主者緩以下乃當為一句言葬僖公而作主緩即文二年經書作僖公主是也今欲屬緩於葬僖公以明僖公為十一月薨獨不顧作主非禮也之語無所繫是傳譏葬緩又譏不當作主乎茍欲遂已之說黨其所附不求於道眞可怪也哉春秋權衡卷四
