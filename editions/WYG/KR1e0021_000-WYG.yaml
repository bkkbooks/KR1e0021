body:
  text: 春秋權衡春秋類提要臣等謹按春秋權衡十七卷宋劉敞撰敞字原父臨江新喻人慶厯中舉進士官至集賢院學士事迹具宋史本𫝊據其弟攽作敞行狀及歐陽修作敞墓誌具稱敞春秋傳十五卷權衡十七巻説例二卷文權二卷意林五卷王應麟玉海所記亦同陳振孫書録解題曰原父始為權衡以平三家之得失然後集衆説斷以己意而為之傳傳所不盡者見之意林然則𫝊之作在意林前此書又在傳前敞春秋之學此其根祇矣自序謂權衡始出未有讀者又謂非達學與通人則亦必不能觀之其自命甚髙葉夢得作石林春秋𫝊于諸家義疏多所排斥尤詆孫復尊王𤼵微謂其不深于禮樂故其言多自牴牾有甚害于經者雖槩以禮論當時之過而不能盡禮之制尤為膚淺惟于敞則推其淵源之正葢敞邃于禮故是書進退諸説徃徃依經立義不以復之意為斷制此亦説貴徴實之一驗也乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b8a8651af565a64381f89a4a462dde39a1d502727c83f8c5b4dea16f5a53bcee
