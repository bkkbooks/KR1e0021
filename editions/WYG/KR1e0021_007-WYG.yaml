body:
  text: 春秋權衡卷七宋劉敞撰十四年春意如至自晉傳曰尊晉罪己也以舎族非也此亦一事再見卒名耳魯本無罪何罪己之有且春秋假魯事以達王義非專為魯記其憂樂之情而已也假使魯當時不敢怨晉安於受辱固非春秋所特書也况魯本無罪乎莒殺其公子意恢杜云意恢與亂君為黨故書名惡之非也傳所言意恢死時事無有黨於亂君者正為君自與意恢善而亂臣忌之欲先殺意恢乃逐其君耳且意恢與君兄弟也雖黨無惡詩人同姓之義猶曰不能奮飛况但善之何傷若君有小惡不務親輔而同姓之臣先懐異心欲肆其虐如是自謂不黨乎宋督有無君之心而後動於惡故先書弑君此親左氏義非異人說也今公子鐸及蒲餘侯亦皆懐無君之心而先殺意恢者春秋不錄其罪既異孔父矣又專疾意恢何哉孤君之勢成臣之亂不亦甚乎若曰莒子不慼國人不順此其罪有甚大者則又不然自殷祖甲不能無不順故伊尹放諸桐宫三年復歸于亳卒為興王今鐸與蒲餘非有伊尹之心欲其君善者也直忮很犯上出君以自便耳如是春秋不貶鐸與蒲餘乎傳曰南蒯奔齊侍飲酒於景公公曰叛夫對曰臣欲張公室也子韓晢曰家臣而欲張公室罪莫大焉又南蒯之初叛也盟費人司徒老祁慮癸二人南氏家臣偽廢疾使請於南蒯曰臣願受盟而疾興若以君靈不死請待間而盟許之二子因民之欲叛也請朝衆而盟遂刼南蒯復歸費於季氏然則南蒯以家臣張公室而為罪二子以私臣謀卿邑而為功者也若南蒯信有罪則二子亦固有罪若二子信有功則南蒯亦固有功今季氏專魯南蒯叛南蒯專費二子叛所以為家臣同也所以謀公室同也一臧一否孰為合於義邪曰俱不合也臣而叛之則非所謂矣從而為惡又非所以事君也知其不善則莫若正之正之不能得則莫若去之君子之道如此而已矣叛非義也十五年蔡朝吳出奔鄭杜云朝吳不逺讒人所以見逐而書名非也如傳所述則無極讒之蔡人妬之朝吳非有罪也乃所謂禍出於不意者朝吳安能防之哉且必若云是管蔡流言周公居東亦為有罪乎夫春秋以字為襃襃者未必皆字也字者亦未必皆襃也以名為貶貶者未必皆名也名者亦未必皆貶也如謂字者皆襃則邾儀父何襃矣如謂襃者皆字則凡諸侯之善何不字而褒之也如謂名者皆貶則公子友及凡大夫之名何貶矣如謂貶者皆名則仲遂之字何為書也夫諸侯之不以字為褒猶大夫之不以名為貶諸侯可以爵通不可以字通大夫可以名通不可以字通故也欲一以名為貶字為襃則必不合患其不合則誣人之惡以納之飾人之善以出之可謂義乎十七年六月日有食之傳曰唯正月朔慝未作日有食之於是乎有伐鼓用幣又引夏書以證之今按夏書乃季秋月朔非正陽之月詩云十月之交朔日辛夘日有食之亦孔之醜然則古人不獨以正月日食為醜矣傳之所言未可信也十八年傳曰鄭子産為火故簡兵大蒐將為蒐除子大叔之廟在道南其寢在道北其庭小使除徒陳於道南廟北曰子産過女而命速毁乃毁於而向子産朝過而怒之除者南毁子産及衝使從者止之按近上十二年鄭簡公卒將為葬除及㳺氏之廟將毁焉子大叔使其除徒執用以立而無庸毁曰子産過女而問何故不毁乃曰不忍廟也諾將毁矣既如是子産乃使辟之竊謂此兩傳實一事也魯鄭異國說者不同或謂葬時事或謂蒐時事而丘明則兩記之何以明其然邪曰其忸忕小數而不知已非子大叔事也前既不忍毁以為惠矣俄而又自墮之亦非子産事也二十年曹公孫㑹自鄸出奔宋按春秋大夫之奔多矣未有言其自者獨此言自鄸是變例也而左氏無說杜氏不解何哉盜殺衛侯之兄縶左氏曰齊豹殺之求名而亡非也齊豹不名者儻未為大夫耳設春秋欲見豹罪而書其名不愈於泛謂之盜乎且豹亦何求名之有此夫殺人不忌者也而曽以是為名乎二十一年宋華亥向寧華定自陳入于宋南里以畔按左氏例以惡入曰復入此三大夫乃畔也何故不書復入邪豈以畔非惡之謂乎蔡侯朱出奔楚左氏曰費無極取貨於東國而謂蔡人曰朱不用命於楚君王將立東國若不先従王欲楚必圍蔡蔡人懼乃出朱此非必然也君重矣蔡人雖畏楚獨能不審其同異是非而信單辭無驗之語以逐其君乎若讒人之言一再至而君可逐也方城以北無定君矣此乃惡無極之為人而多為之罪以深其惡者不然不至於此傳曰日有食之公問於梓慎梓慎對曰二至二分日有食之不為災非也詩云十月之交朔日辛卯日有食之亦孔之醜周之十月夏之仲秋也若不為災曷為醜之二十二年叔鞅如京師𦵏景王王室亂杜云承叔鞅之言而書之未知誰是故但曰亂非也左氏凡例常以據簡書赴告而錄故曰滅不告敗勝不告克亦不書也未有詢于使者之口而書之者也此其說自相賊矣且王室雖亂景王已葬王猛在喪位矣叔鞅豈得不知其是非哉又傳稱閔子馬聞叔鞅之言而稱曰子朝必不免則是叔鞅已知子朝之非正矣非獨叔鞅親見其事者知之也閔子有言是魯國之人亦通知之也何謂未知誰是邪劉子單子以王猛居于皇杜氏曰王猛書名未即位也是也此明未即位雖先君已葬猶未得稱王者也及其論諸侯之禮則以謂先君既葬其子得稱君矣又何戾哉夫諸侯稱君猶天子稱王也天子稱王必待逾年諸侯稱君亦待即位獨謂諸侯既𦵏可以稱君者不識類也二十三年正月叔孫婼如晉左氏曰取邾師獲徐鉏丘弱茅地邾人愬于晉晉人来討叔孫婼如晉此不然也按是年正月有壬寅朔有庚戌有癸丑傳敘邾事在庚戌之後經記叔孫如晉在癸丑之前夫庚戌癸丑四日耳邾人已能訴于晉晉人已能来討何其神速也故曰不然吳敗頓胡沈蔡之師于雞父傳曰楚師大奔又曰不言戰楚未陳也予謂楚未陳而吳以詭謀動之使至於大奔此乃正當従未陳而敗之例不書戰而已不書楚何哉杜云不書楚楚不戰也非也傳曰薳越帥師及諸侯之師奔命救州来又曰七國同役而不同心然則楚與頓胡等皆實在也但自不得成列為吳所詐耳法當不書戰不當不書楚向若楚師獨完諸侯俱敗書諸侯之敗而不書楚猶有可諉今楚等敗耳吳之詐乗人一也曷為偏有所遺乎推驗事理疑楚本與諸侯同救州来既而令尹卒楚軍留而諸侯先至故吳得獨敗之楚師實未與相接則經無縁書楚也傳所云七國同役楚師大奔楚未陳之類皆不與經合似是而非者也尹氏立王子朝按左氏諸稱氏者皆曰舉族此豈舉族立王子朝邪何不云尹圉立朝乎杜雖云尹氏周世卿亦不云氏為世卿發也意欲私取公羊之說而又牽於左氏不忍訟言之說經者乃如此可憫笑也傳曰楚囊瓦為令尹城郢沈尹戌曰子常必亡郢茍不能衛城無益也或曰昔子囊將死遺言城郢君子以為忠囊瓦其孫也城郢之意亦豈易乎而沈尹譏之何哉曰子囊之時其國事治其民親上其隣國無虞所以城郢欲防患也今囊瓦之時其國事不治其民惎上其鄰國多怨所以城郢欲外民也是善惡之趨異也故設險者强恃險者亡子囊之慮安得不忠而囊瓦之名安得不陋哉二十四年吳滅巢杜氏曰巢楚邑非也勝國曰滅君死其位曰滅國大而君重也如取邑可以同滅國之號是獲臣亦可同滅君之稱乎書曰巢伯来朝巢為諸侯審矣非楚邑也二十六年尹氏召伯毛伯以王子朝奔楚傳曰召伯盈逐王子朝杜云召伯當言召氏經誤皆非也召伯既逐王子朝而歸敬王矣又何為以子朝奔乎若云召伯當作召氏者則又不與經合且召伯既自歸周則其族亦必隨之何故猶奉子朝為亂乎且召伯尊也召族卑也今召伯不奔召族自出法不當書於經而敘毛伯之上也又不得以尹氏為比尹氏所以書者以有尹固也固尊自得書耳召族無盈則卑卑何故書乎二十七年楚殺其大夫郤宛杜云無極楚之讒人宛所明知而信近之以取敗亡故書名罪之非也周公遭變孔子被逐如有不幸而死則亦罪之乎今讒人之惡不見理而不幸之人反見收非仲尼作春秋懲勸之本心也二十八年公如晉次于乾侯傳曰公使請逆于晉晉人曰君淹恤在外亦不使一介辱在寡人非也去年㑹于扈傳曰謀納公若魯不告于晉晉何納之謀其謀納公也是魯既告晉矣晉且為公謀納豈得誣其不告哉三十年公在乾侯傳曰不先書鄆與乾侯非公且徵過也非也向者公雖去國然猶居鄆古人所謂若在境内則猶君者也是以不嵗嵗書鄆耳去年公如晉次于乾侯但是暫時止次之名猶以鄆為居自然不得書公在乾侯也今鄆又潰散公無所入羈旅他國國非其有故書公在以繫一國之事是聖人至意深淺各有所出豈但徴過哉公雖有過猶不若季氏之悖也仲尼謂八佾舞於庭是不可忍春秋無不略外而詳内尊君而卑臣其寧縦失季氏專攻公身而已吳滅徐徐子章羽奔楚杜云徐子稱名以名告也非也若必従赴告者安知衛侯燬非當時以名告諸侯而左氏謂其滅同姓何邪三十一年黒肱以濫来奔左氏曰此推言春秋之美且衛齊豹欲求名而不得非也豹挾怨儲憤𤼵泄為亂耳本無不畏强禦之名不畏强禦之名亦非豹所求也欲言春秋之美何患無有而正舉此難信不通之語乎予謂齊豹作亂不能不心媿此正欲盖者非求名者又曰若艱難其身以險危大人而有名章徹攻難之士將奔走之予謂設春秋書齊豹殺衛侯之兄縶其貶甚於稱盜矣人亦未肯奔走其名也三十二年公在乾侯傳曰言不能内外又不能用其人也非也公以三十年始居乾侯春秋嵗嵗書之傳亦嵗嵗為說說之盡異此明不知春秋本意也設公今嵗未死明年正月亦書之耳復欲以何事為解乎定公元年春王杜云不書正月公即位在六月故然則正月所以正即位也即位則書正月未即位則不書正月矣如隐公初不即位何故亦書正月邪三月晉人執宋仲幾于京師傳云執仲幾以歸三月歸諸京師杜云知不可故復歸之京師若然則晉人求掩其不義於諸侯者也何以不告於諸侯乎立煬宫傳云季平子禱于煬宫故立其廟按左氏例茍非公命則事無載於策者立煬宫既本由季孫何以得書邪二年楚人伐吳傳云囊瓦伐吳師于豫章杜云囊瓦稱人見誘以敗軍非也安知非囊瓦恥敗以微者告乎且經又不言其敗也何以知經之貶其敗乎四年三月㑹于召陵五月公及諸侯盟于臯鼬杜謂此共是一㑹復稱公者㑹盟異處故也非也襄二十五年㑹于夷儀盟于重丘亦㑹盟異處矣何不别出公及邪推驗傳文召陵之㑹本為蔡謀楚也范獻子聽荀寅之言遂辭蔡侯則諸侯亦自此散矣不得至五月乃盟也且既辭蔡侯則亦無縁重盟又傳敘召陵之事曰反自召陵鄭子太叔卒趙簡子哭之言反自召陵則無臯鼬矣其下乃云沈人不㑹于召陵晉人使蔡伐沈亦不言臯鼬及盟時事明此非一㑹也盖傳不記臯鼬之盟耳實說召陵之㑹晉辭蔡人不為伐楚故蔡人憤怒伐滅沈國并殺其君晉見蔡侯怨亦恐失蔡故相與復為臯鼬之盟也今傳但云伐沈經云滅沈已自不同傳云晉辭蔡侯又云晉使蔡伐沈復未可信且沈又常役屬楚未嘗通晉晉不當責其不㑹也反覆推之沈所以滅者由蔡侯怨楚而已蔡侯以吳子及楚人戰于柏舉杜云囊瓦稱人貪以致敗是也但於左氏例則無由知之吳入郢杜云不稱子史略文非也公榖是矣六年季孫斯仲孫何忌如晉左氏曰季桓子如晉獻鄭俘也陽虎强使孟懿子往報夫人之幣晉人兼享之審如左氏言者何忌之行非公命也非公命而行以左氏例推之不書於經矣然且書經者謂仲尼不惡陽虎可視以為公命乎其異於公子豫奈何城中城杜云公為晉侵鄭故懼而城之按傳無此說當時或自以他故築城又可必乎八年従祀先公左氏曰陽虎欲去三桓順祀先公而祈焉非也傳有常例非公命者不書於策若虎欲作亂而順祀祀雖禮非公命審矣何以得書邪且虎之謀三桓宜使三桓不知今明白而祈三桓聞矣虎何以能集其意邪意者虎實惡季氏季氏以臣而陵君猶僖公以子而先父矣不敢察察言故先正逆祀以微諭其意功成事立而後其指可見耳虎既敗走魯人又薄其行則謂虎之順祀祈作亂也其實不然何以知之曰祈則謀泄謀泄則事危虎必不為也九年齊侯衛侯次于五氏杜云不書伐者諱伐盟主以次告非也春秋亂世至於定哀之間又亂之尤也至於弑君而無恥何諱伐盟主之有得寳玉大弓左氏曰書曰得器用也凡獲器用曰得得用焉曰獲非也向曰竊者失之也今曰得者得之也失得相對言得所以見失也若器必言得郜大鼎何以云取乎器用不專言得亦明矣十年宋公之弟辰暨仲佗石彄出奔陳杜云稱弟示首惡也按隐元年之例段不弟故不言弟然則辰亦不弟者不稱弟可也反以見首惡稱弟何哉段不言弟反非首惡乎十三年晉趙鞅入于晉陽以叛傳云范氏中行氏伐趙氏之宫趙鞅奔晉陽然則鞅不叛也范中行逼之耳經何以得言其叛乎春秋之原情定罪固有如此邪晉趙鞅歸于晉杜云韓魏請之故曰歸言韓魏之强猶列國非也仲尼曰必也正名韓魏猶為大夫而列國視之則何正名矣大雅曰不畏强禦如韓魏以强而視列國是畏之也傳云荀躒言於晉侯曰君命大臣始禍者死今三臣始禍而獨逐鞅也刑已不鈞請皆逐之予謂尋傳前云董安于勸趙孟先為備孟不肯曰不欲始禍則始禍者非鞅也可言二臣始禍不可言三臣也此據三傳說之雖各不同然公羊似真十四年衛世子蒯聵出奔宋左氏敘蒯聵事曰蒯聵欲殺夫人夫人啼而走公執其手以登臺太子出奔宋予謂蒯聵雖不善謀安有此事哉且殺夫人蒯聵獨得全乎彼所羞者以夫人名惡也如殺其母為惡愈矣反不知可羞乎盖蒯聵聞野人之歌其心慙焉則以謂夫人夫人惡其斥己淫則啼而走言太子殺余以誣之靈公惑於南子所言必聽従故外則召宋朝内則逐公叔戌趙陽彼不恥召宋朝固亦不難逐蒯瞶矣此其真也不當如左氏所記又蒯瞶出乃奔宋宋南子家也蒯瞶負殺南子之名而走又入其家使真有其事者敢乎哉此亦一證也邾子來㑹公杜因上大蒐之文而解之曰㑹公于比蒲非也如杜之說謂大蒐則公在矣按昭十一年齊歸薨大蒐于比蒲叔向譏之曰君有大喪國不廢蒐不忌君也以叔向之言觀之大蒐之時魯君不在明矣桓四年公狩于郎隐五年公觀魚于棠漁獵之事出非其地皆明書公而大蒐不言公公不在故也不得言邾子來㑹于比蒲莊公遇齊侯于榖蕭叔朝公不言來者朝在外也杜已言此矣設公在比蒲而邾子㑹之其在外與榖等固當言㑹不當言來言來非在外辭也十五年定姒卒左氏云不稱夫人不赴且不祔也非也安有夫人卒而不稱夫人者乎凡夫人始卒則史書之書之固云夫人矣不待赴祔而書其夫人也此姒氏要為哀公之母定公之妾哀公未成君故亦未敢謂其母夫人耳葬定姒左氏云不稱小君不成喪也非也若姒氏實夫人者固當書夫人姒氏薨已而曰葬定姒不稱小君明不成喪以責臣子可也今曰姒氏卒此非夫人也非夫人而書葬定姒宜矣何足以見不成喪乎欲責不成喪而薨不稱夫人是適足貶小君之尊而不足見臣子之罪也哀公三年齊國夏衛石曼姑帥師圍戚杜云曼姑為子圍父知其不義故推齊使為兵首非也虞師晉師滅夏陽左氏以謂虞受賄有惡故使首之是春秋襃貶之辨也今何故茍従赴為不義者飾非乎四年晉人執戎蠻子赤歸于楚杜云晉恥為楚執諸侯故稱人以告若蠻子不道於民也晉茍不恥則已矣若猶有恥彼則諱而不告矣不然則雖告而匿其歸于楚矣豈當誣人以不道而自發揚其歸于楚之恥乎此事勢之不然且凡告執諸侯者必曰某侯為某罪既執之矣而春秋考其真偽而為之辭或稱侯或稱人此皆出於孔子也豈告者自稱某人執某侯哉如之何謂稱人以告也且天下雖亂不義者反取義者而執之此春秋所當辨也如苟取赴告而書之彼不義者何難誣人以惡矣十年吳救陳左氏曰延州來季子也推驗其年季子僅百嵗矣以彼其清髙不汚寧貪將亂國之兵者邪似異時事傳附著其說耳十一年公㑹吳伐齊按左氏例不與謀曰㑹此則不與謀也去年傳曰吳子使來儆師則是與謀矣文不當稱㑹然而稱㑹傳與例乖也傳曰冉求帥左師樊遲為右季孫曰湏也弱有子曰就用命焉按有子當為子有子有者冉求字也仲尼門人字多云子某者不得云有子也傳寫誤之矣大率左氏解經之蔽有三從赴告一也用舊史二也經闕文三也所以使白黑混淆不可考挍按史雖待赴告而錄然其文非赴告之辭也春秋雖據舊史而作然其義非舊史之文也簡牘雖有闕失其史非聖人所遺也如謂史之記從赴告而已則亂臣賊子何由而書如謂春秋用舊史而已則何貴於聖人之筆削也且春秋書良霄入于鄭鄭人殺良霄欒盈入于晉晉人殺欒盈其文同也至哀十四年非仲尼所修矣其記陳宗豎乃曰陳宗豎入于陳陳人殺之明史之所記與仲尼之所修異矣又仲尼所修無記内邑叛者哀十五年獨記成叛此亦史文不與仲尼相似仲尼不專用史文驗也如謂經之闕文皆聖人所遺者茍傳有所說而不與經同盡可歸過於經何賴於傳之解經哉故春秋者出於舊史者也而春秋非舊史之文也舊史者出於赴告者也而舊史非赴告之辭也傳者出於經者也而傳非經之本也今傳與經違是本末反矣安得哉明於此者可以無惑於春秋矣春秋權衡卷七
