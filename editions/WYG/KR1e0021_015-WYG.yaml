body:
  text: 春秋權衡卷十五宋劉敞撰八年甲午治兵榖梁曰治兵而陳蔡不至矣兵事以嚴終其意謂春秋多之非也軍出而治兵治兵自有常地矣今魯人先出兵而後治治又非其常地故春秋記其非常爾春秋非教戰之書貴其善陣不戰也師及齊師圍郕郕降于齊師榖梁曰不使齊師加威於郕故使若齊無武功而郕自降審如此春秋為縱失齊師之惡也其意雖欲貶齊存郕其實乃為齊文過了不可曉師還榖梁曰還者事未畢也遯也云欲避滅同姓之國示不卒事非也郕雖降齊國實未滅又榖梁曰向云不使齊加威於郕然則加威於郕者獨齊師耳魯故無罪豈可謂滅同姓哉齊無知弑其君諸兒榖梁曰大夫弑君以國氏者嫌也弑而代之也非也宋萬豈亦弑而代之者乎公子商人豈非弑而代之者乎九年齊人殺無知榖梁曰無知之挈失嫌也稱人以殺大夫殺有罪也非也無知弑君以代其位不可復氏公子又上齊人下有無知明無知者齊人之賊亦不煩再氏國爾非謂失嫌故挈之也無知又非大夫例解之似仍失指公及齊大夫盟于蔇榖梁曰大夫不名無君也非也齊雖無君大夫猶應有名假令書大夫之名便云齊有君乎及齊師戰于乾時我師敗績榖梁曰不諱敗惡内也非也古之人有能知之者矣齊人取子糾殺之榖梁曰言取病内也非也言取病齊耳内何病乎十年宋人遷宿榖梁曰遷亡辭也非也宿雖見遷國實未亡不得與滅人者同荆敗蔡師于辛以蔡侯獻舞歸榖梁曰蔡侯何以名絶之也何為絶之獲也非也秦獲晉侯何故不名又曰中國不言敗此其言敗何中國不言敗蔡侯其見獲乎亦非也但言敗蔡師何足以見其是獲乎設直言獲蔡侯何􅊣於義而諱獲為敗乎欲絶蔡侯自合言獲無為諱其獲以匿其惡書其名以發其獲進不成諱退不成絶徒為此紛紛也又曰以歸猶愈乎執也亦非也有執者有獲者有以歸者非一物也獲不輕於執執不重於以歸按文觀㫖亦可見矣十一年秋宋大水榖梁曰外災不書此何以書王者之後也非也把亦王者之後未嘗記其災何歟又曰髙下有水災曰大水亦非也丘山之顛亦有水乎王姬歸于齊榖梁説同公羊吾既言之矣十二年紀叔姬歸于酅榖梁曰國而曰歸此邑也言其歸何吾女也失國喜得其所故言歸焉爾非也紀季以酅入齊自為小國非邑也且邑何故不得言歸乎且酅者紀之别也紀者叔姬之家也人歸其家可不曰歸乎以謂喜得其所乃言歸何哉宋萬弑其君捷榖梁曰卑者以國氏是也非弑而氏之明矣十三年齊人宋人陳人蔡人邾人㑹于北杏榖梁曰是齊侯宋公也非也經無異文例無所推安知是齊侯宋公乎公會齊侯盟于柯榖梁曰曹劌之盟也尋其意與公羊相似吾既言之矣十四年單伯㑹伐宋榖梁曰㑹事之成也尋其説與公羊相似吾既言之矣荆入蔡榖梁曰荆者楚也其曰荆何也州舉之也州不如國國不如名名不如字按榖梁十年傳云其曰荆者狄之也今又云州舉之也若實狄之則非州舉之若實州舉之則非狄之而兩説並存不知果為狄之邪其亦州舉之邪若曰州舉之所以為狄之者凡在夷狄尚不州舉之況楚非真夷狄乎尋究二説似前説本出榖梁後説則掇取公羊之例而續焉者也不然無為相異十六年同盟于幽榖梁曰同尊周也非也但云同盟不足以效其同尊周十有七年齊人執鄭詹榖梁曰人者衆辭也以人執與之辭也非也宋人執鄭祭仲邾人執鄫子亦可謂與之乎又曰鄭詹鄭之卑者卑者不志此其志何也以其逃來志之也亦非也紀履繻鄭宛之類亦同氏國豈卑者則不志乎且若所言卑者不志而鄭詹以逃來故得志也諸侯之國逋逃之臣不可勝紀何不盡書乎假令鄭詹就執於齊不逃來魯者春秋遂不書齊人執鄭詹乎然則書齊人執鄭詹不為鄭詹甚佞而書亦不為與齊人執之而書為詹逃來書耳如此又安取書甚佞及與齊執之之義哉齊人殱于遂榖梁曰何以不言遂人盡齊人也無遂之辭也非也春秋本責齊滅人之國而又戍之以自取死亡故令其文如齊人自死於遂耳不謂以無遂故不言遂人盡齊人也又曰無遂則其言遂何其猶存遂也亦非也齊人實死於遂自當記其死所遂國雖滅遂地猶存理合必書豈强存遂乎若春秋不存遂者可云齊人殱于齊乎又曰此謂狎敵也亦非也滅人之國使兵戍之齊則無道矣令齊不滅人國不戍人地者安取此禍乎今榖梁譏其狎敵似惡齊人滅遂未盡戍遂未密不顧遂不可滅地不可戍也十八年日有食之榖梁曰不言朔夜食也非也春秋闕疑據見而録何以知其夜食而書乎何休難之得矣鄭𤣥強為文過不亦誣人哉假令日始出其虧傷之處未復者是即朔日食矣如不見其虧傷云夜食可也見其虧傷是驗其食非朔日食何也又曰一日一夜合為一日此適足以證其當為朔日食耳榖梁又云何以知其夜食曰王者朝日諸侯朝朔尋榖梁此意似云王者日日朝日故日之始出而有食者得見之也按禮記天子朝日於東門之外聽朔於南門之外南門之外者謂明堂位也然則天子每朔先朝日而後聽朔諸侯每月先視朔而後朝廟乎古禮既已散亡今之説者不同未足怪也雖然如榖梁之言以述朝日則是以解夜食則非公追戎于濟西榖梁曰其不言戎之伐我何也以公之追之不使戎邇於我也非也戎若不來公則無追今以戎來故得追之先言戎伐後言追戎何􅊣於義而必欲隱其一端之實事虚說不使戎邇於我之末節如此反為戎未嘗伐我公自妄追之也若不言戎之伐我欲以明不使戎邇於我者則春秋所書伐我是皆使其邇於我乎又曰于濟西者大之也亦非也既不言戎之來又不言濟西則當但云公追戎矣未知追之於何所邪然則此理所必書何大之之有十九年公子結媵陳人之婦于鄄遂及齊侯宋公盟榖梁曰媵淺事也不志此其志何也辟要盟也非也魯誠欲自託於大國者豈敢以媵婦之名而遣使者以取戾於霸主哉使者銜媵婦之命而遂要大國之盟是乃要盟矣何謂辟要盟乎假令魯以專使參盟於大國雖不得盟而無怒今乃飾卑者之任而干大國之重魯何倒行逆施而為此哉且魯乃欲辟要盟故使者以媵婦徃不以要盟徃也其意欲持兩端若得盟則固曰吾來盟也不得盟則將曰吾非盟之求而婦是媵爾今結既得盟而春秋猶記其媵陳人之婦何哉且魯之為此謀者欲以誑齊宋乎則亦必誠有陳人之婦者乃可施其謀矣無陳人之婦則不成為媵而傳又言以輕事遂乎國重無說乃似虚為此名爾非實有陳人之婦也推其意無一可曉者豈誠魯人之事哉豈誠魯人之事哉二十二年肆大眚榖梁曰為嫌天子之𦵏也非也若魯欲葬文姜而自為此者子固無赦母之道若仲尼嫌文姜之𦵏而書此以示義者則春秋之文無從而生若赦出於天子者何必縁文姜之𦵏哉且文姜之存猶莫之討也今死矣反待天子而𦵏乎此皆不然者陳人殺其公子禦寇榖梁曰言公子而不言大夫公子未命為大夫也其曰公子何也公子之重視大夫命以執公子然則榖梁謂凡公子未命為大夫皆得稱公子矣非也公子雖親然天下無生而貴者是以命為大夫則名氏得兩通未命為大夫則得稱名不得稱公子觀小白去疾亦可以見之矣二十三年荆人來聘榖梁曰其曰人何也舉道不待再非也此乃使臣得言荆人爾即欲進之使稱人者何不變荆云楚而反冠人以荆乎荆為狄之人為進之且進且狄乎賞罰亂此吾所不曉也二十四年大夫宗婦覿用幣榖梁曰禮大夫不見夫人非也君祭於廟大夫夫人俱在其中可得勿見乎然則不見者殆謂不常見爾今夫人始至而大夫見之是禮然矣何謂非禮乎赤歸于曹郭公榖梁曰赤者郭公之名然則春秋何苦不曰郭公赤歸于曹乎言郭公赤足以見其為國君言歸足以見其外歸而顛倒迷錯如此何哉梁亡鄭棄其師紀侯大去其國雖指意卓佹然文義自明未有改易首尾如此者也盖有不知而作之者豈謂是邪二十五年陳侯使女叔來聘榖梁曰其不名何也天子之命大夫也非也天子大夫可不名耳若天子命之為此國大夫者可得不名乎吾於公羊既言之矣伯姬歸于把榖梁曰其不言逆何也逆之道微無足道焉爾非也春秋常事不書故不言把伯之來爾二十四年公如齊逆女榖梁曰逆女恒事也不志然則榖梁既以知逆女之不志而猶云云似目見豪毛而不見其睫也二十六年曹殺其大夫榖梁曰大夫而不稱名姓無命大夫也非也天子建國諸侯立家雖尊卑不同而豈無命哉諸侯大國三卿皆命於天子次國三卿二卿命於天子小國三卿一卿命於天子大國之卿三命次國之卿再命小國之卿一命其於王朝皆士也三命以名氏通再命名之一命略稱人周衰禮廢強弱相併卿大夫之制雖不能盡如古見於經者亦皆當時之實録也故隱桓之間其去西周未久制度頗有存者是以魯有無駭柔俠鄭有宛詹秦楚多稱人至其晚節無不名氏通矣而邾莒滕薛之等曰已益削轉從小國之例稱人而已說者不知其故因謂曹秦以下悉無大夫患其時有見者害其臆說因復造架無端以飾其偽然此不足怪也彼固不知王者諸侯之制度班爵云爾其又足辨乎二十七年公子友如陳𦵏原仲榖梁曰諱出奔也非也吾於公羊既言之矣莒慶來逆叔姬榖梁曰不正其接内故不與夫婦之稱也非也春秋刺諸侯之不親迎而使臣者則奪其使文奪其使文矣故莒慶之來不得復曰逆女亂於逆君夫人者也然則書叔姬自其理然豈惡其接内哉凡大夫而越境逆女此誠春秋所貶者然而以謂書叔姬者不與夫婦之稱不亦繆乎不亦繆乎二十八年衛人及齊人戰衛人敗績榖梁曰戰則是師也其曰人何也微之也非也凡道春秋通例皆曰將卑師少稱人何忽至於此而以謂微之乎又曰其人衛何也以其人齊不可不人衛也亦非也齊有罪則微齊衛有罪則微衛則可謂明矣今欲微齊因遂微衛齊則有罪矣衛則不知也而曰不可不人衛所謂不可者安在哉又曰衛小齊大其以衛及之何也以其微之可以言及也亦非也衛欲戰則衛及齊齊欲戰則齊及衛春秋惡戰故常分别禍之所從起耳不為國大小也又曰其稱人以敗何也不以師敗於人也亦非也設令齊將尊師衆而敗衛將卑師少而勝豈得不書師敗於人哉春秋之義王道也春秋之事史記也聖人豈必私以已意増損舊史而後見其道哉築微榖梁曰山林藪澤之利所以與民共也虞之非正也非也此自築邑爾非園囿也以園囿解之惑矣大無麥禾榖梁曰大者有顧之辭也於無禾及無麥也非也於是經無水旱之變安得忽無麥禾哉說者或云實秋水傷稼諱之不言或云土不稼穡二物不成或云不勸農事故無災而饑皆失也若有秋水何故不書茍民食不足國家且危而顧避恥諱忘遇災而懼之意豈春秋之訓哉若土不稼穡不勸農事者魯應猶有倉廪之舊不應遂至告糴於鄰國也又春秋當書麥禾大無不當反書大無麥禾也且麥禾之相去逺矣方其無麥則固書麥大無方其無禾則固書禾大無何乃待無禾然後書無麥哉近上七年秋大水無麥苖知水傷之也麥强而苖弱二者俱無非待苖乃書麥也或謂一災不書是又不然隕霜殺菽菽一物也何以獨書乎推驗事實由魯不務蓄積日損月削以至於麥禾大盡而後覺之非今歳之事也是以不言水旱亦不言饑明是歳實無水旱民實不饑或曰如此當曰麥米不當曰麥禾吾曰古者無道禾非米者聘禮有禾有米不云禾非米也古之行禮用禾者多然則魯實無禾不足以待國用非無米也二十九年城諸及防榖梁曰以大及小也非也若言諸防則似一城故從所先城記爾三十年齊人降鄣榖梁曰鄣者紀之遺邑非也何以必知其紀之遺邑乎公及齊侯遇于魯濟榖梁曰及者内為志焉爾遇者志相得也非也設若外為志又志相得者便云公會齊侯遇于魯濟乎齊人伐山戎榖梁曰其曰人何也愛齊侯乎山戎也又曰則非之乎善之也非也春秋以人貶之云爾豈曰以人愛之云爾貶則人之愛則人之誰且能識其善惡哉三十一年齊侯來獻戎捷榖梁曰内齊侯也不言使内與同不言使也非也去年齊人伐山戎榖梁所以知其當為齊侯者正以今年來獻捷者乃齊侯故也然則齊侯已伐山戎又來獻捷爾何以見其是使人乎魯雖欲内齊豈可便不殊齊侯之使假令稱齊侯使人來獻捷文何以異於齊侯來獻捷也若都不稱齊又不言來則信可謂内與同矣今既稱齊又曰來獻齊非吾國也來非不外也雖匿其使名猶是齊來獻捷也安見内乎又曰軍得曰捷戎菽也按菽者豆耳齊侯伐山戎乃取其豆與諸侯不近事理疑菽者北狄字也榖梁解此戎者即北狄也北字類卄狄字類菽傳寫訛謬又并為一字不然無為如此妄解三十二年宋公齊侯遇于梁丘榖梁曰大齊桓也非也諸侯相遇常事耳何大之有子般卒榖梁曰日卒正也不日故也有所見則日非也若有所見又不日者豈不益明乎何若日之與正卒相亂哉用此觀之非聖人之意明矣公子慶父如齊榖梁曰奔也其曰如何也諱莫如深深則隱茍有所見莫如深也非也閔公不書即位足以起子般之弑爾不足以見慶父之賊也春秋記諸侯大夫之奔甚多不必皆弑君也書慶父奔亦何不可哉且慶父親弑其君此魯國人人之讎奈何反掩匿蔽覆不明白其奔使弑君之賊不見乎又文十八年十月子赤卒其下則季孫行父如齊子赤卒不日亦有所見也若以慶父之例推之則行父亦弑子赤者邪何謂書如齊閔公元年齊仲孫來榖梁曰外之也䟽之也非也吾於公羊既言之矣二年公薨榖梁曰不書𦵏不以討母𦵏子也非也所謂君弑賊不討不書𦵏者言比其𦵏時而賊未討則不書𦵏也既𦵏而後乃討賊賊雖已討𦵏猶不追書也此閔公是已討賊雖遲而𦵏在討賊之後則𦵏得書此陳靈公是已不以討母𦵏子何足為義乎又所謂君弑賊不討不書𦵏者公榖有其說而不盡何也凡君弑賊不討不敢𦵏父弑讎不復不敢𦵏不敢𦵏則亦不敢除其服是故寢苫枕戈志必復而後已此賊不討不書𦵏之義也此所以春秋有其賊未討雖久弗𦵏而弗非也慶父出奔莒榖梁曰其言出絶之也非也内大夫之奔亦自多言出不必慶父爾齊髙子來盟榖梁曰不言使不以齊侯使髙子也非也齊桓前不討慶父者獄有所歸魯又立君不得討也今慶父復弑閔公自知罪大而出齊桓能遣其賢臣鎮撫魯國之社稷功已厚矣為之者髙子謀之者桓公也今欲襃人臣而不及人君欲過尊有功之臣使不繫於其君豈春秋之意邪儻陳力建功人臣而獨專其美則九牧之君何望焉堯任伯鯀治水而水害益甚誅鯀命禹烝民乃乂不聞仲尼卑堯徳於禹髙禹功於堯而以為不以帝堯使伯禹也何況齊桓而反深責乎可謂闇於大體矣僖公元年齊師宋師曹師次于聶北救邢榖梁曰救不言次言次非救也非救而曰救何也遂齊侯之意也非也此若當貶則春秋方貶之又何遂其意乎此若當襃則次非救者乃非所襃亦不可遂其意也吾欲問襃貶之意決何若哉又曰何用知其是齊侯曰曹無師曹師者曹伯也其不言曹伯以其不言齊侯不可言曹伯也亦非也曰次于聶北救邢者其次桓公之意已見矣何至又更齊侯曰齊師哉即實齊師又何以明哉且齊侯自以過貶稱師爾曹伯非有過也何乃亦貶從師乎且直言齊師曹伯者有何不可乎且曹何以無師先王之制大國三軍其次二軍小國一軍軍即師也曹又次國不冝獨無師又曰以其不足乎揚不言齊侯也亦非也如榖梁之意冝曰以其貶之不言齊侯乃可爾如不足乎揚未可便貶也言齊侯適中矣然則榖梁於此都失襃貶之所在齊師宋師曹師城邢榖梁曰是向之師也使之如改事然美齊侯之功也非也審如榖梁言者齊侯乃足揚矣猶曰齊師何邪且使之如改事何故見其美即不改事反不美乎獲莒拏榖梁曰惡公子之紿非也古之人有知之者矣夫人氏之喪至自齊榖梁曰其不言姜以其殺二子貶之也非也向者孫于邾何以不去姜乎又曰或曰為齊桓公諱殺同姓也亦非也夫人挾小君之尊而殺二子魯人終不敢討也桓公為伯主疾禍亂之所生豈得顧同姓哉此非春秋所恥也非春秋所恥則亦非春秋所諱矣二年城楚丘榖梁曰國而曰城此邑也其曰城何也非也邑亦謂之城爾若不謂之城當謂之何哉又曰其不言城衛何也衛未遷也非也定之方中之詩曰文公徙居楚丘始建城市而營宫室其辭曰定之方中作於楚宫揆之以日作於楚室又曰升彼虚矣以望楚矣望楚與堂景山與京降觀于桑卜云其吉終焉允臧由此以言文公先徙居而後建城市不得云衛未遷也又曰其不言衛之遷焉何也不與齊侯專封也非也不言衛之遷者魯史所無爾非仲尼擇焉而不存者也凡事有當記而經不見者可勝説邪獨舉此而言似榖梁亦以春秋為據百二十國寳書而作者虞師晉師滅夏陽榖梁曰虞無師其曰師何也以其先晉不可以不言師也非也假令書虞人晉師者豈不益見其罪乎春秋之例主兵者序上盖惡用兵也豈曰以國大小為序乎若誠以國大小為序者如榖梁説可矣如不以國大小為序又何必妄解哉齊侯宋公江人黄人盟于貫榖梁曰不期而至者江人黄人也非也誠有此美者春秋之文何能勿襃之又曰逺國稱江黄為諸侯皆來至也亦非也周之諸侯千八百餘其後稍稍相并猶應千餘若貫之㑹皆來至則江黄之外尚有逺國不獨江黄而已不當舉江黄為最逺吾於公羊既言之矣春秋權衡卷十五
