body:
  text: 春秋權衡卷三宋劉敞撰莊公元年正月左氏曰不稱即位文姜出故也非也此年三月文姜始遜於齊此時未出何故不即位原傳此意當為文姜與桓俱行未有至文故云出耳不知夫人行不以正者至皆不書也且文姜弑君自絶於魯莊公何故不忍即位乎莊公不忍即位文姜感之而還則莊公已忘文姜弑其父矣何以文姜又遜於齊乎實說桓公薨于齊禍起於文姜而成於齊侯而死於彭生魯人知彭生之殺公而不知齊侯之怒公故於赴齊日請以彭生除之齊人殺彭生魯人則以謂怨已報矣乆之事泄乃始責讓文姜文姜用是遜于齊也若桓公之喪獨歸文姜不隨則魯人固以知文姜之殺其君何有獨請於齊誅彭生而已又何能遷延明年三月乃始責文姜而出之夫人孫于齊左氏曰不稱姜氏絶不為親禮也杜氏云姜氏齊姓於文姜之義冝與齊絶而復奔齊故於其奔去姜氏以示義非也尋左氏之意似云魯絶文姜不以為親乃中禮尋杜氏之意則云文姜絶齊不以為親乃中禮杜氏非也夫文姜親弑其君今事覺出走假令不奔齊猶不足以自贖春秋豈為此示法哉今復有一文姜通其兄弟謀殺其夫而出奔異國者寧可為禮邪宋襄之母獲罪於君歸其父母之國及襄即位欲一見之而義不可得作河廣之詩以自悲然宋襄亦不迎而致也為嘗獲罪於先君不可以私廢命也孔子論其詩而著之以為宋姬不為不慈襄公不為不孝況文姜之罪大絶不為親何嫌於義哉單伯送王姬杜氏云命魯為主故單伯不稱使也非也若命魯為主單伯稱使以見王命之來乃冝矣不稱使非義也又十四年經單伯㑹齊侯宋公衛侯鄭伯于鄄稱單伯㑹諸侯單伯則為魯人明也猶曰叔孫豹㑹晉趙武楚屈建矣若單伯為大夫則應書單伯齊侯㑹干鄄不得屬㑹於單伯也屬㑹於單伯單伯非周人審矣築王姬之館于外左氏云為外禮也非也為讎主㛰而不知辭乃以築外自誣曰我庶幾得禮哉是何足以言禮也按公羊以為主王㛰者必改築則館為王姬之舍矣而據杜氏之說則館為親迎之所二者雖所見不同竊以謂如公羊之說是何者路寢則不可小寢則嫌羣公子之舍則已卑其道必為之改築此理之必然者王使榮叔來錫桓公命杜云襃稱其徳也非也若實然者王何以去天乎王姬歸于齊杜云不書逆公不與接非也若不與接則向者何得云慮其親迎築館於外乎築館於外夲慮其親迎故避廟中相接耳非都不與接也如實都不與接則慮其親迎築館於外之說為虚如慮其親迎築館於外之說為實則公不與接之說為謬三年溺㑹齊侯伐衛左氏云疾之也杜云疾其專命非也若專命者固應如公子豫之例不書于經矣公子豫何以都不書溺何以書名而去氏賞罰不可知誰能通之哉柔㑹宋公非專命也俠卒非專命也又何以不氏邪如夲自當不氏何以獨謂溺專命邪四年紀侯大去其國杜氏曰以國與季季奉社稷故不言滅非也紀國未滅紀侯去之勢不得言滅非為季也又曰不見迫逐故不言奔亦非也若不見迫逐何故去乎所以去者正為齊所迫耳又曰大去者不返之辭亦非也大去即奔耳義有所詭故曰大去非大去之外别有奔也齊侯葬紀伯姬杜云齊侯加禮初附以崇厚義故攝伯姬之喪以紀國夫人禮葬之如杜此說謂春秋襃齊得禮也非也逐人之君葬其夫人此正春秋所貶者何謂以崇厚義固若此乎凡葬者臣子之事也稱齊侯葬伯姬其貶已見矣五年郳犁來來朝左氏曰名未王命也若然則未王命者當名何以儀父不名乎若曰儀父與公盟繼好息民故字以貴之則來朝者豈不欲繼好息民乎獨不貴之何哉豈謂朝者不如盟者乎且禮諸侯有朝禮無盟禮則朝冝受襃過於盟今反不及盟乎六年衛侯朔入于衛杜云朔為諸侯所納不稱歸者朔懼失衆心以國逆告也非也當是時公親納朔朔之入國公所親也假令衛不來告史猶自書之也何待衛告哉且衛人惡朔而諸侯强納之其赴於諸侯固當從諸侯納之之例以歸為文明此諸侯之力也何敢忘諸侯之力而以國逆誣諸侯哉且令朔懼失衆心故改歸為入者徒足以罔諸侯耳何足以結衆心乎衆心之得失不在於改歸為入也設令以入赴諸侯而能使衆心安之猶有可誘今雖以入赴諸侯實無預於得衆心也衛又何為忘諸侯納己之惠改歸為入乎用此言之歸不主於諸侯入不主於國逆故使其說錯亂而不可訓曉者也傳曰君子以二公子之立黔牟為不度非也王人子突救衛春秋貴之則是黔牟王所欲立也篡王所立朔則有罪今朔不見貶而黔牟顧先䝉惡豈春秋意哉又朔比衎黔牟比剽兩兩相似而左氏君剽而退黔牟存朔而絶衎賞罰無章莫此甚焉七年星隕如雨左氏曰與雨偕也非也吾於榖梁既言之矣無麥苖左氏曰不害嘉榖也非也大水無麥苗此聖人為記災而書耳言其不害嘉穀何益於敎乎且隐元年例曰凡物不為災不書今不害嘉榖是水不為災也水不為災不應書大水也大水矣無苗麥矣而猶謂不害嘉榖罔也八年師次于郎以俟陳人蔡人甲午治兵左氏曰治兵于廟禮也非也凡出曰治兵入曰振旅是以秋治兵春振旅今魯以春治兵治兵非其時何以為禮乎且若中禮是則常事爾亦何足書乎又言於廟夫廟中嚴矣非治兵之地也若師之出先謀於廟是則可爾於是焉習號令鐘皷丁寧旌旗不乃太瀆乎又郎者魯邑師次于邑則其無廟明是為己次于郎又復入城治兵于廟者乎九年公及齊大夫盟于蔇左氏曰齊無君也杜氏曰大夫非一故不稱名非也大夫雖衆固應名其貴者一人而已經曰及諸侯晉大夫盟豈晉國大夫皆在邪齊小白入于齊八月及齊師戰于乾時我師敗績杜云小白既定公猶不退師厯時而戰戰遂大敗未必然也夏伐齊納糾八月復戰耳何必一事乎又曰不言公敗諱之亦非也春秋記内戰惟此不諱敗當言不諱敗之由不當言諱敗也齊人取子糾殺之杜云公子為賊亂則書非也子糾豈賊亂者乎又曰書齊取殺者時史惡齊志在譎以求管仲亦非也此乃仲尼之意時史豈暇為之哉十年公敗齊師于長勺左氏曰戰于長勺曹劌請見云云杜氏曰齊人雖成列魯以權譎稽之列成而不得用故以未陳為文非也傳本說皆陳曰戰未陳曰敗之例者見正不正也此既皆陳矣是正也雖復鼓之有先後亦何謂之以權譎稽之列成而不得用乎要是傳所據者當時雜記妄出曹劌及戰事耳不足以為據齊師宋師次于郎杜氏曰不言侵伐齊為兵主背蔇之盟義與長勺同長勺之傳曰齊師伐我杜氏曰不書侵伐齊背蔇之盟我有辭皆非也凡諸侯為盟不曰繼好息民乎今春盟于蔇夏公伐齊秋與戰其背盟多矣且蔇之盟齊大夫之盟也長勺之師齊桓之師也公與齊桓怨讎已深責齊背盟非事之理也且謂我有辭則不書侵伐乎我無辭冝書侵伐矣十一年公敗宋師于鄑魯有何辭而不書宋侵伐邪僖元年公敗邾師于偃傳曰虚丘之戍将歸者也将歸之戍非所得罪於魯魯無故背檉之盟要而敗之然亦無侵伐之文安知長勺之敗非偃之敗也長勺之敗不書侵伐謂有辭可也偃之敗不書侵伐謂之有辭可乎今吾試謂長勺真偃也偃真長勺也有以辨之乎苟無以辨何得謂我有辭則不書侵伐乎荆敗楚師于莘杜氏曰楚始通上國告命之辭猶未合典禮故不稱將帥非也楚來告命苟不言將帥當如何為告命之辭乎無告命則己若有告命勢不能無言將帥也十一年王姬歸于齊杜氏曰不書齊侯逆不見公非也魯為王主㛰若齊侯來逆女而公輒不見何謂主㛰矣乃常事自不書者也十二年宋萬弑其君捷及其大夫仇牧杜氏云仇牧書名無善可襃非也吾於孔父既言之矣十四年單伯㑹齊侯宋公衛侯鄭伯于鄄杜氏曰齊卒平宋亂宋人服從欲歸功天子故赴以單伯㑹諸侯為文非也本單伯者魯之孤也左氏見周有單子遂誤以單伯亦為周大夫凡王人出㑹諸侯無不序公侯之上者宰周公劉子之類是也既序公侯之上則是主㑹之人矣何必赴以單伯㑹諸侯乃成主㑹乎彼見春秋記外之盟㑹無分别主㑹之人者唯魯公及大夫㑹之則分别焉左氏既誤以單伯為周大夫杜氏因為之飾說欲證單伯使必為周人而委曲求合非觧經之體也十五年春齊侯宋公陳侯衞侯鄭伯㑹于鄄左氏曰齊始霸也非也凡霸者則當主諸侯諸侯莫先焉此年秋伐郳宋序齊上明年夏伐鄭宋亦序齊上齊之未主諸侯明矣然則齊始霸在十六年十二月九國同盟于幽之時也自此始為諸侯主矣十六年同盟于幽杜氏云言同者服異也按春秋書同盟者凡十餘或服異或未嘗服異大約相半若一以服異觧之則不可通者多清丘斷道之類是矣此吾所不曉也十七年齊人執鄭詹杜云不稱行人詹有罪也非也凡使而被執稱行人可也非使人而被執不可稱行人也稱行人欲以明使與非使非以正有罪與無罪也鄭詹之不稱行人猶蔡仲之不稱行人也不得以行人為觧十八年公追戎于濟西左氏曰不言其來諱之也非也杜云戎來侵魯魯人不知去乃知之非也戎來侵魯必有兵衆魯何由不知其來不見其來乎若戎能傅羽翼不踐地忽然從空而下魯可不知耳若但旅進旅退魯無縁不知也凡事有害於義有恥於國諱之可也戎狄無義以侵伐為常魯安得恥之而安得諱之郎之戰不言侵伐以為我有辭也今此不言侵伐又以為諱之也若實我有辭乎實諱之乎戰與追之一也不言其伐而言戰與不言其侵而言追何以異而相反若此哉十九年公子結媵陳人之婦于鄄遂及齊侯宋公盟杜云大夫出境有可以安社稷利國家者則專之可也結在鄄聞齊宋有㑹權事之冝去其本職遂與二君為盟故備書之本非魯公意而又失媵陳之好故冬各來伐然則杜氏謂結所行是乎非乎以為是不得云本非魯公意而失媵陳之好也以為非不得云大夫出境有可以安社稷利國家者專之可也且齊宋有㑹結權事之宜而與二君盟何事之權也安社稷利國家專之為可令結與二君盟而三國來伐是社稷不安國家不利而結去其本職是專命矣翬溺專命春秋貶去其族結亦專命今何故不貶其族也然則杜氏欲言結之行事而不得其義者也是非不決難以敎後世矣二十二年陳人殺其公子禦宼左氏曰殺其太子杜云陳人惡其殺太子之名故不稱君父以國討公子告皆非也陳若惡之自不以告諸侯矣且茍殺其太子而赴以公子則仲尼安得不改而正之此豈非敎之所存文之所害而可示勸戒者邪其即用舊史何哉及齊髙傒盟于防杜氏曰髙傒齊之貴卿而與魯微者盟齊桓謙接諸侯以崇霸業非也齊桓雖欲謙下諸侯寧將謂魯人曰吾請以貴大夫從子微者盟乎此理之不然者則實公盟也所謂卿不可㑹公侯故没公爾齊桓必不故遣其貴大夫從魯微者盟亦不請魯遣㣲者與其貴大夫盟以邀謙巽之名也二十三年祭叔來聘杜云祭叔為祭公來聘非也此乃祭叔使人來聘耳祭叔無臣故不得言使人也若曰祭叔為祭公來聘雖不言使而叔稱己尊非祭公所冝也荆人來聘杜云不書荆子使某來聘者楚始通未成禮非也若楚禮不備妨於聘爾稱荆子使某人者此魯國史氏所當書也彼來使者豈其自稱荆子使某人乎蕭叔朝公杜云叔者蕭君名非也邾蕭同是附庸邾與魯盟得襃稱字蕭來朝公猶不免名何哉且叔之為字可不疑矣專以名觧不亦泥乎凡春秋襃貶自有輕重聖人所以敎後世賞罰也若盟而䝉加等之賞朝而無勞來之意則賞罰已亂於春秋何能敎人二十四年公如齊逆女杜氏云禮也非也若其當禮則常事爾法當不書書之是非常者也丁丑夫人姜氏入杜氏云丁丑入而明日乃朝廟非也即朝廟何以不書至自齊乎文姜初歸書至自齊此朝廟之文也哀姜歸寧而復書至自齊亦致廟之文也凡公行而書至皆告廟者也無有言入言入非告於廟之意矣二十五年陳侯使女叔來聘左氏云嘉之故不名非也諸侯相聘常事耳亦何可嘉而不名乎蓋疑書女叔有若字者因為此說爾若使諸侯其卿大夫來聘輒受一襃春秋之中來聘魯者不可勝紀則何不一一襃也日有食之鼓用牲于社左氏曰非常也唯正月之朔慝未作於是用幣於社伐鼓于朝非也夏書記日食之變季秋月朔亦有伐鼓之事豈必正陽之月哉儻夏禮與周不同乎然日有食之變之大者人君當恐懼修省以荅天意豈但非正陽之月則安而視之哉左氏之說繆矣春秋所以書者蓋譏其不鼓于廟朝而鼓于社又用牲耳二十七年公子友如陳葬原仲左氏曰非禮也原仲季友之舊也杜云季友違禮㑹外大夫葬故具見其事皆非也季友則莊公母弟度其年不能三十餘未嘗去魯何故得與陳國大夫有舊也且季友違禮逾國以葬其故人事非公命應如公子豫不書于策不然則如叔孫豹翬溺之類貶去其族今一無所貶何也且文稱公子友如陳此常使文也季友為受命而行非自行也何以得貶之二十八年衛人及齊人戰杜氏云實齊侯稱人者以賤者告不地者史失之皆非也稱人則謂之從赴不地則謂之史失之如此無復有春秋矣何貴於仲尼之為春秋也天王狩于河陽獨非晉諱召王以王狩告乎故春秋之作正襃貶是非而已襃貶是非之不能正而以謂之從赴亦不足已築郿左氏曰邑曰築都曰城非也築者作邑耳詩曰築室百堵百堵皆興鼛鼓弗勝不謂城邑也邑之與都相較無幾欲差邑與都而殊築城之名則國亦當殊京師又當殊而自都以上通以城名之何邪大無麥禾左氏曰饑杜云書于冬者計食不足而後書也則未知魯何故饑邪水當曰水旱當曰旱蟲當曰螽數者不作無縁忽饑無饑而言大無麥禾此何故也以謂計食不足而後書之然則當云少麥禾不得云大無也夫不足者未盡之稱大無者已盡之稱仲尼豈於此錯亂之哉二十九年春新延廐左氏云不時也非也廐有壊爛及民之閑暇新之是也何害于出入馬乎杜云欲馬未入前修之如此固當在夏末秋初百姓未去田畝時也又當勞民妨其農時反謂之冝哉紀叔􅁎卒杜氏曰紀國雖滅叔􅁎執節守義故繫之紀賢而録之非也叔􅁎魯女死當有服禮冝録之不以賢也又諸侯雖失國謂之寓公寓公自繫其國而稱之此紀叔􅁎則寓公之妻繫紀常事耳又何見其執節守義乎三十二年子般卒杜云先君未葬故不稱爵非也未逾年則不成君不成君則不稱爵茍逾年矣先君雖未葬固當君之苟未逾年先君雖已葬猶非君也君則爵之非君則不爵之所謂一年不二君也然則以年為限不以先君葬為限公子慶父如齊杜云慶父殺子般懼而適齊欲以求援時無君假赴告之禮而行非也傳云成季奔陳立閔公然則立閔公者必慶父也慶父雖殺子般未敢便取其國利閔公之幼而立焉其如齊者真告立君也又何假矣若慶父自見無君假赴告而出欲以求援春秋當微著其罪不當徇賊子之志書如齊也又魯既無君慶父託事而出非公命審矣以左氏例考之非公命應不書書之應去其族不得一無所貶也閔公元年春王正月左氏曰不書即位亂也杜云國亂不得成禮皆非也去年十月子般卒子般卒則閔公立至今已三月亂亦定矣言亂不得成禮非也且必若云何以能朝廟乎朝廟豈非即位乎季子來歸杜氏曰齊侯許納故曰歸非也向者公及齊侯盟于落姑請復季子齊侯許之然則本復季子者公也季子前有位于國以左氏例考之應曰復歸不應曰歸也若以齊侯許納故得言歸向使魯獨召季子不因齊侯者用左氏例當云季子來入乎入不可施於季子來歸亦不縁齊侯也以此知左氏之例未可用也齊仲孫來杜氏云齊大夫以事出疆因來省難非齊侯命故不稱使非也若仲孫無君命而來是私行也春秋豈冝賢之大夫而謀諸侯禮乎若以不稱齊侯使即自來者楚屈完豈亦因事私行者乎杜氏又謂仲孫者湫之字湫者仲孫之名不審湫者何氏乎春秋書人之字則不繫其氏乎邾儀父也原仲也蕭叔也蔡季也何以皆氏也二年吉禘于莊公杜云時莊公别立廟非也此直就莊公主耳即别立廟無縁不書公薨杜氏曰實弑書薨又不地者皆史策諱之然則杜意以謂史當諱國惡矣諸稱公薨者皆時史之文仲尼因之也非也古者史不諱國惡惡有不記者其罪死以直為職者也女史典彤管之法記宫中之事事有不記者其罪亦死明史之任一也董狐書趙盾弑君以示於朝仲尼謂之良史以其書法不隐若史本當諱國惡者董狐不應明趙盾之罪以示朝衆也董狐明趙盾之罪以示朝衆而仲尼謂之良史是史不諱國惡也崔杼弑其君太史書之以示於朝崔子殺之其弟又書書而死者三人然後舍之若史本當諱國惡者齊太史為繆妄輕死干禮之人也崔杼殺之是矣然為左氏者皆以齊太史非謬妄輕死干禮之人守職之士也崔杼殺之虐也以崔杼殺齊太史為虐齊太史又非謬妄輕死干禮之人是史不當諱國惡也齊晉皆大國史官皆良士見稱于聖賢以不諱國惡為是知魯之史亦不諱國惡也魯之史不諱國惡則所諱由仲尼新意非史策舊文也諱之史䇿舊文仲尼因之非也寗殖將死謂其子曰吾得罪於君名藏在諸侯之䇿曰孫林父寗殖出其君夫寗殖所謂諸侯之䇿則諸侯之史也諸侯則齊魯是矣史則春秋是矣今驗春秋絶不言孫寗出君而云衛侯出奔者仲尼改之也復可謂史䇿諱之乎然則魯史實書公弑仲尼改云薨魯史實書孫寗出君仲尼改云衛侯出奔矣魯史一官之守而春秋之法聖人之志此其所以不同也謂諱國惡為史官之事是謂董狐非良史也古者非正直之臣亦不為史公子鰌邦有道如矢邦無道如矢衛人命為史焉史之以直為職又可知矣夫人姜氏孫于邾杜氏曰哀姜外淫故孫稱姜氏非也文姜殺其夫哀姜殺其子罪有輕重故文不得一不為分别其内淫與外淫也婦人内夫家而外父母以文姜為内淫哀姜為外淫是亂内外之實矣昭公娶于呉諱同姓謂之孟子匿其氏也以文姜淫其兄則不稱姜氏是春秋為齊襄公諱同姓也夫弑君之賊而援呉孟子之意諱其同姓而已何春秋不知類而儗人失其倫乎春秋權衡卷三
