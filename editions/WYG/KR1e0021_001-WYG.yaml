body:
  text: 春秋權衡卷一宋劉敞撰前漢諸儒不肯爲左氏學者爲其是非繆于聖人也故曰左氏不傳春秋此無疑矣然爲左氏者皆恥之因共護曰丘明受經于仲尼此欲以自解免耳其實非也何以言之邪仲尼之時魯國賢者無不從之游獨丘明不在弟子之籍若丘明眞受經作傳者豈得不在弟子之籍哉豈有受經傳道而非弟子者哉以是觀之仲尼未嘗授經于丘明丘明未嘗受經于仲尼也然丘明所以作傳者乃若自用其意說經汎以舊章常例通之于史䇿可以見成敗耳其襃貶之意非丘明所盡也以其不受經也學者可勿思之哉杜氏序曰仲尼因魯史策書成文考其眞僞而志其典禮上以遵周公之遺制下以明將來之法其敎之所存文之所害則刋而正之以示勸戒其餘皆即用舊史史有文質辭有詳略不必改也此未盡也苟唯文之所害則刋而正之其餘皆因而不改則何貴于聖人之作春秋也而傳又何以云非聖人莫能修之乎大凡左氏本不能盡得聖人春秋之意故春秋所有義同文異者皆没而不說而杜氏患苦左傳有不傳春秋之名因爲作說云此乃聖人即用舊史爾觀丘明之意又不必然按隱公之初始入春秋丘明解經頗亦殷勤故克段于鄢傳曰不言出奔難之也不書城郎非公命也不書之例一年之中凡七發明是仲尼作經大有所刪改也豈專用舊史者乎又曰春秋何以始乎魯隱公曰周平王東周之始王也非也魯惠公亦即位在周平王之初何不始于惠公乎又曰魯隱公讓國之賢君也非也如左氏所說則隱賤桓貴桓貴當立而隱不能奉之以立而已篡其位雖爲讓言誰知其心哉此桓公所以疑而殺之乃非弑君也閔公即位甫二歳哀公即位甫四歳不聞當時庶兄孽子敢代之治者雖不代之治二君亦君矣假令有庶兄孽子代之治春秋又可許其讓乎且隱公以謂己不代桓公治則魯國不存乎襄公無代治者何故魯不亡也若魯之存不待隱公者則隱公之攝吾見其篡不見其讓且讓非隱所得名也所謂讓者謂其推己之有以與人也不謂其奪人之有以與人也能知吾言者可與言春秋矣或曰周公亦攝吾曰周公之攝成王使之也且隱公周公也哉其攝也隱公傳惠公元妃孟子孟子卒繼室以聲子生隱公而仲子爲夫人生桓公是以隱公立而奉之如傳所言者明隱長而卑桓幼而貴也隱公立而奉之者明隱爲桓立也即元年傳所云攝也十一年羽父請殺桓公以求太宰公曰爲其少也吾將授之矣明隱本不當立故攝位以待桓壯也又元年傳曰惠公之薨也太子少太子則桓矣今杜氏注云繼室子當嗣世以禎祥之故追成父志立桓爲太子非也若隱本當立則傳應云不書即位讓也不應乃云攝也未有當其位而云攝者也未有攝其位而云讓者也知攝讓之名所爲施則知隱公之當立與不當立矣且若隱公本當立則羽父無縁請殺桓公也推羽父所以請殺桓者蓋見隱公本不當立今久攝不遷疑隱公欲遂有之也使隱公本當立者則羽父必能知桓公之已絶望何故求殺之哉且桓公之母爲夫人隱公之母爲妾妾主不同貴賤可知矣然此傳言桓隱貴賤自未足信而杜氏于其中又錯貴賤之分何爲未足信乎曰讓則不攝攝則不讓而傳謂隱公攝是非其位而據之者也于王法所不得爲于王法所不得爲則桓之弑隱惡少減矣春秋不冝深絶之今以其深絶之知隱公乃讓也非攝也今以攝言隱公是不盡春秋之情也何謂錯貴賤之分乎吾旣言之于前矣蓋注與傳違傳與經違非深知春秋之情者不能考也元年春王正月傳曰春王周正月杜氏曰周王之正月也杜氏所說非也周之諸侯即用周厯春秋豈嫌魯不用周厯加王以明之哉且傳乃云王周正月不云周王正月使傳云周王正月者可云傳過非杜氏過今傳云王周正月此傳不過杜氏過也何以言之邪傳先王而後周明王在周外也王在周外非時王省矣杜氏豈唯異于經哉又異于傳不書即位傳曰攝也杜氏云公不行即位之禮故史不書非也尋傳此文諸云不書者似指仲尼作春秋不書之意耳故隱公曰攝莊公曰文姜出閔公曰亂僖公曰公出復入然此未得仲尼之意也左氏見春秋闕此數君即位故以己意推而解之耳杜氏旣嫌其乖異難通因說云此四君者但朝廟告朔而不即位豈實論哉若以國家擾亂不遑行禮邪則豈獨不得即位而已亦無暇朝廟告朔矣朝廟告朔亦何異于即位即位亦何異于朝廟告朔朝廟告朔同見百官豈獨朝廟告朔則暇行之即位見百官則不暇行之此殊不足信也且杜氏未曉傳文傳曰不書即位者固言仲尼不書也若云隱莊初不即位傳當但云公不即位攝也公不即位文姜出故也不當云不書即位不稱即位也且杜氏注定無正月曰公未即位也此言公即位則得書正月公未即位則不得書正月也若公即位則得書正月未即位則不得書正月則隱公等初年不即位何故反書正月此自相伐也公及邾儀父盟于蔑傳云未王命故不書爵曰儀父貴之也非也諸侯本不得妄盟盟亦何善哉乃虞見貶何貴之有丘明未嘗受經見儀父稱字心固怪之又頗聞仲尼立素王之法遂承其虚說不復推本道理直曰貴之云且是事也三傳皆曰貴儀父故字之唯公羊以春秋當新王故其說似有理者而亦終不可通至於左氏榖梁乃未有可貴之道也又曰公即位而求好于邾故爲蔑之盟然則繼好息民更是魯善也邾不當襃矣又是後與桓公盟亦稱儀父又何善邪鄭伯克段于鄢左氏曰段出奔共不言出奔難之也非也若段得生奔他國則鄭伯有伐弟之惡無殺弟之惡春秋但當云鄭伯伐段于鄢即解云段不弟故不言弟稱鄭伯譏失敎也不言出奔難之也乃可爾何有改伐爲克哉傳例又曰得儁曰克若太叔奔共是不得儁也何以書克邪此年十月傳曰共叔之亂公孫滑奔衞公孫滑爲是段子父子冝相從今以傳數見段子不見段身也蓋段見殺之後其子出奔左氏所據注記誤云段身出奔爾又云如二君故曰克春秋二君相伐多矣皆曰伐不曰克不知何據而以爲二君言克邪傳曰不言出奔難之也此語無乃非左氏之例而自疚病乎如此是春秋之作刪除者多矣左氏何獨解此一事而二百四十二年之閒遂黙不言而皆以爲史闕文從赴告因舊史不赴告乎且此事也如左氏之說史䇿乃本有段出奔共而仲尼除之者也則鄭伯公子五爭晉文公不言出入之類亦爲仲尼有所避匿而捐之矣何不一一解之曰爲此不書乎爲此不書乎若彼不書者爲史䇿所無也安知此共叔出奔非史䇿所無者而必云仲尼除之乎觀此一節似左氏亦以春秋爲據百二十國寶書作者君子曰潁考叔純孝也非也莊公旣自悔其與母誓矣考叔已聞其心若此矣考叔當明言于君曰君之誓母不孝也鬼神所惡也雖有醜誓鬼神弗聽也君不如迎母反之此所謂遷善徙義君子之道鬼神所福也彼莊公聞若言必欣然不辭何者彼悔誓其母又恥自發之左右莫能導其君者故至于此使考叔能爲此言莊公何遽不從而晻昧致說苛公不怪其舎肉事未可知也又闕地作隧自云黃泉上之不足誑鬼下之不足誣人内之不足欺心而徒敎其君恥過作非此孟子所謂又從而爲之辭者也何謂純孝乎天王使宰咺來歸惠公仲子之賵左氏曰緩且子氏未薨故名非也此以宰爲宰周公之宰咺爲天子大夫之名怪其以名配宰妄云子氏未薨欲以就其貶咺之說耳按惠公以仲子爲夫人以桓公爲太子事相發也今天王歸賵史記其事應曰惠公及夫人子氏之賵何故但言仲子不稱夫人乎杜云婦人無謚故以字配氏審如杜説天王則生賵人之母魯之羣臣亦生謚君夫人也且周德雖衰不應生歸人賵觀惠公仲子與僖公成風何異而皆以謂雨人此不知妾母繫子之義而虚説不信也公子益師卒左氏曰公不與小斂故不書日非也公孫敖叔孫婼公孫嬰齊皆爲公預小斂乎何以得書日大凡春秋所據者史也史之所記非聖人也有日不日有月不月其事可以考核其日月不可必知也假令益師卒時公實預小歛或史誤不書日或年乆闕脱仲尼寧得虚増甲子乎若魯國史官世世皆賢人皆知仲尼將修春秋以日月之例見君臣厚薄故每記卿大夫之卒謹守此法則可矣若人自爲意家自爲法或日或不日或月或不月皆由此也安可於數百歳之後信其此文以襃貶人君乎爲左氏者旣自云史有文質辭有詳略不必改也今大夫卒或日或不日亦詳略之一端矣何以必其皆詳邪學者當如何解此吾欲聞之二年無駭帥師入極杜氏曰無駭未賜族故不書氏八年傳曰無駭卒羽父請氏皆非也公子稱公子公子之子稱公孫公孫之子以王父字爲氏乃常禮也若此無駭者繼公孫者也則其賜氏乆矣豈及其死而未賜氏乎如其公孫也則公孫乃其氏矣又何賜乎若以謂公子公孫亦必賜然後稱也是不達于禮矣夫禮所以賜氏者非以爲榮也乃以爲公孫之子其族無稱也其族無稱故請之于君賜之氏而後稱之也則族者固公子公孫之類也公子公孫不待賜而稱之也以親屬爲氏也公孫之子必待賜而立氏者公孫不敢以親屬爲氏也所謂繼大宗者也奈何以公子公孫爲賜族哉然則無駭之不氏非以其未賜族也紀裂繻來逆女杜氏曰逆女或稱使或不稱使㛰禮不稱主人史各随其實而書非例也非也如此茍一史足爲春秋何待仲尼哉且㛰禮不稱主人公羊説耳吾於公羊旣言之紀子帛莒子盟于密傳曰魯故也杜氏曰莒魯有怨紀侯旣昬于魯使大夫和解之故子帛爲魯結好也比之内大夫序於莒子之上又稱字以嘉之非也若紀侯使子帛平二國之怨則善在紀侯不在子帛子帛不當攘君善也又云比之内大夫若比之内大夫當曰紀子帛及莒子盟不當去及也夫人子氏薨左氏曰桓母也審如此桓未君其母稱夫人是仲子稱夫人乆矣桓公爲太子必矣杜氏何以云隱當嗣立追成父志以立桓邪此明杜氏誤解傳傳又誤解經也何以實之如杜之説則隱公誠讓國於桓如傳之説則隱公爲攝桓之國推此二者俱非是然杜氏近之然桓母亦非夫人也三年庚戌天王崩左氏曰壬戌平王崩赴以庚戌故書之杜云欲諸侯速至故遠日以赴春秋不書實崩日而書遠日者即傳其偽以徴臣子之過也非也王實以壬戌崩而赴以庚戌崩則天下皆謂真以庚戌崩也此史自當書庚戌聖人雖欲遷正亦不可得豈故傳其偽者乎且於春秋何以見平王非庚戌崩乎君氏卒左氏曰聲子也不赴于諸侯不反哭于寝不祔於姑故不曰薨不稱夫人故不言葬皆非也妾母不得稱夫人自常禮也假令實爲聲子雖不稱夫人猶應比定十五年姒氏卒及葬姒氏之例書之何忽稱君氏又不葬乎又曰不書姓爲公故曰君氏春秋以昭公娶吳故諱其姓謂之孟子則諱姓者避同姓也今聲子非魯同姓諱姓無義也杜氏云不書姓避正夫人亦非也若書子氏卒非正夫人亦明矣又何避乎又曰隱見爲君故特書於經曰君氏亦非也哀公未即位姒氏卒猶得書隱公見爲君子氏卒無不得書書之何謂特書乎且所謂君氏者又不足以效其爲君母也若曰君母氏乃可矣直云君氏未可謂之君母武氏子來求賻左氏曰王未葬也傳不解武氏子但云王未葬似傳本但説爾時王未葬故求賻也若强通之可益云求賻非禮也至於稱武氏子聖人之意甚微而左氏不言此明左氏未嘗受經於仲尼而自以己意作傳者杜氏之注是取公羊義牽合此傳爲傅飾其短闕耳傳曰鄭祭足帥師取温之麥又取成周之禾按春秋乃惡相伐者況伐人喪乎伐人喪尚惡之況伐天子乎今不獨伐天子又伐其喪也則春秋何以無貶鄭文邪左丘明魯之太史也鄭氏事若不赴告魯左丘明無由知之苟赴告魯則必書於䇿苟書於䇿則春秋必當有之今春秋無此是不書於䇿也不書於䇿則丘明何從見此邪非傳聞道聽者乎學者莫如信春秋則外物不能惑矣春秋云甲傳云乙傳雖可信勿信也孰信哉信春秋而已矣又曰周鄭交惡君子曰信不由中質無益也非也王欲分政虢公何以不可而鄭伯怨王此鄭之過一王以子狐質鄭鄭當辭曰君臣無質而遂以子忽質周比周於諸侯此鄭之罪二王崩周人將畀虢公政實未畀也鄭當送徃事居以待天命而遂伐王之喪此鄭之罪三鄭有三罪不患無辭貶之而君子但惡信不由中使周與鄭儕此爲縱鄭之惡急周之信孟子所謂人紾其兄之臂敎之徐徐云爾者也又曰宋宣公可謂知人矣立穆公其子饗之非也宣公知人之狀何如哉知其必反國於己子邪則是挾詐而讓也知其賢足以任國爲君邪則穆公竟不能止後嗣之亂若但以穆公今能反國因曰知人則堯讓舜舜不讓丹朱舜讓禹禹不讓商均堯舜反爲不知人也且吾論之自古讓者多安者少宋穆公讓魯隱公讓呉三王讓燕子噲讓後皆大亂宋襄公欲讓目夷目夷不聽鄭穆公欲讓去疾去疾不聽楚昭王欲讓公子閭公子閭不聽後皆無亂使此三子從而利之亦皆亂矣然彼三子又非惡爲君也讓不得聖人不止非聖人亦不可蒙讓于人也故堯讓舜舜讓禹太伯讓文王而天下國家安之彼所謂知人也若旦得讓名暮有讓禍此乃讓非其人不知人之甚者何謂知人哉又曰公子州吁嬖人之子也有寵而好用兵公弗禁石碏曰將立州吁乃定之矣若猶未也階之爲禍石碏之意則是石碏之言則非使君聽石碏而立州吁又當大亂亂之作是石碏敎之也石碏何義以免此責乎則不若謂君曰先王有禮長幼有序君必黜州吁以杜亂君之爱州吁乃可謂愛矣君聽州吁好兵以陵太子百歳之後州吁必爲亂國人必討之君雖欲全之不可得矣君之愛州吁乃害之也如此則可然左氏亦不須此四句自足爲義無用述之以誤後世也四年衞州吁弑其君完按州吁公子也不書公子杜作釋例以謂從赴辭也非也左氏稱族舎族亦自有義豈得但云從赴哉此明仲尼作春秋雖據舊史其稱族舎族皆出于聖人之手左氏本不受經故略自以己意推之如翬溺崔氏之比則因著爲説如州吁之類不稱族者不知何故則闕而弗論而杜氏則以爲茍從赴而已如實從赴傳所云翬溺皆虚辭也如皆有義不得云從赴也公及宋公遇于清杜氏云二國各簡其禮如道路相逢遇故曰遇也非也如二國各簡其禮此端爲㑹也非遇也遇者正謂相逢耳若遇爲㑹見之名故當如㑹例書云公遇宋公于清不得云及宋公遇也且遇者相遇無疑矣季姬及鄫子遇于防彼豈各簡其禮者邪翬帥師㑹宋公陳侯蔡人衞人伐鄭左氏曰羽父請師公弗許固請而行故書曰翬帥師疾之也非也翬溺爲貶無駭爲未賜族皆怪春秋有書氏不書氏之意而不得其説因以己意推言之爾如傳無説則翬溺可以無駭言之無駭可以翬溺言之如此則春秋不足獨任將反求決是非于傳也且翬之固請有異於元年公子豫之遂行乎豫不書於經翬書而不氏賞罰頗矣何以爲春秋衞人殺州吁于濮杜氏云未列於㑹故不稱君例在成十六年今按成十六年傳曰先君若有罪則君列諸會矣杜據此文是以每云諸篡弑之人已嘗㑹諸侯則無咎矣不亦甚哉若世太平也敎化未壞天下必無弑君親者及王道旣衰諸侯力征而臣弑君子弑父列國擅盟㑹於此之際㑹豈難致哉楚貪一裘一馬囚兩國君鄭以鞶鑑玉爵怨王而叛之彼固無忌憚也若弑逆之人入裘馬以市楚分玉爵以賂鄭推楚鄭之意将欣然願㑹此豈王法哉以此説經恐倍於經以此解傳恐違于傳何以知之邪傳曰厚問定君於石子石子曰王覲爲可然則列于諸侯之㑹未可也五年考仲子之宫杜氏云仲子桓母也惠公欲以爲夫人而諸侯無二嫡故隱公成父之志别立宫也非也若仲子實桓母又非夫人則不當立别宫春秋應與立煬宫武宫等書立宫以見譏不當委避云考宫也春秋所貴者禮而已矣孝經曰從父之令焉得爲孝令惠公無令隱公遂爲成之此去孝遠矣春秋何以反不譏邪且誠若傳所言仲子爲桓之母桓母夫人也其薨亦稱夫人矣今何故不曰考夫人仲子宫邪初獻六羽左氏曰公問羽數於衆仲衆仲對曰天子用八諸侯用六大夫四士二故自八以下公從之杜注云先時僭用八佾故今復古非也左氏云王命諸侯名位不同禮亦異數若五等之君均於六佾無乃同之乎推傳此言是衆父之言誤傳因具記之見失禮耳非美之也何以明之經言初獻者乃譏始僭也猶初税畝矣若非始僭者經不言初也又杜氏云是後季氏舞八佾則知唯仲子廟用六佾若如所言經又不當言初言初者是魯有國已來至今始作此事爾不然一切復古皆用六佾猶可言初也若但據一廟又非創始不可謂初也蓋魯隱以前未嘗舞六佾於羣公之廟今立仲子廟又當下羣公疑於所舞故問衆仲也衆仲不知諸侯名位不同禮亦異數因天子八佾遂兼稱諸侯六佾致使魯僭諸公之禮也此春秋所以書其初也此後所以又僭八佾也且吾論衆仲之誤無疑矣仲云士二佾所謂士者特牲少牢皆士禮也無用樂舞之儀安得二佾而施之乎周禮舞師之職凡小祭祀則不興舞小祭祀者王服𤣥冕之祭也王服𤣥冕不興舞矣士服𤣥冕反舞之乎且𤣥冕又非士所當服者計衆仲之博學親師未如宰我之於仲尼史佚之於周公也宰我對社仲尼非之史佚葬殤周公非之衆仲之誤魯使僭無疑也以謂不然則春秋書之意不可解今欲成杜氏説邪欲從春秋邪必有春秋必無杜氏必有杜氏必無春秋六年鄭人來渝平左氏曰更成也杜氏曰渝變也若如左氏杜氏之説經但當云及鄭平或云曁鄭平或云鄭人來平或云鄭人請平則足矣不得言渝渝以變爲義則是變其舊平非新爲平也明此渝平當云輸平二傳亦云輸平蓋是字誤冬宋人取長葛左氏作秋杜氏云秋取冬來告也非也史之記事雖據赴告而書至其日月猶當依先後次序假令宋鄭同用二月出師宋則即時來告鄭則逾時來告所告雖遲其告之言猶曰二月也國史豈得但據告時編之於夏乎必若所云豈唯大泯亂事實哉亦顛倒天時矣然左傳日月與經不同者多或丘明作書雜取當時諸侯史䇿史䇿有用夏正者有用周正者錯雜文舛徃徃而迷故經所云冬傳謂之秋也傳云京師來告饑公爲之請糴此虚語也若其有之經無縁不書也杜氏以謂稱京師告饑則非王命故不書非也告饑雖不書歸粟猶應書也必以謂非虚語者則是雖來告糴而魯不肯歸粟且以請糴于諸侯紿周故春秋諱之也不然無縁不書也若曰稱京師則非王命彼傳云京師敗曰王師敗績于某者指誰言之哉春秋權衡卷一
