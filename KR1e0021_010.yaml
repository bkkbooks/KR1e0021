body:
  text: 春秋權衡卷十宋劉敞撰十五年鄭伯突出奔蔡公羊以謂突之名奪正也非也突之不正明矣雖勿名之可勿奪乎鄭世子忽復歸于鄭公羊以謂復歸者出惡歸無惡歸者出入無惡非也如忽之奔蓋有不得已亦何惡乎若以為惡猶有可諉未知突之篡國亦何故出入無惡乎以謂突之言歸順祭仲也夫突親篡兄奪國以順祭仲而得言歸忽本宜為君者也方其出亦何獨不使順祭仲乎在突之入則得順祭仲而使為入無惡在忽之出則不得順祭仲而使為出有惡如是春秋乃助突而不助忽也不亦悖乎何休曰忽之出惡者為不如死之榮也亦非也公羊許祭仲為知權者固以祭仲為能以生易死今又責忽之不死若忽死為是則無以權許祭仲若忽生為是則又何生之榮而言祭仲則欲其以生易死言鄭忽則欲其以死易生不亦惑哉不亦惑哉孔子曰既欲其生又欲其死是惑也鄭伯突入于櫟公羊曰曷為不言入於鄭未言爾非也實入於櫟未入于鄭豈得言鄭哉何休固據陽生為比夫陽生入陳乞之家者誠在齊也又何疑乎衛侯入於夷儀蒯聵入於戚公居於鄆皆一例爾伐鄭何休以謂征突非也蓋休不知之十六年公至自伐鄭何休曰致者善公非也元年不致以為奪臣子辭二年致以為深抑小人今書致以為善公行義桓會不致以為無憂可危如休之言致者乍善乍惡乍安乍危無一可通也十七年公及邾儀父盟于趡何休云本失爵在名例中朝桓公稱人今此不名者明元功之臣有誅無絶非也若元功之臣有誅無絶故儀父雖有罪猶不失初褒則滕侯薛侯未嘗有罪一褒之後便黜稱伯子何也及齊師戰于奚何休云云者鄙俗之言耳蔡季自陳歸于蔡何休以季不稱弟者見季不受父兄之尊非也以季為名乎季未命為大夫則名氏不通以季為氏乎先君已沒則不合稱弟理適然耳諸休所稱者皆非也葬蔡桓侯何休云奪臣子辭非也春秋之時禍亂有甚於封人者未聞奪也十月朔日有食之何休云云者非也日之食非專為魯春秋豈得強附著之魯哉聖人之説災異欲人懼耳非若眭孟京房指象求類如與鬼神通言者也十八年葬我君桓公公羊曰賊未討何以書葬讎在外也讎在外則何以書葬君子辭也非也君弒臣不討賊非臣子不復讎非子復讎者以死敗為榮故曰父母之讎不與共戴天齊襄公復九世之讎公羊賢之奈何為讎在外則勿復乎必曰量力而動不責逾國而討者又何以稱復讎者以死敗為榮乎伍子胥借吳之力以復楚公羊是之即以量力不責者如子胥乃可耳焉有據千乘之勢而知讎不報乎莊公元年夫人孫于齊公羊曰正月以存君念母以首事非也夫人始與公俱如齊公薨喪歸則夫人固亦歸文不得特見爾非為念母特貶之也且公羊例夫人行唯奔喪致薑氏之不致適宜矣又何疑乎弟子不曉故妄問之公羊子忘其本例遂妄對之實説公薨於齊事起夫人而國人初不知也徐而知之則共責讓夫人夫人用是奔耳單伯逆王姬公羊以謂單伯者吾大夫之命乎天子者也非也春秋之義許人臣者必使臣若以命於天子之故而不名是使不臣也又禮曰君前臣名公羊説公子糾不稱公子亦曰君前臣名豈有己國大夫受己君命但以命於天子遂得不名乎且公子糾異國之人單伯朝廷之臣於外國之人則正君臣之禮朝廷之臣反不務正君臣之禮甚可怪也又所謂命於天子不名者禮經未有不稱使天子召而使之也亦非也文何不曰天子使單伯逆王姬凡天子嫁女而使魯為主必有告命魯既受命則使人逆女禮也何至天子自召單伯使之乎且主嫁女者魯侯也非單伯也天子何乃專召單伯而使之此事之不然王使榮叔來錫桓公命公羊曰加我服也非也周人雖愚豈其以衣服車馬而畀既葬之人哉且何以為儀齊師遷紀郱鄑郚公羊曰遷之者取之也為襄公諱也非也有遷而不取者有取而不遷者有且遷且取者春秋據實而書耳非諱也以遷邑為愈乎宋人遷宿公羊以謂當坐滅國然則齊師取邑諱從遷邑實言遷邑復坐滅邑安在諱也且襄公獨非懷惡而討不義者乎其何諱焉二年公子慶父伐於餘丘公羊以謂於餘丘邾邑也非也公羊見邑不繫國若可疑者悉附之邾婁爾何休云慶父少將兵不譏者從不言弟意亦起之其意謂公弟也二十五年公子友如陳不言弟又何起哉三年葬桓王公羊以謂改葬非也若誠改葬應曰改葬如改卜之類矣今不言改非改葬也何休云榮奢改葬葬非其宜故惡録之按休所引皆讖記也理不可信説者又謂坐義云王崩七年改葬必然也夫世衰禮廢何事不有豈能必桓王前已葬哉固當據經文無改葬足以為實矣紀季以酅入于齊公羊以謂賢紀季服罪故不名非也原春秋所以不貶季為畔者以季受命於紀侯也若齊欲滅紀紀季不能同心守國專析其地以事讎敵外託服罪實私享其利者是春秋所惡也且春秋貴死位無緣以專地事讎之人而輒褒之此明齊紀本非讎也襄公貪其土地紀侯自見不忍鬬其人又恥事惡人欲棄去之師法太王而患宗廟滅絶其心又未滿故使紀季以酅入齊為附庸也是紀侯輕南面之位而惜百姓之命不患終身無位而憂宗社之祀其仁心忠厚最為春秋所賢者也趙鞅入於晉陽以叛以無君命雖有功不除其惡假令季實服罪以存宗廟猶與趙鞅無君命等耳不得沒其叛又稱其字也四年紀侯大去其國公羊以謂滅也不言滅為襄公諱也非也文稱紀侯大去何以謂之滅乎蔡侯弒父惡莫大焉楚子討之書曰楚子虔誘蔡侯般者固惡其懷惡而討不義也紀侯九世之惡不深於蔡般齊襄懷惡而討不義不減於楚子而春秋深抑紀侯以難明之事專信齊侯以一偏之辭何哉且烹哀公者王也非紀侯也紀侯有罪罪在譖人不在烹人何滅紀以為賢哉以辨持之以曲通之公羊之義固勝以道觀之以義推之公羊之義未有一可也齊侯葬紀伯姬公羊以襄公為賢吾既言之矣公及齊人狩于郜公羊以謂實齊侯也非也春秋有不待貶絶而見罪惡者若實齊侯書之乃冝矣又何更之乎五年倪犂來來朝公羊曰犂來者何名也其名何微國也非也諸侯無生名凡生名者為貶之耳伐衛公羊以謂不言納朔辟王也按公羊以納為篡然則書納足明其罪矣今不務褒貶而反隱惡非春秋之意也六年王人子突救衛公羊以謂實貴子突繫諸人耳非也衛侯不臣王不能誅也遣貴子突救衛不能克也書王子突適足以見其微矣此亦不待貶絶者何有繫諸人哉衛侯朔入于衛公羊曰其言入何何休云據頓子不復書入非也去年五國納衛侯實不能入今衛侯因利乘便遂能自入也納則言納入則言入初不相干無所多疑也推公羊之意所以為若言者蔽在以納者入辭也不知納者自納辭入者自辭入爾以謂不然無為去年冬諸侯既入之今年六月乃又入也何休又云不書公子留出奔者天子本當絶衛不當復立公子留亦非也休以據百二十國寶書作春秋若留者無宜不書故云爾仲尼曰興滅國繼絶世有王者作猶曰興之繼之况以一朔之惡遂絶康叔之祀哉理不通也推不通之理欲以成百二十國寶書之驗而不悟違失聖人之意可憫笑者此也公至自伐衛公羊曰得意致會不得意致伐何休又説二國一國之别皆詭亂不經有為而為非凡例之體故不詰也齊人來歸衛寶公羊曰此衛寶也齊人曷為來歸之衛人歸之也非也宋人致鼎謂之郜鼎鼎本郜物也齊人歸寶謂之衛寶寶本衛物也事類相明無足可疑豈以謂之衛寶則必衛人歸之彼郜鼎者豈必郜人送之哉且經書齊人來歸至明白矣又何云乎七年星隕如雨公羊説不修春秋曰雨星不及地尺而復君子修之曰星隕如雨此妄語也若令不修春秋其文如此仲尼何得改之乎若彼言雨星非必衆星也今言如雨則衆星必也是仲尼橫設不實之事以迷罔後人也又仲尼不書尺而復若實尺而復無為不書若尺而復不足書如雨亦不足書何者如何休之言以隕則為異耳秋大水無麥苗公羊云一災不書待無麥然後書無苗非也若春秋一災不書豈愛民之謂乎計公羊之意謂當是時麥強而苗弱苗當先敗麥當後敗不當先書無麥也審如公羊言一災不書待無麥乃書無苗則何不曰無苗麥乎八年師次于郎以俟陳人蔡人公羊以謂託不得已也非也仲尼豈為不實無狀以迷人哉觀聖人諱國惡者有之矣亦不從而為之辭而已夫從而為之辭者此小人之事也何以辱春秋甲午祠兵公羊以謂為久也非也若魯欲以夏月與鄰國之齊共伐盛何至正月出師自取淹久乎成降于齊師公羊以謂成者盛也諱滅同姓也不言降吾師辟之也非也實共圍盛改謂之成實滅其國改謂之降實降于魯又獨言齊皆非聖人之文也凡聖人諱國惡亦在可諱之域不在不可諱之域如改白為黑曰已為人豈獨非道亦不可傳世矣春秋之書要在無傳而自通非曲經以合傳也且所貴聖人之文者不貴其革易名字以惑人也如必革易名字然後可見褒貶諱避者誰不能為春秋哉師還公羊曰病之也曰師病矣非師之罪也然則理實貶之何言善之乎又凡春秋所刺譏茍滅國伐邑誰則非君之罪乎既曰君罪師則無罪何至於此獨以為非師之罪乎則彼不記師還者皆非君罪而師罪乎九年公及齊大夫盟于暨公羊以謂不沒公者齊無君也非也齊之有君猶當沒公齊今無君何以反不沒公且以不沒公為尊內邪按髙子來盟公羊云不稱使豈我無君蓋以謂君不行使乎大夫也春秋尊魯魯無君猶不使齊侯敵魯大夫若齊無君春秋何得斥公以敵齊大夫哉又曰何以不名諱與大夫盟也何休曰是時齊人來迎子糾魯不與而與之盟齊為是更迎小白吾謂魯若不與齊糾者何緣與齊大夫盟所盟更何事哉公伐齊納糾公羊云納者入辭也非也納者納辭耳得入不得入未可知也非入辭也又曰伐而言納者猶不能納也亦非也有伐而納者有圍而納者有未嘗伐未嘗圍而納者各據實書之耳又云糾不稱公子君前臣名也非也糾失國在魯本非魯臣何以責以君前臣名乎且若稱公子糾則可謂非君前臣名乎齊小白入于齊公羊云以國氏者當國也非也凡言當國之説皆無通例不可條貫吾於州吁弒其君既言之矣及齊師戰于乾時我師敗績公羊曰內不言敗此言敗者伐敗也非也若魯實以復讎而戰者春秋不宜不言公若以復讎者在下故不言公春秋豈奪人臣子意哉臣有善言君行之則君善也故書曰股肱良哉言一體也奈何以復讎者在下則不以其美歸公哉且謀之者臣也行之者君也臣謀而君不行貶君可也臣謀而君行又欲何嫌十年公侵宋公羊曰粗者曰侵精者曰伐似近矣未合也又戰不言伐是也戰重也其曰圍不言戰則非也圍未必重於戰不可詳圍而略戰宋人遷宿公羊曰以地遷之非也直宋人以其力遷宿使臣于已無説還之與不還之齊師宋師次于郎公敗宋師于乘丘公羊曰我能敗之故言次也何休云二國才止次未成於伐不知二國之師進至於乘丘而我能敗之邪抑亦退至乘丘而我能敗之邪今推傳文及注意是自郎進至乘丘也然則郎非近邑桓十年來戰于郎何以謂之近乎圍邪彼時至郎則恐見圍此時至郎則猶未成於伐郎一地也何二三乃爾乎荆敗蔡師于莘以蔡侯獻舞歸公羊以謂荆者州名也非也楚之有荆號非一日也詩云撻彼殷武奮伐荆楚非孔子改之也且楚在荆州以其強大故抑而謂之荆若荆州之地復有一國強若楚者當有兩荆不亦妄乎又徐亦夷也徐在徐州不聞以州名名之則徐猶荆也可得謂徐者州名之乎又曰國不若氏亦非也甲氏潞氏同為赤夷而國殊族異故分名耳譬猶漢之西域乃有三十六國總而名之謂之西域析而名之自然分别有何怪而強云進之稱氏乎又曰氏不若人假令赤狄治行益修者可云晉師滅赤狄甲人乎又曰蔡侯獻舞何以名絶曷為絶獲也曷為不言其獲不與夷狄之獲中國也亦非也按公羊謂秦者夷也匿嫡之名然則僖十五年秦獲晉侯何故與夷狄獲中國邪凡春秋有獲某人者有以某人歸者文自不同非一物也以理言之獲蓋暫得以歸蓋就虜而不恥者十一年宋大水公羊云外災不書此書者及我也按春秋內其國而外諸夏若水災及魯自可記魯災而已無為詳宋而略我也公羊以百二十國寶書為據故云爾非實可信也王姬歸于齊公羊云何以書過我也非也元年所書逆王姬及築館者皆以非常書則知常逆王姬及築館不當書故此王姬書歸而已若以謂過我而書者自周之齊何乃過魯十三年公會齊侯盟于柯按公羊例曰會猶最也及汲汲也信斯言者柯之盟曹子手劔以劫齊侯可謂非汲汲乎而不稱及何哉或者為公羊文過以謂諱之按春秋但不書取汶陽田足矣又改及為會則是都喪事實使後人無由察其是非豈聖人意乎十四年單伯會伐宋公羊云後會也非也伐宋之時魯本不預謀後聞乃遣大夫往會之耳與陳侯如會同意非後期也十七年齊人執鄭瞻公羊云書甚佞也按春秋未有微者而得書於經若瞻為大夫而未命又何以别乎多麋何休於此云云者非春秋意也不曰為災乎十八年公追戎于濟西公羊以謂大其未至而豫禦之也非也若未至而禦何得謂之追乎此不待攻而自破者雖多言煩説猶不可解也又曰于濟西者大之也此欲引追齊師至酅以立褒貶耳彼自以弗及故得書至又何足據乎十九年公子結媵陳人之婦于鄄公羊以謂媵者諸侯娶一國則二國往媵之陳人者陳侯也非也云公子結以妾媵歸陳侯之婦則文理不成又無故貶損陳侯使從人稱非正名之義蓋媵者送女也陳人者陳大夫也不煩説矣又曰諸侯一娶九女諸侯不再娶亦非也假令諸侯之正妃卒則右媵攝事右媵復卒則左媵攝事而左媵復卒豈可以宗廟社稷與衆姪娣共之哉獨不為宗廟社稷乎禮云宗子雖七十無無主婦由是而言宗廟不輕於族人國君不輕於宗子宗子猶不以妾為婦國君何故反得以妾為婦哉然則諸侯自合再娶再娶者不備三歸可矣昔武王崩成王年十二若不再娶安取此子哉茍令武王三十而娶其后亦二十而嫁比武王之崩后亦八十三矣計生成王時不減七十此非人世所有也可得強云不再娶乎成王又自有母弟事皆驗著一娶明矣二十年齊大災公羊曰大災者何大瘠也大瘠者何癘也非也春秋何以不言大瘠大癘而亂火災之名乎又曰何以書及我也亦非也春秋豈其詳外而略內哉二十二年肆大省公羊以謂譏始忌省也非也經云肆大眚而傳謂之忌省其文與其理不可訓解蓋不足難也陳人殺其公子禦冦尋何休之意以謂大夫相殺也非也稱人則是殺有罪之辭耳孟子曰左右皆曰可殺勿聽諸大夫皆曰可殺勿聽國人皆曰可殺然後察之見可殺焉然後殺之故曰國人殺之也夏五月何休於此云云者非也公如齊納幣何休云實淫泆不可言故因其自納幣見之非也公不當喪娶又不當自納幣此春秋所貶也又何起淫泆之有二十三年公至自齊公羊云危之也公一陳他也非也有致善有致不善皆妄説也不可以通蔡叔來聘何休云不稱使者公一陳他故使若我無君以起其當絶非也假令莊公外淫天子詎能便知之而春秋責其聘小人乎公如齊觀社何休云諱淫也非也假令君子諱國惡豈可虛出不然之事以文過飾非乎荆人來聘公羊云荆何以稱人始能聘也非也稱人即其大夫之辭耳何休乃云春秋王魯因其始來聘明夷狄能慕化修聘禮當進之若然者隱二年會戎于潛何不曰會戎人乎且荆人來聘明非其君自來矣今所言州國氏人名字爵七等之制皆進退人君者也如之何又欲移用於其臣乎何休又曰不繫國而荆者許夷狄者不一而足若然是後何不且書楚氏而遂足與楚人盟于扈公羊曰危之也妄説耳二十四年戎侵曹曹羈出奔陳公羊曰曹無大夫非也經曰不敢遺小國之臣聖人作春秋豈遺之哉又曹伯伯也鄭伯亦伯也若以小國故無大夫鄭亦宜無大夫豈獨曹哉今公羊不曰鄭無大夫而獨曰曹無大夫似見曹之大夫著於經者少耳非確語也赤歸于曹郭公按此一事推尋傳注初無義理不知先儒顛倒繆妄何乃至如此二十五年陳侯使女叔來聘何休云稱字敬老也非也春秋以名字褒貶非有殊功異行亦不輒字之藉使女叔實有賢行則稱氏為不見矣衛侯朔卒何休云云飾非之語也無可信用日有食之鼓用牲于社何休云書得禮非也若得禮則春秋當不書矣大水鼓用牲于社于門公羊曰于社禮也于門非禮也非也若于社為得禮春秋亦當不書矣公子友如陳按公羊例母弟稱弟此公弟也則何以不曰公弟乎吾於齊侯使其弟年來聘既言之矣二十六年曹殺其大夫公羊云不名衆也然則殺三郤何故名乎又云不死於曹君者也宋殺其大夫又何以辨哉凡公羊以大夫相殺稱人而君殺大夫稱國而不論大夫有罪無罪故使曹宋同文異義是非臆斷也又曰此蓋戰也滅也亦非也曹羈雖賢何能掩君滅之禍乎以曹羈之賢遂諱曹伯之滅又何義乎晉之假道於虞也宫之竒諫推宫之竒之賢則無以異於曹羈矣春秋為曹羈諱曹伯不為宫之竒諱虞公何哉二十七年公子友如陳葬原仲公羊云通乎季子之私行非也文稱如陳非私行也且當是時內難未作何避之有若以季子見幾逺舉者是謂忘宗國之亂而貴一身之全非賢智也且季子於此奔陳亦見釁端已成乎則莊公既病而召季子其釁端宜益深矣季子何以得入而與國政夫莊公病季子羈旅在外一旦召至授之權柄人莫能禦者此明公子牙之徒禍猶未已也若彼之時禍猶未巳况去莊公殁尚數年而遂云避內難出奔乎且季子與其奔也孰若勿奔以銷解其謀察識其勢若孔父之禦亂也而胡為背君捐國使回皇於亂臣之手此皆事之不然者也把伯來朝何休云不稱公者春秋黜之非也吾既言之矣二十八年齊人伐衛衛人及齊人戰衛人敗績公羊曰曷為使衛主之衛未有罪爾非也荀林父帥師及楚子戰于邲當此之時公羊以晉師夷狄之不若則何以不使楚子主之豈晉師未有罪楚子有罪乎是何自相反也又曰敗者稱師衛何以不稱師未得成師也亦非也茍衛未得成師則春秋曷為書以偏戰之辭此為不知春秋之文甚矣冬築微大無麥禾公羊曰諱以凶年造邑非也築微在冬初五榖畢入然後制國用在冬末故有前後耳豈故諱哉二十九年城諸及防何休云諸君邑防臣邑非也臣之有邑臣之祿也可得而專乎苟不可專則臣邑猶君邑也且假令俱臣邑者文可曰城諸防乎則與彼須朐何辨焉三十年齊人降鄣公羊曰紀之遺邑也非也紀滅久矣猶存鄣乎又曰降之者取之也不言取之為桓公諱也亦非也取之固曰取之降之固曰降之遷之固曰遷之非可相假借為諱避也齊人降鄣猶曰宋人遷宿遷之不可諱為降也猶取之不可諱為遷也文如日月不可巧誣而猶云云多見其惑也齊人伐山戎公羊曰此齊侯也其稱人何貶蓋以操之為已蹙矣非也屬桓公取鄣諱之為降又近上滅談滅遂亦無所貶夫桓公滅中國而不貶今伐山戎而貶侯以人此可謂識輕重乎且誠春秋意者是開桓公得滅中國而不得伐山戎也此所謂小辨破道小説害義君子之所疾也三十一年築臺于郎公羊云何以書譏何譏爾臨民之所潄浣也非也譏在築臺不在臨民若不臨民臺可為乎臺若不可為雖不臨民雖不臨國雖不臨逺猶譏之也何必以三者限之三十二年公子牙卒公羊云不稱弟殺也其意欲以不稱弟起牙見殺非也二十七年公子友如陳不稱弟又何故哉大凡君殺大夫舉當言殺外則見其專殺之罪內則分别善惡之趨今季子誅牙內得親親之理外得尊尊之義春秋無所復責故平其文使若自死然孔子曰大夫強而君殺之義也自三桓始也正謂此也不稱弟適其常文又何足據乎若謂刺公子牙則猶當坐殺大夫何休曰莊不卒大夫亦非也彼溺不卒者自以非執政故爾何謂莊不卒大夫哉公子慶父如齊何休云奔也非也若奔而言如是春秋縱有罪也而曰起季子不探其情不暴其罪亦非也若季子不探其情不暴其罪但不殺之緩追逸賊書奔足矣又何故改之為如哉焉有臣殺其君不成而出推親親之意遂并諱其奔意者獨慶父可親親哉子般不可親親哉且季子不殺慶父非義也故季子曰公子不可入入則殺矣由是言之緩追逸賊者季子之心也如慶父居國而不去季子安得而不殺且當殺之又何有諱其奔春秋權衡卷十
