body:
  text: 春秋權衡卷十三宋劉敞撰昭公元年叔孫豹㑹晉趙武陳公子招云云公羊曰此陳侯之弟招也何以不稱弟貶也非也公羊以母弟稱弟故云爾不知母弟可以稱弟而不可常稱常稱皆以重書也且招之罪在殺世子偃師不在會于漷也聖人襃貶各於其事豈有迎其未然之事探其且然之罪以為貶哉推此而言傳云母弟稱弟不可通也又曰招之罪已重矣何為復貶於此著招之有罪也言楚之託乎討招以滅陳地亦非也夫殺世子此招之罪也滅陳之國此則非招之罪也以楚討招而滅陳而遂移罪於招豈春秋之理哉三月取鄆公羊曰鄆者内之邑也非也鄆常見於春秋皆與莒事相附此莒之附庸明矣秦伯之弟鍼出奔晉公羊曰秦無大夫仕諸晉也有千乗之國而不能容其母弟故君子謂之出奔也非也凡春秋所言出奔皆貶也今如傳所說鍼者乃秦伯之過此自當貶秦伯而不當貶鍼也向若春秋書曰秦伯放其弟鍼於晉則可問曰秦無大夫此何以書曰仕諸晉也以千乗之國而不能容其母弟故君子謂之放也今經言奔此罪在鍼不在秦伯明矣何以見秦伯仕之於晉乎由是言之所謂秦無大夫者直虚言爾莒去疾自齊入于莒莒展出奔吳何休曰不從莒無大夫去氏者篡重不嫌本不當氏也非也莒去疾猶曰齊小白莒展猶曰鄭忽此乃常文見貶爾自不得從大夫例也疆鄆田公羊曰畏莒也非也成公九年楚人伐莒莒潰楚人入鄆襄公十二年莒人伐我圍台季孫宿救台遂入鄆今又因莒之亂疆鄆田此明鄆為莒附庸明矣鄆本屬莒故魯取其邑未得其地故因莒亂帥師而往分明疆土此乃欺之非畏之也且以理言魯强莒小魯安莒亂何為乃畏莒哉季孫宿帥師入鄆豈自入其邑哉三年北燕伯款出奔齊何休曰名者所見世責小國詳此乃大繆且不可信自是以前出奔而名者不為失地即大惡也今至款獨云在太平世責之詳亦幸見款無他大惡故令休得如此云即令款身有惡如衛朔比者豈可連書兩名以見之哉不連書兩名不足以見法也何者款負大惡而名之休必謂款以大惡名不曰見治太平名也四年會于申何休曰不殊會淮夷者楚子主㑹行義故君子不殊其類所以順楚而病中國此亦無理不可信也休謂楚今行義故春秋以病中國然則楚自合進與中國等矣則冝殊會淮夷以起其事今乃云欲順楚義而不殊其類是足見楚與淮夷未有異也何能病中國哉原其所以云云者欲成向者殊㑹吳之說耳按㑹于向吳人鄫人在列又何故不殊取鄫公羊曰諱滅也非也莒已滅鄫矣此又能重滅之乎公羊本謂鄫未滅故因而為之辭耳五年叔弓帥師敗莒師于濆泉公羊曰濆泉者直泉也非也此地名爾豈謂戰而泉涌乎戰而泉涌固當舉戰地於上而後書曰有濆泉不得引濆泉以為戰地也且公羊說于泓以水地者善其不薄人於險也戰于河曲者河曲䟽矣非水地也戰于乾時者著時之乾亦非水地也戰于邲者又善楚莊王不厄人也則是以水地者必水戰矣今此舎地之名更著稱是豈莒魯之師居泉中戰乎秦伯卒公羊曰秦者夷也匿嫡之名也非也謂秦為夷則經書秦伐晉乃其理自適然矣非貶之也或謂秦是夷或謂秦非夷何哉且諸侯卒不名者多矣可以悉謂之夷乎凡夷狄之爵雖大不過子秦爵伯也非夷亦明矣又詩序獻公之女為秦穆公夫人而生康公康公為太子時贈送晉文公于渭之陽作渭陽之詩則康公者嫡子也今尋公羊以文十八年秦伯罃卒為穆公則宣四年秦伯稻卒為康公驗此兩者又各有名非匿之也公羊乃云嫡得之然則秦伯亦未盡用夷禮安知彼不名者自與中國諸侯不名同哉七年葬衞襄公何休曰當時而日者世子輒有惡疾不早廢之臨死乃命大臣廢之自下廢上鮮不為亂故危錄之未知休何以見此事邪推此言也而觀之其妄可勝記乎八年陳侯之弟招殺陳世子偃師按此但殺世子爾而元年公羊說云自是弑君非實事也蒐于紅公羊曰以罕書非也吾既言之矣九年陳火公羊曰存陳也何休謂陳為天所存非也此自聖人欲存之故録爾安知天意十一年楚師滅蔡執蔡世子友以歸用之公羊曰其稱世子何不君靈公不成其子也子謂不成其子而稱世子義與文反難以說也又鄭忽亦稱世子豈復不成其子哉又曰用之築防此似兒戲非可也十二年齊髙偃帥師納北燕伯于陽公羊曰伯于陽者公子陽生也非也公羊謂孔子作春秋用百二十國寶書也豈百二十國書悉如此殘缺乎曷為不革又孔子作春秋用百二十國寶書而見於春秋者裁六十餘國耳所以不悉見者師說是非卓佹則不取也如陽生此事殘缺乃爾又非卓佹盖何足復録乎明春秋之作據魯史審矣以是論之伯于陽非公子陽生其所云云者皆誣聖人也十三年公不與盟公羊曰不恥不與是也言諸侯遂亂反陳蔡非也陳蔡滅而復封此豈非所謂力能救之則救之可也者乎何故恥之十五年有事于武宫籥入叔弓卒去樂卒事公羊曰君有事於廟聞大夫之喪去樂卒事非也曽子問君在祭不得成禮者幾仲尼語之詳矣而不及此此所以知其非也蔡昭吳奔鄭何休曰不言出者始封名言歸嫌與天子歸有罪同故奪其有國之辭明專封非也以昭吳為蔡侯之身邪蔡侯始歸名廬後卒亦名廬此不得謂之昭吳也以昭吳為蔡大夫邪國非大夫之有奈何於大夫之身奪有國之辭哉以謂欲見專封也蔡侯廬歸于蔡其專封不既明已乎且齊侯嘗專封衞邢把三國矣未見春秋復奪三君之國也今此何故獨奪之邪二十年曹公孫㑹自鄸出奔宋公羊曰為公子喜時之後諱也非也春秋之義善惡各以其事進退之何有賢其祖而遂諱其後子孫惡乎且所以諱賢者之過者謂小不足以妨大短不足以毁長而可以成人之美者也若乃大惡至叛君專地反臣子之義亂人倫之常矣而猶為之諱乎如必賢者子孫則罪皆可諱是蔡管不誅於周也由是觀之所謂公子喜時諱其義安在哉何休又曰有明王作喜時當還國亦非也伯夷叔齊讓國其弟當武王之興不聞還孤竹之封於伯夷也豈伯夷為不及公子喜時哉武王非王者哉二十一年宋華亥向寗華定自陳入于宋南里以叛公羊曰南里者何若曰因諸者然非也宋南里者入宋而居南里也又何疑焉二十二年王室亂公羊曰言不及外也非也此不問可解矣謂王室亂者嫡庶並爭亂在宗室者也本不得言京師亂成周亂王城亂其理適然而何休又云云皆趨文而遺意者也劉子單子以王猛居于皇公羊云其稱王猛何當國也非也王猛乃王矣未逾年是以不可稱天王而又不可以諸侯例稱子也何則獨言子則似魯之子冠王於子則又與他王子相亂故稱王繫猛者明是乃王者在喪之常稱可無疑也殷人作書以君名篇明都不諱也周人以諱事神死則諱之生亦不諱也逾年之後臣子可稱之曰天王未逾年則以王繫名通謂之小子王生名之死亦名之明尊未成也今此王猛是生名之也後曰王子猛是死亦名之也而公羊不達此見文稱王猛則謂與小白齊突等矣不知文無所移易也甚矣其陋也且春秋書王猛居于皇即猛不正可言居乎劉子單子以王猛入于王城公羊曰王城者何西周也何休云得京師地半自稱西周非也此休不知之耳又曰其言入何篡辭也亦非也向王猛居于皇亦何不言入乎必若以入為篡者下有天王入于成周亦可謂篡乎王子猛卒公羊曰不與當父死子繼兄死弟及之辭也非也向言王猛者以文不可繫子今言王子者死當以子禮治之明是乃王之子也言卒者未逾年之君猶子赤子般皆言卒也言卒則可言薨則不可猶夷狄之君言子則可言男則不可也禮之次序各自有所宜不必未逾年之諸侯則當稱卒未逾年之王則當稱薨也何休云春秋篡成者皆與使當君之非也春秋視篡奪之人無可奈何爾隨其自所稱呼而書之者見其罪也豈與使君之乎若篡成則與使君之是春秋獨惡不善篡而縱所善篡也大為之防民猶踰之又開其利篡者衆矣獲陳夏齧公羊曰呉少進也然則吳猶得獲中國豈不得主中國且所主者但戰而已何嫌不得哉天王居于狄泉公羊曰此未三年其稱天王何著有天子也非也其意以謂未三年不當言天王耳王者雖諒闇三年然逾年之後臣子可以天王稱之矣而王者未可自決政事也豈謂都無天王之稱哉毛伯來求金不稱天王明命自上下不合稱之也天王居于狄泉臣子稱之理自得稱天王也聖人之意可見矣二十四年叔孫舎至自晉二傳皆無叔孫公羊獨有此似聖人本意所謂辭繁而不殺者也但説之非爾二十五年秋七月上辛大雩季辛又雩公羊曰聚衆以逐季氏也非也若七月聚衆則何至九月公乃出奔乎何休又説日為君辰為臣去辰者逐季孟之意蓋迂而不典二十六年天王入于成周公羊曰其言入何不嫌也何休云不嫌為篡但起其難然則於王猛何以獨惜此義二十七年吳弑其君僚何休曰不書闔廬弑為季子諱非也季子之不討闔廬者蓋勢不可也豈義之乎故託不忍父子兄弟相殘耳而春秋何為遂為之諱夫弑君之惡大矣尚可諱乎若弑君之惡而可諱何則不可諱乎季子賢者也賢者之心豈止於不欲父子兄弟相殘殺乎雖殘他人亦不可也苟焉春秋但順賢者之意而為之諱是一國有賢通國無罪也其大者至弑君而猶為之諱則其小者戕人賊人固不當問矣且季子之不討闔廬其義安在哉知力不足討而外託不忍者也然則季子之不忍親親之私恩也春秋之襃貶天下之公義而觀季子之行事茍非其力不足者則季子未免於貶何者私親親之愛而亂尊尊之序聖人不為也是以周公致辟二叔而不疑今季子何得擅以私愛廢公義哉然所以仲尼美之不貶者知其力不足而能外託親親若是者可謂達權矣此其指也以謂順賢者之意則可以縱弑君之罪不亦悖乎不亦悖乎三十一年黑公以濫來奔公羊云通濫也非也以叔術為賢賢既不足又懸隔數十世之外而通叛君之黒弓使當有國誰能信之乎漢諸儒辨此多矣是非紛拏者惑於辭也不若以大義格之使在度外且仲尼稱雍也可使南面居敬而行簡出門如見大賔使民如承大祭有如叔術之為者乎平居講道則多雍也退而作春秋反貴叔術是自相駮也其非聖人意亦可知矣定公二年雉門及兩觀災公羊曰兩觀㣲也又曰主災者兩觀也皆非也災有先後據見而書譬猶六鶂退飛也視之則六察之則鶂審之則退飛何至顛倒先後强出尊卑乎尋繹其意所以迷惑者以謂桓宫僖宫災不言及也彼自火並出燒之莫知次序故直以逺者序上耳又云曷為不言雉門災及兩觀其意以下新作雉門及兩觀為比亦非也新作可序上不可序下災可序下不可序上此亦制作之常理何足致疑而問之乎四年公及諸侯盟于浩油何休曰再言公者昭公數如晉不荅卒為季氏所逐定公初即位得與諸侯盟故喜録之非也春秋諸侯之㑹常事耳非王道之正也無故繁文推以為喜春秋何喜於此哉六年仲孫何忌公羊曰譏二名其意以謂二名難諱也古者盖雖君之名臣不諱矣父之名子不諱矣及至於周臣諱君之名子諱親之名然猶諱其死不諱其生諱其同不諱其嫌二名則不偏諱也仲尼之母名徴在言徴不言在言在不言徴自仲尼不偏諱二名況其他乎夫已不能諱二名反譏人之二名豈理也哉十年宋公之弟辰暨仲佗石彄出奔陳何休曰辰言暨者明仲佗石彄強與俱出非也若如休所言辰罪為輕何故反序上乎又何為明年入于蕭而書及乎按隐元年公羊云暨猶暨暨也不得已也未知不得已者為已不得已乎謂他人不得已乎以吾觀之則暨使他人不得已是也何者暨之意強也競也故曰暨暨以暨暨之故人不得已從之此可知矣昭七年暨齊平者是時魯數侵莒邑莒者齊兄弟之國又元年莒去疾自齊入莒有親親之恩故齊與魯怨不平也於是昭公外娶于吳而朝聘於楚深得其威因此以强逼齊為平春秋惡其貪殘不知恥而服人不以徳故書暨齊平不盡其事㣲以見意也今此暨仲佗石彄亦猶彼矣若如休言昭七年暨齊平者齊魯初未有惡何忽有平哉然說經者患各執一偏吾言及者自通文無汲汲也言暨者乃強人之文是我强人非人强我也彼人强我者如韓穿來言汶陽之田及晉處父盟之類皆自見矣用是求之及非汲汲暨非強我明矣且若必謂暨為我不得已者及晉處父盟亦可謂不得已矣則其言及何十二年薛伯定卒何休曰不日月者子無道當廢之而以為後未至三年失衆見弑故略之劉子曰推此言也而觀之其妄可勝記乎且公羊曰立嫡以長不以賢蓋防亂也如休所言更相違矣十四年衞世子蒯瞶出奔宋何休曰子雖見逐無去父之義此不達於變也諸侯以國為家四境之内力能專制之若蒯聵不去為靈公所殺則陷父于大惡今奉身逃竄者收小惡於已也以小易大其情甚順此非春秋所惡也哀公二年晉趙鞅帥師納衛世子蒯聵于戚公羊曰曷為不書入于衞何休曰據弗克納言于邾婁非也彼以弗克納故得言於邾婁耳此但得入戚未得入衛故不得言衛亦其理自然何以見父得有子乎凡父得有子子不得有父豈不誠道乎然於此經則害於義故其言則是也其於說經則非也三年齊國夏衛石曼姑帥師圍戚公羊以為可古人已有能辨者矣桓宫僖宫災公羊曰復立也不言復立見者不復見也非也古之人豈無所省文哉亦不若是而省之耳且必若云襄公作三軍舎中軍曷為獨書哉六年齊陽生入于齊陳乞弑其君舍公羊曰弑而立者不以當國之辭言之此其以當國之辭言之何為諼也非也如公羊之說陽生本正與商人相似弑而代立與商人相似陽生諼而弑之商人亦諼而弑之所以諼之雖殊所以為諼則同今何故陽生商人乖異若此哉公羊本欲引商人以求與之合而事同文别反更大繆乃知例苟不通者雖曲說愈偽也何休以為不舉陽生弑者諼成于乞然則是公子比之類也公子比棄疾冝效死勿聽故坐弑君陽生亦冝效死勿聽者也亦當坐弑君公子比首惡陽生不蒙首惡何哉七年秋公伐邾婁八月己酉入邾婁以邾婁子益來公羊云内辭也使若他人然非也邾魯相近故初秋伐之八月又入之此自兩事理當並書無取於内辭也入邾婁使若他人猶有可諉以邾婁子益來又可云他人乎又曰曷為不言其獲内大惡諱也亦非也諸侯擅入人之國為大惡可矣戰而獲人獲者則大惡矣獲之者豈可同其科哉又此自入而以歸不得以獲解也吾既言之矣八年宋公入曹以曹伯陽歸公羊曰不言其滅諱同姓之滅也非也當此之時魯人自救不暇豈有不救同姓之滅春秋遂責之乎且責魯不救而諱曹之滅縱失宋公之惡茍責無罪之魯甚非禮也十三年公㑹晉侯及吳子于黄池公羊曰吳主㑹也按吳主㑹必非晉所願也春秋宜曰公㑹晉侯暨吳子于黄池則與公羊例合矣今乃曰及吳子此其晉魯汲汲我欲之者邪又曰吳在是則天下莫敢不至也何休以謂云爾者欲為魯侯殺恥故不書諸侯也吾謂春秋審欲為魯侯殺恥者書諸侯乃宜矣無為乃没之也十四年西狩獲麟公羊曰春秋何以始乎隱祖之所逮聞非也聖人作經為天子法不苟記祖所逮而已盖不得聖人之意而言之也且如所言祖者謂曽祖乎髙祖乎如謂曽祖孔子曽祖防叔則孔父三世之孫如謂髙祖孔子髙祖祁父亦孔父二世之孫孔父死於桓二年其孫不得見隱審矣計防叔祁父之時應在閔僖之間春秋則當起於閔僖不宜始隐公也凡公羊之書其乖謬大體麤正之矣至於委曲㣲密似是而非索言之則不可勝言非講學辨論者不能及也故闕焉以俟知者亦將有起予者乎云爾春秋權衡卷十三
