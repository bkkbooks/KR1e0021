body:
  text: 春秋權衡卷十四宋劉敞撰隱公元年春王正月榖梁曰雖無事必舉正月謹始也按此實有事者以見隱公讓故不書公即位爾何謂無事乎三月公及邾儀父盟于眛榖梁曰及者内為志焉爾非也及齊髙傒盟及晉處父盟豈復内為志者邪又曰儀字也父猶傅也男子之美稱也言善其結信於魯故以字貴之亦非也春秋來會於魯者多矣不聞悉可貴也若以初入春秋故得貴之則桓十七年㑹邾儀父盟于趡又何為乎且春秋之作貶諸侯明王道以救衰世者也凡記盟㑹者於王法所不得為皆貶也甫當貶之何有於襃且以私結盟之故而襃之後有善焉何以加其身鄭伯克段于鄢榖梁曰克能也何能爾能殺也非也未有一字轉相訓詁而可并兩義者也誣人已甚矣及宋人盟于宿榖梁曰兩卑者也吾謂二國為盟非兩卑者所定就有兩卑者盟春秋亦不書之何也事小而多不信可以略故也公子益師卒榖梁曰日卒正也不日卒惡也非也公孫敖仲遂季孫意如豈正者乎而皆日叔孫得臣不聞有罪而反不日皆妄也二年公㑹戎于潛榖梁曰㑹者外為主焉爾非也若令内為志者可曰公及戎于潛乎五月莒人入向榖梁曰入者内弗受也此義踈矣凡將兵攻人之國而能勝之入焉者斯謂之入矣非必以内弗受觧也有入人之國而可以受之者乎然則榖梁今所言者歸入之例也妄并之矣無駭帥師入極榖梁曰入者内弗受也又曰不稱氏者滅同姓貶也按入則不得謂之滅而榖梁先既以入觧之末又以滅通之此似榖梁作傳時自以入為義後竊見公羊之書以入為滅又因注焉者也故兩義雖不相合而猶並存也又八年無駭卒不稱氏榖梁亦先曰隐不爵大夫也又云或說曰故貶之也此兩者皆出公羊又皆係之初說之後明榖梁私見公羊之書而竊附益之云爾不然無為兩事各自終始反戾也紀履繻來逆女榖梁曰以國氏者為其來交接於我故進之也非也諸侯婚姻聘使相往來亦常耳何妄得進之且履繻國氏何異鄭詹而曰進之乎謂履繻進之者詹亦進之乎紀子伯莒子盟于密榖梁兩說皆無足取者夫人子氏薨榖梁曰不書𦵏夫人之義從君者也非也隱薨在十一年今夫人薨相去九年可得預知君當不葬而先除其葬乎夫人之義雖曰從君至於卒𦵏非其所能自制也奈何以必從君限之哉文姜親與弑君春秋猶書其葬況於此非弑君之人乎三年日有食之榖梁說晦朔之例雖文與公羊異而謬與公羊同吾既言之矣宋公和卒榖梁曰諸侯日卒正也非也齊小白晉重耳皆可謂正乎若曰篡明則不疑者此妄說矣本設日不日例者非復有他義也明正不正而已耳苟正者日不正者不日則其義可信而無疑今正者日篡明者亦日不知春秋何能不憚煩于篡明之人而必知其日哉若篡明之人乃去其日豈不益至公至明哉徒為此紛紛何也又曹伯使世子射姑來朝則曹伯之嫡也莊二十三年曹伯射姑卒有月無日此復何邪𦵏宋繆公榖梁曰日葬故也危不得葬也非也宋繆公之𦵏有何危邪春秋日葬者多不必皆有危也但欲以日月為例而不知理有不可者以謂人雖有難已者而事無可據譬如說神怪者也夫以說神怪自況人亦以說神怪況之矣曽何足致詰乎四年莒人伐杞取牟婁榖梁曰言伐言取所惡也非也若不言伐則牟婁為把邑不明理自當爾何惡之有若言伐言取然後云惡則凡伐而不取取而不伐者皆不惡之哉衛州吁弑其君完榖梁曰大夫弑其君以國氏者嫌也弑而代之也非也宋督宋萬亦可云弑而代之乎公子商人豈非弑而代之乎而督萬氏國商人不氏國何也公及宋公遇于清榖梁曰及者内為志焉爾非也若外為志可曰公㑹宋公遇于清乎又曰遇者志相得也按八年傳不期而㑹曰遇若内為志又志相得非不期也翬帥師㑹宋公陳侯蔡人衛人伐鄭榖梁曰不稱公子貶之也非也欲貶翬者宜於此稱公子既弑君而除之無為先事而貶也觀傳此意與公羊同病吾既言之矣衛人殺州吁于濮榖梁曰其月謹之也吾為春秋苟不舉月則勿謹之乎何必為此文哉五年考仲子之宫榖梁曰考者成之也成之為夫人也非也若成之為夫人經當曰考夫人子氏之宫今但曰仲子非夫人明矣又曰仲子者惠公之母隱孫而修之非隱也亦非也若實非隱經當曰立仲子之宫今曰考宫非非隱明矣實說仲子之卒在惠公末年故元年天王使宰咺來歸賵後其葬期也不謂仲子之卒在惠公之前而平王因惠公之喪以賵仲子也為榖梁者誤其前後故謂隱公追祀惠公之母其實仲子與惠公同年而卒故隱公疑仲子未嘗祭於子不可便已欲通其意作宫祭之終已而已春秋許其知禮之變故以考宫書不以立宫書也初獻六羽榖梁曰始僣樂矣尸子曰始厲樂矣劉子曰言僣樂是也詎得厲樂乎螟榖梁曰甚則月不甚則時劉子曰此亦說神怪之比也實甚而時無以詰之實不甚而月亦無以詰之若因而更之曰甚則時不甚則月人亦莫辨也公子彄卒榖梁曰隱不爵命大夫其曰公子彄何也先君之大夫也非也隱雖讓國當此之時實魯君也爵命大夫何有不可哉周公攝政猶專廢置天下諸侯况隱公明為魯君乎又不知若隱公者苟爵命大夫則不成讓國乎何其疑隱公之小也宋人伐鄭圍長葛榖梁曰伐國不言圍邑非也有伐者有圍者理當並書不得以輕重相覆也又曰苞人民驅牛馬曰侵斬樹木壞宫室曰伐亦非也古之行師不必盡如此其暴也或問罪或討亂師之所至而百姓不擾猶謂之侵伐也亦可如傳所言名之乎春秋雖亂世㑹有一國以道侵伐不苞人民不驅牛馬亦不斬樹木壞宫室者春秋何以書之夫桓文之師誠有節制也其所侵伐庸得盡如傳所言哉又有可疑即復一國以兵加人即苞其人民驅其牛馬矣又斬其樹木壞其宫室春秋可遂兩書侵伐乎六年鄭人來輸平榖梁曰輸平者不果成也其意以謂春秋前魯與鄭平至四年時翬帥師伐鄭故鄭人今請絶前平也非也凡云平者蓋兩國約不相背云爾今魯以伐鄭平絶可知若鄭人不來輸平者寧可謂舊平未絶乎有伐人之國而猶自謂有平乎然則魯鄭之平不待告而絶亦明矣又安有不果成事乎七年叔姬歸于紀榖梁曰其不言逆何也是也知此叔姬必非媵也故得見于經矣又曰逆之道微無足道焉爾非也不言逆者則君親迎者也常事不書故不舉君也范甯以叔姬者伯姬之媵也若然榖梁子不當問其不言逆何也禮豈有夫逆妾媵者哉胡為問之其問之也乃知叔姬非伯姬之媵也滕侯卒榖梁曰滕侯無名狄道也非也春秋諸侯卒或名或不名者多矣豈盡狄道哉不可信之語此故為甚城中丘榖梁曰城為保民為之也民衆城小則益城益城無極故譏也非也若民衆城小可得勿城乎榖梁明知城為保民為之而又嫌其為民衆益城自相反戾矣齊侯使其弟年來聘榖梁曰其弟云者以其來接于我貴之也非也諸侯交聘亦常事耳何遂分别貴賤哉戎伐凡伯于楚丘以歸榖梁曰國而曰伐此一人而曰伐何也大天子之命也不知榖梁之意謂此伐者真亦斬樹木壞宫室邪毋乃直以大天子之命進之言伐邪若真斬樹木壞宫室者此一人之身安得樹木宫室哉若直以大天子之命進之言伐者又未知戎所以施無道于凡伯之身者實何事而春秋直以伐易之也今注者則以謂戎執凡伯也然則變執言伐爾而傳又言以歸猶愈乎執也若伐非執者如傳言可矣今伐則執也譬如曰戎執凡伯于楚丘以歸云爾安得猶愈者乎且以歸何以能愈于執乎又曰戎者衛也如此乃春秋縱失衛侯之惡歸罪于戎也八年鄭伯使宛來歸邴榖梁曰名宛所以貶鄭伯非也魯為大國猶有未命大夫獨稱其名者況如鄭小國乎宿男卒榖梁曰未能同盟故男卒也審如傳言又何以知其非狄道而無名者乎公及莒人盟于包來榖梁曰可言公及人不可言公及大夫非也莒人即莒大夫㣲故稱人耳若可言人不可言大夫及晉處父盟何不曰及晉人盟乎九年天王使南季來聘榖梁曰聘諸侯非正也范寗矯之是矣三月癸酉大雨震電榖梁曰雨月志正也非也此不著癸酉則不足以見八日之間再有大變莊七年辛卯星隕如雨不日又不見夜及夜中葬定公雨不克𦵏不日又失𦵏期理自合日豈關不正乎僖二年六月雨者無他卓詭書月足矣豈關正乎十年公敗宋師于菅榖梁曰内不言戰舉其大者非也此語乃與公羊相似吾于公羊既言之矣十一年公薨榖梁曰隱十年無正隱不自正也非也無事偶不書正月耳不足以為據桓公元年春王榖梁曰桓無王其曰無王何也桓弟弑兄臣弑君以為無王之道非也弟弑兄臣弑君見矣雖書王獨可謂之有王乎鄭伯以璧假許田榖梁曰假不言以言以非假也諱易地也非也實以邴易許者豈可云璧假乎且經但言璧假諱易為假已足矣諱邴為璧何差于罪乎且令實以璧易許者何以為文乎二年春王正月榖梁曰桓無王其曰王何也正與夷之卒也非也但不書王與夷之卒遂不正乎七月紀侯來朝榖梁曰朝時此其月何也桓内弑其君外成人之亂于是為齊侯陳侯鄭伯討數日以賂已即事而朝之惡之故謹而月之非也六年冬紀侯來朝猶是前紀侯耳猶是此桓公耳行不加進惡不差減而紀侯過而不改是謂過矣其責宜深深則宜日反書時何哉是豈春秋不惡之乎公至自唐榖梁曰桓無會其致何也逺之也非也隱亦無㑹何逺之有三年夏齊侯衛侯胥命于蒲榖梁曰相命而信諭謹言而退以是為近古也非也吾于公羊既言之矣四年春正月公狩于郎榖梁說曰春而曰狩蓋用冬狩之禮非也春之正月夏之十一月云狩是也事在周禮榖梁子自顛倒之耳天王使宰渠伯糾來聘榖梁說與公羊相近非也五年正月甲戌己丑陳侯鮑卒榖梁曰何為以二日卒之陳侯以甲戌之日出己丑之日得不知死之日故舉二日以包也非也國君潛行獨出安所之乎若入于民臣之家則必有知者若獨死曠野是非人情且何以能厯十六日而人不覺乎依倚古事人所不見遂肆意妄說不顧道理甚可怪也天王使任叔之子來聘榖梁曰任叔之子者録父以使子也故㣲其君臣而著其父子非也文稱天王使矣何謂録父使子乎又何謂㣲其君臣乎又曰父在子代仕之辭亦非也若子擅代父仕者貶任叔可矣今曰天王使任叔之子既曰天王使之矣豈父在使子自代者邪若曰天王使任叔子代父仕者則是天王已命任叔之子矣無所復譏且不得繫任叔言之也父老而使其子仕亦常事耳天王既以命之與衆卿士何異哉而榖梁又不當言録父以使子蔡人衛人陳人從王伐鄭榖梁曰舉從者之辭也其舉從者之辭何也為天王諱伐鄭也非也直言從王伐鄭文順事明可不煩觧矣又妄云舉從者之辭何益哉且安見諱伐鄭之義哉所謂無病自灸者六年大閱榖梁曰平而修戎事非正也蓋以觀婦人也非也但曰大閱安知觀婦人乎蔡人殺陳佗榖梁說與公羊相近吾既言之矣子同生榖梁曰疑故志之非也聖人豈至此乎若聖人疑之誰復不疑之乎且詩云展我甥兮展者信也詩人賢者信魯莊公為齊侯之甥何有仲尼反疑其先君為齊侯之子乎就今當時國人有疑之者是國惡無大于此矣聖人曷為明明揭之乎七年焚咸丘榖梁曰其不言邾咸丘疾其以火攻與公羊說相近吾既言之矣榖伯綏來朝鄧侯吾離來朝榖梁曰失國也與公羊相近吾既言之矣八年正月己卯烝榖梁說與公羊同非也祭公來遂逆王后于紀榖梁曰其不言使不正其以宗廟大事即謀于我也非也若不正其即謀于我者言遂逆足矣不言使何哉言使豈妨其即謀于我乎十年王正月曹伯終生卒榖梁曰桓無王其曰王何也正終生之卒也非也五年陳侯鮑卒亦在正月何以不書王正之乎公㑹衞侯于桃丘弗遇榖梁曰弗遇者志不相得也非也此公與衛侯約㑹于桃丘公後其期矣恥失信故託行而不相遇者也齊侯衞侯鄭伯來戰于郎榖梁曰來戰者前定之戰也不言其人以吾敗也不言及為内諱也此皆非也若來戰為前定之辭者自無縁復出其人且言及也豈可曰某人及齊侯衛侯鄭伯來戰于郎乎又豈可曰齊侯衛侯鄭伯及某人來戰于郎乎且凡結日偏戰皆前定之戰也何不一一言來戰乎然則不言其人不言及者非以吾敗也來戰者又非以前定也皆妄說矣十一年宋人執鄭祭仲榖梁曰宋人者宋公也其曰人何貶之也此非榖梁例也榖梁之例常以稱人執之為是稱侯執之為非向令書宋公執者得無云斥宋公以執祭仲乎且齊人執鄭詹何以獨不曰貶乎文同而義異何哉鄭忽出奔衛榖梁曰其名失國也非也春秋失國者多矣豈皆名之乎十二年丙戌公㑹鄭伯盟于武父丙戌衞侯晉卒榖梁曰再稱日決日義也非也此飾說爾及鄭師伐宋丁未戰于宋榖梁曰非與所與伐戰也不言與鄭戰恥不和也非也言之違理乃至于此乎茍能讀春秋者皆足以知之矣十三年齊師宋師衛師燕師敗績榖梁曰戰稱人敗稱師重衆也非也齊人伐衛衛人及齊人戰衛人敗績何為獨不重衆乎且春秋將卑師衆稱師此常例矣無為忽改十四年壬申御廩災乙亥嘗榖梁曰御廩之災不志非也粢盛焚焉何以不志乎又曰以其未易災之餘而嘗志不敬也亦非也若壬申之日而災乙亥之日而嘗嘗之粟出廩久矣乃其未災者何謂災之餘乎又曰夫嘗必有兼甸之事焉若此者明粟非災之餘可也欲明以為災之餘則非也十五年㑹于袲伐鄭榖梁曰地而後伐疑辭也非其疑也非也此先㑹後伐耳亦何疑辭哉且此又非出于仲尼者也記事之體也十六年公至自伐鄭榖梁曰桓無㑹其致何也危之也非也去年伐鄭榖梁云非其疑也者似言諸侯為忽討突也若非為忽討突則不得云非其疑矣今云危之者又似言諸侯乃助突攻忽也若非助突攻忽則亦不得云危之矣二者誰能辨乎衛侯朔出奔齊榖梁曰朔之名惡也天子召而不往也非也何以不援鄭忽例自為失國名之乎十八年公㑹齊侯于濼公與夫人姜氏遂如齊榖梁曰濼之㑹不言及夫人何也以夫人之伉弗稱數也非也濼之㑹伉故不書遂如齊書矣可云不伉乎要之濼會時夫人自不在㑹㑹畢公更召夫人與之如齊耳非他也葬我君桓公榖梁曰君弑賊不討不書𦵏此其言𦵏何也不責踰國而討于是也非也父之讎不與共戴天豈限國哉若以齊強魯弱量力不討故君子不責是復讎者常行于柔弱而困于强禦也不亦妄乎莊公元年夫人孫于齊榖梁曰接練時録母之變始人之也非也夫人前隨桓公之喪還國今復出奔爾豈録母之變横生孫文乎如此是聖人率意作經不復記事實也單伯逆王姬榖梁曰命大夫故不名也非也若單伯為王朝大夫者如榖梁說可矣今單伯乃魯大夫雖命於天子猶魯臣也君前臣名何得不名哉築王姬之館于外榖梁以謂變之正也非也魯本自當以仇讎不可接㛰姻上告諸天子不當黙黙然受命此乃春秋譏其捨大䘏小以謂未盡臣子道者也何謂變之正乎凡變之正者謂亡於禮者之禮若權死亡者也非謂可為而不為以傷禮害義者也若莊公者可謂變於邪矣未見變於正也王使榮叔來錫桓公命榖梁說與公羊相似非也齊師遷紀郱鄑郚榖梁曰紀國也郱鄑郚國也非也計齊一師必不能並遷兩國又春秋自當分别以見滅兩國之惡不當合之也辛未取郜辛巳取防兩邑爾内小惡爾猶惡而謹之況兩國乎況外大惡乎二年公子慶父伐於餘丘榖梁曰於餘丘邾邑也公子貴矣師重矣而敵人之邑公子病矣非也春秋之戰伐多何獨病此乎若伐人之國則勿病乎且必若云是果於伐國不果於伐邑也何以為懲且勸乎又曰其一曰君在而重之也此似晚見公羊之說而附益之者矣三年𦵏桓王榖梁曰改葬也非也若改葬何為不言改乎謂改不可言改卜牛何以言改也紀季以酅入于齊榖梁曰入者内弗受也非也此自往入之入而非歸入之入若可受者遂云歸於齊乎其守文而不達理至如此且季之以酅入齊當以紀侯使之為說不然是季專土盜邑以畔其君也何以得字於春秋乎而穀梁曰入于齊者以酅事齊是真謂季畔矣吾未見其善也四年紀侯大去其國榖梁曰不言滅而曰大去者不使小人加乎君子也非也就令言滅滅人之國豈非不使小人加乎君子哉又變滅言大去其義不類何休以榖梁為縱失襄公之惡是矣鄭康成強為文過吾無取焉齊侯𦵏紀伯姬榖梁曰吾女也失國故隐而葬之非也若但云𦵏紀伯姬者如榖梁說可矣今曰齊侯𦵏紀伯姬此非常文也此其重在齊侯不在吾女甚明公及齊人狩于郜榖梁說與公羊相似非也五年公㑹齊人宋人陳人蔡人伐衛榖梁曰是齊侯宋公也非也安知其不是㣲者乎若實齊侯宋公而謂之人即實㣲者又何以書乎六年齊人來歸衞寶榖梁曰分惡於齊也使之如下齊而來我然非也固齊人歸我耳何分之有七年星隕如雨榖梁以如猶而也言星隕且雨也非也春秋記星隕為異耳夜中而雨何足記乎又曰著於上見於下謂之雨以言雨螽則可也以言雨雪則何著於上之有又曰著於下不見於上謂之隕以言隕石可也以言星隕則何不見於上之有秋大水榖梁曰髙下有水災曰大水非也假令大水終不能令髙下皆有但没城邑已劇矣況山岳不可没則大水不必髙下皆有也春秋權衡卷十四
