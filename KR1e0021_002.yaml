body:
  text: 春秋權衡卷二宋劉敞撰七年叔姬歸于紀杜氏云伯姬之娣待年者也非也春秋不言内女爲媵於諸侯者以媵卑不足言也叔姬何以得書邪苟云史之記事有詳有略又何以爲春秋滕侯卒左氏云不書名未同盟也非也嘗同盟者卒未必皆名未嘗同盟者卒未必皆不名而左氏又云赴以名則書之不然則否若實從例則不當從赴若實從赴則無用設例今進不必從赴退不必從例徒用是紛紛也且吾論同盟諸侯卒不必書名何者欲以名别同盟邪則同盟已見于經不必書名乃知之也然必欲謂同盟乃書名者似見春秋諸侯盟㑹多欲因此推言之爾禮云諸侯不生名生名不可死名乃常也唯天子崩告於諸侯則不名諸侯薨赴于諸侯無不名其不名是有僭君之心非謂不同盟故略之也大凡天下有道王巡狩四岳則四方諸侯各隨其方伯州牧朝於天子以聽天子黜陟故一方諸侯共事方伯一州諸侯共事州牧死則相哀患則相䘏朝聘通焉赴告及焉苟異方殊州生不共事患不同憂則朝聘不相通赴告不相及左氏所云同盟則赴以名蓋緣此也言同盟赴以名非也同盟則相赴是也戎伐凡伯于楚丘以歸左氏云戎鳴鐘皷以伐天子之使非也若謂鳴鐘皷則得云伐苟戎不鳴鐘皷則可云戎侵凡伯乎侵伐雖以鐘皷爲辨要當施之國邑非施之一夫也八年鄭伯使宛來歸祊杜氏云宛鄭大夫不書氏未賜族非也苟取不氏者以未賜族說之耳人誰知之翬溺則以爲貶柔挾則以爲未賜族僑如及遂則以爲尊夫人宋督宋萬之比則以爲從赴人豈能知之乎我入祊杜氏云桓元年乃卒易祊田知此入祊未肯受而有之非也經云入祊者旣入之矣又何未肯受而有之乎若魯未肯受祊經書其入是仲尼誣君之惡也原杜氏之意蓋見桓元年傳云鄭伯以璧假許田爲周公祊故也此自傳誤隱公時鄭人歸祊者鄭自欲與隱公也桓元年以璧假許田者桓公以許田與鄭眞易璧玉也傳乃并而言之謂鄭人以祊易許而不顧隱八年已有我入祊之文且許田者魯本受封之地詩云居常與許是也地名與國同者魯多有之莊公築臺于秦築臺于薛豈眞近秦近薛哉傳見許國近鄭不悟魯是地名許田因謂鄭欲得近許之田故以祊易許混合兩事并爲一說而杜氏遂倍經信傳扶成其僞可謂有功于左氏矣未可謂知經也公及莒人盟于浮來杜氏云莒人微者不嫌敵公侯故直稱公例在僖二十九年今按僖二十九年翟泉之盟傳曰在禮卿不㑹公侯㑹伯子男可也然則傳例以卑不㑹尊杜意反謂卑可以㑹尊也公侯之卿不可當公侯子男之微者而當公侯乎且卿不㑹公侯非爲嫌也爲其不敵也卿可以㑹伯子男非爲不嫌也爲其足相敵也若以微故不嫌敵者卿不嫌于公侯而嫌于伯子男不可㑹伯子男可㑹公侯也無駭卒傳曰羽父請族公命爲展氏杜云無駭公子展之孫非也若無駭眞公孫之子當其繼大宗也賜氏久矣何待其死而賜氏乎且禮云公孫之子以王父字爲氏曾非言其死而後氏之也然則無駭固公孫也羽父請族者爲無駭之子請族也子展稱公子無駭稱公孫無駭之子未有稱也此其所以請之也若必公孫之子死然後賜族則無駭爲終身無所氏也故曰不明於禮矣九年大雨震電傳曰大雨霖以震凡雨自三日以往爲霖杜氏云此傳解經書霖而經無霖字經誤也非也經有電無霖傳有霖無電傳不解經經反誤哉然丘明不宜革電爲霖蓋其所據簡䇿錯誤不能決之於經直因循舊記而已杜氏遂專謂經誤黨於左氏至如此不已惑乎且左氏之言未必可信也三日之雨豈非常者乎此固經所未嘗書者若以雨三日已往而必書之是春秋二百四十二年之中三日雨者一而已是豈足信也庚辰大雨雪左氏云平地尺爲大雪亦非也按左氏諸言凡者皆史書之舊章然則此大雨霖大雨雪亦皆舊章常例所必書者也則春秋固應書此二者冝甚多矣何以言之三日雨平地尺雪皆非可怪者也曷爲二百四十二年之間獨此而一哉用此推之左氏凡例亦不必皆史書之舊也乃丘明推己意以解經爲凡爾其合於道者則周公之典又仲尼所取也其考之不合於經如此類者則其臆議而復斷之加凡於其首云爾非周公之典仲尼本意也傳曰宋公不王鄭伯爲王左卿士以王命討之伐宋宋以入郛之役怨公不告命公怒絶宋使推驗此文及其前後知宋之怨公不獨以不救入郛也何者宋魯相睦而同怨鄭鄭伯伐宋宋人請救而使者失辭故公不肯救宋明年則鄭人來輸平此必鄭伯知公與宋有隙也鄭雖輸平公亦未許又因爲宋伐邾則未知公欲結宋邪欲市於鄭也而宋尚銜之故明年鄭遂致其祊田公因受之許其爲平自然宋人怨公與鄭和而不告命也宋之怨公不以入郛明矣其端自入郛起則誠有之然此傳事爾吾聊明之十年公㑹齊侯鄭伯于中丘左氏云癸丑盟於鄧爲師期按經無盟鄧之文杜氏以謂告㑹不告盟非也國史所記皆時君政事政事旣行則皆書之豈待告廟乃書哉唯公行而還告廟則致不告廟則不致此乃君有境外之事歸當告致也不謂政事大小一一告廟也公盟則書盟㑹則書㑹豈在告廟乃書乎明此本無盟鄧之事左氏所得記注橫生此語而杜氏飾說之又據其癸丑謂經書二月誤傳書正月眞皆倍經任傳不可信者也翬帥師㑹齊人鄭人伐宋杜氏云翬不待公命貪㑹二國之君疾其專進故去氏非也按元年公子豫亦不待公命帥師而出彼則都不書姓名此但去氏而已輕重頗矣非春秋意也辛未取郜辛已取防左氏曰公㑹齊侯鄭伯于老桃公敗宋師于菅庚午鄭師入郜辛未歸於我庚辰鄭師入防辛巳歸於我此皆不實也經無㑹老桃之事又但書云敗宋師取郜取防曽不言鄭伯居閒者豈得如傳言哉且如傳言春秋爲縱漏鄭伯取邑之罪反移之其君也爲人臣子固如此邪傳又曰君子謂鄭莊公可謂正矣不貪其土以勞王爵亦非也鄭雖以王命討宋得其土地當歸之王鄭何得專而有之專而裂之邪專而有之專而裂之不臣甚矣反謂之正乎周之末世人尤不知義哉其以此類爲正也此丘明不學於仲尼之蔽也宋人蔡人衞人伐戴鄭伯伐取之左氏曰取三師焉非也三國之師衆矣鄭何以能悉取之邪且三國伐戴爾不入戴也鄭伯圍戴爾何以能取三師邪假令三國已擊戴居之鄭來圍戴則三國亦各自去戴非其社稷所寄也何爲共守此地邪是不足信然爲此說者蓋讀春秋而不曉其趣乃飾而說之耳十一年滕侯薛侯來朝左氏曰公使羽父請於薛侯曰周之宗盟異姓爲後乃長滕侯皆非禮也晉侯使荀庚來聘衞侯使孫良夫來聘魯尚不敢同日而與之盟豈有南面之君來朝而令同日並見邪異姓爲後固應謂朝天子時耳魯不當旅見二君又不當引天子自况傳曰鄭伯使許大夫百里奉許叔以居許東偏君子曰鄭莊公於是乎有禮非也許若有罪鄭已破其國即當請王而立君許若無罪鄭固不當妄破其國妄逐其君今許罪不可知而專爲威福政不由王而制於己私其邊圉之固皆大罪也何謂知禮乎傳曰公之爲公子也與鄭人戰于狐壤止焉按謂之公子則非太子也因此觀之知左氏之意謂惠公不以隱爲太子而以桓爲太子隱攝桓位也而杜氏謂隱公追成父志以國讓桓蓋非左氏之意矣然其非左氏之意乃實春秋意也公薨左氏云不書葬不成喪也非也桓本濳謀弑君欲人不知之故歸罪寪氏豈更令其喪禮不成以自發露邪此乃事之不然又明左氏初不受經於仲尼不知薨不書葬之意桓公元年鄭伯以璧假許田左氏曰爲周公祊故也非也祊自祊田許自許田以祊易許改云以璧易許乃是爲鄭伯諱不爲魯公諱也且入祊久矣經有明文何故至此乃卒易祊田乎若實以祊易許則隱八年我入祊爲春秋増誣其君若實以祊易許強諱云璧假是又春秋諱鄭不諱魯實說祊者鄭所以平怨於魯也許者鄭見桓篡位利得其地以璧易之桓旣不肖貪嗜寶貨又逼初立欲得鄭歡故聽其易也許則詩所謂居常與許蓋周公受封之地非謂近許也傳本誤謂許田者近許之田又見鄭許鄰國數相侵伐疑鄭欲求近許之田又見鄭前入祊遂牽引傅致成此說爾不然無爲倍經害義也故學者莫若信經莫若信義秋大水左氏曰凡平原出水爲大水非也水之爲害何必平原出之乎連雨不解禾稼不成所在汎濫亦大水也江河逆溢壞民廬舎亦大水也山岳崩坼泉源發洩往往爲害亦大水也至於平原出水蓋最鮮爾限此爲凡亦非周公仲尼之意也二年宋督弑其君與夷及其大夫孔父杜氏云孔父稱名内不能治其閨門外取怨於民身死而禍及君故貶之非也仇牧荀息皆稱名春秋雖以字爲襃然己名其君於上則不得字其臣於下此所謂君前臣名禮之大節也用杜氏之意者乃當名君字大夫顚倒人倫乎其不通經則亦已矣又誣彼三人以爲有罪不亦蔽惑甚乎㑹于稷以成宋亂杜氏云成平也非也春秋有輸平又有曁齊平又有公及齊侯平莒及郯皆直稱平若春秋欲諱受賂之惡言其平宋亂乃是矣今不曰平而曰成此豈平之謂乎且按傳曰㑹于稷以成宋亂爲賂故立華氏也此則傳以受賂立華氏解經之成宋亂也豈不明哉把侯來朝左氏曰杞侯不敬歸乃謀伐之九月入把非也按公羊經紀侯來朝竊以謂當作紀不當作杞春秋雖亂世至於兵革之事亦愼用之杞來朝魯有少不敬未冝便入其國也左氏誤紀爲把遂生不敬之說三年春正月杜氏云不書王者時王不頒厯非也十七年十月朔日有食之傳云不書日官失之也謂日官推厯不得其正耳非謂不班厯也何爲其年亦不書王乎若謂官失之者即不班厯矣莊十八年春王三月日有食之亦不書朔者亦當不書王而反書王何哉故以桓十七年爲不班厯則與莊十八年不合且傳云官失之者是實班厯而有失耳非不班厯明矣由是觀之不書王者不爲厯也齊侯衞侯胥命于蒲左氏曰不盟也非也兩君相聚必有故矣雖復不盟猶應以㑹書之何忽謂之胥命乎且胥命善乎不善乎若善也不見所善兩君相聚而不盟何善也若不善也不見所不善兩君相聚而不盟何不善也然則胥命者固常㑹也何足異而書之哉公子翬如齊逆女左氏曰脩先君之好故曰公子非也春秋非脩先君之好而稱公子者多矣何必脩先君之好乃稱公子哉若脩先君之好乃稱公子者翬帥師適其冝矣無謂疾之去氏也四年天王使宰渠伯糾來聘左氏曰父在故名非也武氏子來求賻言世武氏也仍叔之子來聘言幼弱也襃貶不旣明矣乎若糾擅攝父位自取冢宰者其貶猶應甚彼不得但以父在名之而已捨大責小非春秋也又宰咺歸賵小惡爾左氏以謂宰官咺名也以名配宰貶之甚者矣今糾乃自攝父位不待王命王官之宰其任豈小哉春秋貶之反輕於咺何邪杜氏曰渠氏伯糾名此亦非也渠伯爵也糾名也凡說經者冝以逆順深淺爲義得其義是得聖人之意得聖人之意者雖有餘說勿聽可也不得其意則牽於衆說牽於衆說而逆順深淺失義之中是有功于衆說而非求合於聖人也故吾求合於聖人而不敢曲隨於衆說聖人之意可求也求在義而已矣五年甲戌己丑陳侯鮑卒左氏云陳亂再赴非也陸淳論之矣傳曰祝聃射王中肩夜鄭伯使祭足勞王且問左右杜氏云傳言鄭志在茍免王討之非此言不可以訓於世奈之何其以解經哉且是使亂臣賊子喜也何謂懼乎大雩傳曰書不時也非也龍見而雩常事爾遇旱而雩非常也非常當書書爲旱發非爲過時發也且此下書螽螽之爲物常因旱而生則其雩非失時者自爲旱故也又曰啓蟄而郊亦非也魯郊以周正周郊以夏正不專啓蟄而已六年實來左氏云自曹來朝書曰實來不復其國也非也州公如曹如知其國有難必不如曹矣假令度其國危而遂不復方其來朝猶是州公爾何得不言乎盛伯來奔實太子也徒君以諸侯逆之遂以盛伯書此親左氏義豈嘗顧盛太子不復其國奪其伯爵哉則州公旣行朝禮矣何以獨不書朝夫公之與州公亢朝禮猶與盛太子亢諸侯禮也盛太子以公故故書盛伯州公豈不得以公故故書朝邪且盛伯不復其國州公亦不復其國其不復其國也均而一與一奪焉可以信左氏之說非也大閱左氏曰簡車乗也杜云蓋以備鄭此以鄭事相接續爲說爾非必然也蔡人殺陳佗杜氏云佗立逾年不稱爵者未㑹諸侯非也雖㑹諸侯庸得不討其篡乎吾已語於州吁之事矣七年焚咸丘杜氏曰以火田也非也禮有火田豈得譏其盡物哉又文稱焚咸丘咸丘乃邑也邑非田則不得但謂火田也即實以火田春秋譏之者當如狩于郎狩于郜蒐于紅之例加于以繩之矣今乃云焚咸丘此其意豈譏火田而己者乎榖伯綏來朝鄧侯吾離來朝左氏曰名賤之也杜氏云僻陋小國賤之禮不足故書名非也榖伯爵鄧侯爵侯伯之爵豈小哉且上杞侯來朝雖不敬猶不書名計杞之國又非大於鄧榖也彼何故不名且先王制禮不敢遺小國之臣豈嘗惡其僻陋而賤之哉此非春秋之意也又經書夏朝傳云春朝此傳所據者以夏正記事也杜云以春來夏乃行朝禮爲之蔽短非實矣八年祭公來遂逆王后于紀左氏曰禮也非也若其得禮文何以無天王使祭公乎先儒論天子親迎多矣或以謂王者無敵不當親迎或以謂在洽之陽造舟于渭即親迎之事然以禮言之王者不親迎非也謂造舟親迎此文王事紂時制不可通於天子矣然則天子娶后當使同姓諸侯主其辭命而天子之卿逆之父母之國諸侯送之至於京師舎而止然後天子親迎以入也凡諸侯來朝天子猶駕而逆焉況於王后所與共事天地宗廟繼萬世之重者哉其親迎不疑矣九年紀季姜歸于京師杜氏云書字者伸父母之尊二傳亦然皆非也紀季姜歸于京師爾何忽伸父母之尊乎彼齊侯送姜氏于讙則可言曰雖爲鄰國夫人猶曰吾姜氏當是時齊侯親送之故必去夫人以伸父母之尊今此紀侯不親送女無故伸父母之尊義不相符也又三家所以云云者見其不稱氏而稱字耳此猶知二五而不知十也但言姜氏歸于京師則似别一姜氏故須冠紀以别之旣冠紀以别之不得復云紀姜氏也婦人以字配氏乃其常例譬猶伯姬叔姬矣然齊侯送姜氏不言孟姜者孟姜即魯之夫人魯之臣子所不敢字也魯於季姜亦臣子耳何故字之魯雖臣子猶諸侯也有不純臣之義魯又主㛰文復不可言紀姜氏故得書紀季姜也此聖人作經隨所深淺各盡其義而不相亂也曹伯使其世子射姑來朝左氏曰賔之以上卿禮也然則傳言魯之得禮非言曹也杜云諸侯之適子攝其君則以皮帛繼子男此周禮文也然則杜以曹世子爲得禮矣非也周禮稱繼子男者諸侯朝天子有時不得後其期故老疾者使世子攝己事而往其位繼子男之後而見天子急述職也諸侯閒於王事則相朝相朝本無時曹伯雖有疾何急於朝魯而使世子攝哉是欲使其子亢諸侯之禮審也何可謂之禮十年齊侯衞侯鄭伯來戰于郎左氏曰我有辭也鄭人請師於齊齊人以衞師助之故不稱侵伐先書齊衞王爵也非也經云衞侯傳云衞師自不同矣又主爲此戰者鄭人也鄭當先序以見其罪何故反推齊爲先乎雖欲明魯不失周班不虞反匿鄭人之惡也且魯之以周班後鄭乃在數年之前今此三國固顚倒班次而來矣順其事以書之足以見鄭人首惡不言侵伐而言來戰足以明魯人有辭而反蔽匿鄭志非襃貶之㫖也且鄭忽救齊之時經無魯人往齊者又明其妄矣十一年宋人執鄭祭仲杜氏云不稱行人罪之也非也傳云誘祭仲而執之此乃非行人假令仲無罪猶不書行人也何足以效其襃貶哉突歸于鄭杜氏云爲宋所納故曰歸非也自祭仲君之爾若宋納之何不言納乎又曰不稱公子從告也亦非也諸侯之子未爲大夫自不稱公子也稱公子皆已爲大夫貴者也又曰文連祭仲故不言鄭亦非也此下有鄭忽出奔衞文亦與祭仲相連何故獨言鄭乎鄭忽出奔衞杜氏云莊公旣葬不稱爵者鄭人賤之以名赴非也諸侯在喪於其封内三年稱子又一年不二君故逾年改元此通制耳豈有旣葬稱爵者乎杜氏見春秋亂世諸侯旣葬稱爵者多意以謂禮當若此矣獨不顧一年不二君逾年改元之義乎且茍以春秋諸侯旣葬稱爵爲非失禮者彼臣弑其君子弑其父亦常常有之寧復可信其爲禮哉又曰鄭人賤忽以名赴亦非也春秋之襃貶仲尼蓋自謂丘有罪焉豈專從赴而已假令實賢而不令之臣汚毁其君以赴諸侯春秋固亦從之邪且以義觀之忽正突不正而突篡忽二者孰爲可賤乎何以顚倒若此哉十二年及鄭師伐宋丁未戰于宋左氏曰宋無信也杜氏云尤其無信故以獨戰爲文非也且上三國伐魯魯有辭故三國以獨戰爲文今尤宋無信反使魯以獨戰爲文何哉向令不以獨戰爲文者可云及鄭師及宋人戰于宋乎又可云及鄭師伐宋宋人及我師戰乎要是魯鄭伐宋戰于其國宋人不出主名故文須先言伐後言戰耳此與齊人伐衞衞人及齊人戰相類也所縁之端内外異故故如此爾豈苟欲尤宋哉且凡春秋盟㑹未嘗不惡也又非獨於此尤宋無信而已也十三年公㑹紀侯鄭伯及齊侯宋公衞侯燕人戰齊師宋師衞師燕師敗績左氏曰宋多責賂於鄭鄭不堪命故以紀魯及齊與宋戰不書所戰後也杜氏云公後其地期而及其戰非也若宋鄭相怨鄭爲此戰者鄭當序紀上宋當序齊上何故反顚倒之乎公雖不及其㑹期而及其戰期自當没㑹地而舉戰地今何故反没戰地乎以例理推之前年我師及鄭人伐宋戰于宋地故宋人今歳來報怨也宋雖報怨齊實主之故齊序上也戰于宋時在其城下可得言戰于宋今亦戰于城下不可得言戰于魯故不舉地也豈鄭以紀魯戰者乎豈有魯不及其㑹地者乎左氏又曰鄭人來脩好按魯鄭同好未嘗有隙何故忽脩之是見明年㑹于曹因說此爾十四年乙亥嘗左氏曰書不害也非也記災而書其不害何益於敎乎火不害粟此亦物之不爲災者於例當不書何故自書於上又自解釋於下乎茍令御廩災在乙亥之後當不復見其不害矣十五年鄭世子忽復歸于鄭杜氏曰稱世子者逆以太子之禮非也忽出奔時非君也又不言世子則讀春秋者未知忽之爲正歟突之爲正歟然而突稱鄭伯矣突之稱鄭伯非正也謂忽世子者所以見正也豈以其用太子之禮逆忽哉鄭人雖以太子之禮逆忽及忽之至豈不君忽乎其赴於諸侯故當謂忽歸爲君也豈曰忽歸爲太子也春秋欲貶忽者寧在其以太子之禮逆忽乎蓋不知而言之邾人牟人葛人來朝杜氏云皆附庸世子也非也世子不當攝君朝凡春秋所書世子朝皆貶也應不没其名十六年伐鄭按傳例與謀曰及不與謀曰㑹此稱公㑹則不與謀者也而正月㑹于曹傳云謀伐鄭乃是與謀與謀而稱㑹何邪杜云魯諱納不正非也本說與謀與不與謀之例者欲以微文見襃貶也所謂主人習其讀而問其傳未知己之有罪者也而又反易事實以㑹爲及以及爲㑹則奚知本不設㑹及例邪春秋王法也非茍徇人之情而已如魯人自知其罪而諱避不言此固春秋所當正也何故縁其不肖之意與之比周掩匿邪且魯人唯不知義故伐鄭豈復稍避與謀之名哉伐鄭故不恥也與謀何足恥乎十七年公㑹邾儀父盟于趡按隱元年傳曰嘉之也彼時嘉之似云隱公初即位繼好息民耳今與桓公盟則亦何嘉若諸侯盟㑹每輒見襃是春秋不譏盟也何爲獨儀父受襃他國未嘗受襃乎明此不知春秋之意謬説之耳且鄧榖皆大國身自朝魯反以爲僻陋名而賤之邾附庸也亢魯而盟盟輒見襃何春秋之難曉若此蔡季自陳歸于蔡左氏曰蔡人嘉之也按此蔡人嘉之則必蔡人逆之矣蔡人逆之於左氏例當言入不當言歸何故言歸乎葬蔡桓侯杜氏云稱侯蓋謬誤豈非不知而作者邪讀聖人所爲書已所不曉因以爲謬矣苟非不知而作何以及此春秋權衡卷二
